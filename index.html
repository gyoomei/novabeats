<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 NovaBeats — Music Player</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

:root {
  --bg: #0a0a0f;
  --bg-card: rgba(255,255,255,0.03);
  --bg-card-hover: rgba(255,255,255,0.06);
  --accent: #6366f1;
  --accent-glow: rgba(99,102,241,0.3);
  --accent-2: #a855f7;
  --text: #f1f1f6;
  --text-dim: #6b6b80;
  --border: rgba(255,255,255,0.06);
  --glass: rgba(20,20,30,0.8);
  --glass-border: rgba(255,255,255,0.08);
  --success: #22c55e;
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Animated BG */
.bg-anim {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 600px 400px at 20% 20%, rgba(99,102,241,0.08), transparent),
    radial-gradient(ellipse 500px 500px at 80% 80%, rgba(168,85,247,0.06), transparent);
  animation: bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  0% { opacity: 0.6; }
  100% { opacity: 1; }
}

.app {
  position: relative; z-index: 1;
  max-width: 1200px; margin: 0 auto;
  padding: 24px 20px 180px;
}

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0 32px;
}
.logo {
  font-size: 28px; font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -1px;
}
.header-actions { display: flex; gap: 10px; align-items: center; }

/* Search */
.search-box {
  position: relative;
  width: 100%; max-width: 360px;
  margin-bottom: 28px;
}
.search-box input {
  width: 100%; padding: 14px 18px 14px 46px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px; font-family: inherit;
  outline: none; transition: all 0.2s;
}
.search-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-box::before {
  content: '🔍'; position: absolute;
  left: 16px; top: 50%; transform: translateY(-50%);
  font-size: 14px; opacity: 0.5;
}

/* Section Title */
.section-title {
  font-size: 20px; font-weight: 700;
  margin-bottom: 16px; letter-spacing: -0.5px;
}
.section-title span {
  color: var(--text-dim); font-weight: 400;
  font-size: 14px; margin-left: 8px;
}

/* Playlist Grid */
.playlist-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px; margin-bottom: 40px;
}

.track-card {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.track-card:hover {
  background: var(--bg-card-hover);
  border-color: rgba(99,102,241,0.2);
  transform: translateY(-1px);
}
.track-card.active {
  background: rgba(99,102,241,0.08);
  border-color: rgba(99,102,241,0.25);
}
.track-card.active::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--accent), var(--accent-2));
}

.track-art {
  width: 52px; height: 52px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.track-art img {
  width: 100%; height: 100%; object-fit: cover;
  border-radius: 10px;
}

.track-info { flex: 1; min-width: 0; }
.track-name {
  font-weight: 600; font-size: 14px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.track-artist {
  font-size: 12px; color: var(--text-dim);
  margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.track-duration {
  font-size: 12px; color: var(--text-dim);
  flex-shrink: 0;
}

.track-play-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s;
  flex-shrink: 0;
}
.track-card:hover .track-play-btn,
.track-card.active .track-play-btn { opacity: 1; }
.track-card.active .track-play-btn {
  background: var(--accent);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
  50% { box-shadow: 0 0 0 8px transparent; }
}

/* Equalizer bars for active */
.eq-bars {
  display: none; gap: 2px; align-items: flex-end;
  height: 16px; margin-right: 4px;
}
.track-card.active .eq-bars { display: flex; }
.track-card.active.paused .eq-bars { display: none; }
.eq-bar {
  width: 3px; background: var(--accent);
  border-radius: 2px;
  animation: eq 0.8s ease-in-out infinite;
}
.eq-bar:nth-child(1) { height: 40%; animation-delay: 0s; }
.eq-bar:nth-child(2) { height: 80%; animation-delay: 0.2s; }
.eq-bar:nth-child(3) { height: 60%; animation-delay: 0.4s; }
@keyframes eq {
  0%, 100% { height: 30%; }
  50% { height: 100%; }
}

/* Player Bar */
.player-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--glass);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border-top: 1px solid var(--glass-border);
  padding: 0;
  z-index: 100;
}

/* Progress Bar */
.progress-container {
  width: 100%; height: 4px;
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  position: relative;
  transition: height 0.15s;
}
.progress-container:hover { height: 6px; }
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  border-radius: 0 3px 3px 0;
  width: 0%;
  position: relative;
  transition: width 0.1s linear;
}
.progress-bar::after {
  content: '';
  position: absolute; right: -6px; top: 50%;
  transform: translateY(-50%);
  width: 12px; height: 12px;
  background: #fff;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.15s;
  box-shadow: 0 0 8px rgba(99,102,241,0.5);
}
.progress-container:hover .progress-bar::after { opacity: 1; }

.player-content {
  display: flex; align-items: center;
  padding: 12px 24px 16px;
  gap: 20px;
  max-width: 1200px;
  margin: 0 auto;
}

.player-track {
  display: flex; align-items: center; gap: 14px;
  flex: 1; min-width: 0;
}
.player-art {
  width: 52px; height: 52px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  animation: rotate 20s linear infinite paused;
}
.player-art.playing { animation-play-state: running; }
@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.player-art.round { border-radius: 50%; }

.player-info { min-width: 0; }
.player-title {
  font-weight: 600; font-size: 14px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 200px;
}
.player-artist {
  font-size: 12px; color: var(--text-dim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Controls */
.controls {
  display: flex; align-items: center; gap: 16px;
}
.ctrl-btn {
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; padding: 8px;
  border-radius: 50%;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.ctrl-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.ctrl-btn.active { color: var(--accent); }

.play-btn {
  width: 48px; height: 48px;
  background: var(--accent) !important;
  color: #fff !important;
  border-radius: 50%;
  font-size: 20px;
  transition: all 0.2s;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.play-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 28px var(--accent-glow);
}

/* Time */
.time-display {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-dim);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}

/* Volume */
.volume-wrap {
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.volume-slider {
  -webkit-appearance: none; appearance: none;
  width: 90px; height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px; outline: none;
  cursor: pointer;
}
.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 6px var(--accent-glow);
}

/* Visualizer */
.visualizer-wrap {
  position: relative;
  width: 100%;
  height: 80px;
  margin-bottom: 8px;
  border-radius: var(--radius);
  overflow: hidden;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
}
#visualizer {
  width: 100%; height: 100%;
  display: block;
}

/* Upload */
.upload-area {
  border: 2px dashed rgba(99,102,241,0.3);
  border-radius: var(--radius);
  padding: 32px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 28px;
  background: rgba(99,102,241,0.02);
}
.upload-area:hover {
  border-color: var(--accent);
  background: rgba(99,102,241,0.05);
}
.upload-area.dragover {
  border-color: var(--accent);
  background: rgba(99,102,241,0.08);
  transform: scale(1.01);
}
.upload-icon { font-size: 36px; margin-bottom: 8px; }
.upload-text { font-size: 14px; color: var(--text-dim); }
.upload-text strong { color: var(--accent); }
#fileInput { display: none; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
.empty-state p { font-size: 14px; }

/* Responsive */
@media (max-width: 768px) {
  .app { padding: 16px 14px 200px; }
  .player-content { padding: 10px 16px 14px; gap: 12px; }
  .player-title { max-width: 120px; }
  .volume-wrap { display: none; }
  .time-display { display: none; }
  .playlist-grid { grid-template-columns: 1fr; }
  .player-art { width: 44px; height: 44px; font-size: 18px; }
  .play-btn { width: 42px; height: 42px; font-size: 18px; }
  .controls { gap: 10px; }
  .visualizer-wrap { height: 60px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

/* Toast */
.toast {
  position: fixed; bottom: 200px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 200;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div class="bg-anim"></div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">NovaBeats</div>
    <div class="header-actions">
      <span style="font-size:12px;color:var(--text-dim)" id="trackCount">0 tracks</span>
    </div>
  </div>

  <!-- Search -->
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search tracks...">
  </div>

  <!-- Visualizer -->
  <div class="visualizer-wrap">
    <canvas id="visualizer"></canvas>
  </div>

  <!-- Upload -->
  <div class="upload-area" id="uploadArea">
    <div class="upload-icon">📁</div>
    <div class="upload-text">
      <strong>Click to upload</strong> or drag & drop audio files<br>
      <span style="font-size:12px;opacity:0.6">MP3, WAV, OGG, FLAC, M4A</span>
    </div>
  </div>
  <input type="file" id="fileInput" multiple accept="audio/*">

  <!-- Playlist -->
  <div class="section-title">Playlist <span id="playlistCount"></span></div>
  <div class="playlist-grid" id="playlist">
    <div class="empty-state" id="emptyState">
      <div class="icon">🎵</div>
      <p>No tracks yet. Upload some music to get started!</p>
    </div>
  </div>
</div>

<!-- Player Bar -->
<div class="player-bar" id="playerBar" style="display:none">
  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="player-content">
    <div class="player-track">
      <div class="player-art" id="playerArt">🎵</div>
      <div class="player-info">
        <div class="player-title" id="playerTitle">—</div>
        <div class="player-artist" id="playerArtist">—</div>
      </div>
    </div>
    <div class="time-display">
      <span id="currentTime">0:00</span>
      <span>/</span>
      <span id="totalTime">0:00</span>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="shuffleBtn" title="Shuffle">🔀</button>
      <button class="ctrl-btn" id="prevBtn" title="Previous">⏮</button>
      <button class="ctrl-btn play-btn" id="playBtn" title="Play">▶</button>
      <button class="ctrl-btn" id="nextBtn" title="Next">⏭</button>
      <button class="ctrl-btn" id="repeatBtn" title="Repeat">🔁</button>
    </div>
    <div class="volume-wrap">
      <button class="ctrl-btn" id="muteBtn" title="Mute">🔊</button>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const audio = new Audio();
const tracks = [];
let currentIndex = -1;
let isPlaying = false;
let isShuffle = false;
let repeatMode = 0; // 0=off, 1=all, 2=one

// Audio Context for visualizer
let audioCtx, analyser, source, dataArray;
let visualizerInitialized = false;

function initVisualizer() {
  if (visualizerInitialized) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  analyser.fftSize = 256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  visualizerInitialized = true;
  drawVisualizer();
}

const canvas = document.getElementById('visualizer');
const ctx = canvas.getContext('2d');

function drawVisualizer() {
  requestAnimationFrame(drawVisualizer);
  if (!analyser) return;

  canvas.width = canvas.offsetWidth * 2;
  canvas.height = canvas.offsetHeight * 2;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  analyser.getByteFrequencyData(dataArray);

  const bars = dataArray.length;
  const barW = (canvas.width / bars) * 1.5;
  const gap = 2;

  for (let i = 0; i < bars; i++) {
    const v = dataArray[i] / 255;
    const h = v * canvas.height * 0.85;
    const x = i * (barW + gap);
    const y = canvas.height - h;

    const grad = ctx.createLinearGradient(x, y, x, canvas.height);
    grad.addColorStop(0, `rgba(168, 85, 247, ${0.6 + v * 0.4})`);
    grad.addColorStop(0.5, `rgba(99, 102, 241, ${0.5 + v * 0.4})`);
    grad.addColorStop(1, `rgba(99, 102, 241, 0.1)`);

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, h, [3, 3, 0, 0]);
    ctx.fill();

    // Glow
    if (v > 0.6) {
      ctx.shadowColor = 'rgba(99,102,241,0.4)';
      ctx.shadowBlur = 12;
      ctx.fillStyle = `rgba(99,102,241,${v * 0.15})`;
      ctx.fillRect(x, y, barW, h);
      ctx.shadowBlur = 0;
    }
  }
}

// File handling
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  const audioTypes = ['audio/mpeg','audio/wav','audio/ogg','audio/flac','audio/mp4','audio/aac','audio/x-m4a','audio/webm'];
  let added = 0;
  for (const f of files) {
    if (audioTypes.includes(f.type) || f.name.match(/\.(mp3|wav|ogg|flac|m4a|aac|webm)$/i)) {
      const url = URL.createObjectURL(f);
      const name = f.name.replace(/\.[^.]+$/, '');
      tracks.push({ name, artist: 'Local File', url, file: f, duration: null });
      added++;
    }
  }
  if (added) {
    showToast(`✅ Added ${added} track${added > 1 ? 's' : ''}`);
    renderPlaylist();
    if (currentIndex === -1) {
      currentIndex = 0;
      loadTrack(0);
    }
  }
}

function renderPlaylist(filter = '') {
  const grid = document.getElementById('playlist');
  const empty = document.getElementById('emptyState');
  const lower = filter.toLowerCase();

  const filtered = tracks.map((t, i) => ({ ...t, idx: i }))
    .filter(t => !filter || t.name.toLowerCase().includes(lower) || t.artist.toLowerCase().includes(lower));

  grid.innerHTML = '';
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🎵</div><p>${filter ? 'No matches found' : 'No tracks yet. Upload some music!'}</p></div>`;
  }

  filtered.forEach(t => {
    const card = document.createElement('div');
    card.className = `track-card${t.idx === currentIndex ? ' active' : ''}${t.idx === currentIndex && !isPlaying ? ' paused' : ''}`;
    card.innerHTML = `
      <div class="track-art"><span>🎵</span></div>
      <div class="track-info">
        <div class="track-name">${escHtml(t.name)}</div>
        <div class="track-artist">${escHtml(t.artist)}</div>
      </div>
      <div class="eq-bars">
        <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
      </div>
      <div class="track-duration">${t.duration ? formatTime(t.duration) : '—'}</div>
      <div class="track-play-btn">${t.idx === currentIndex && isPlaying ? '⏸' : '▶'}</div>
    `;
    card.addEventListener('click', () => {
      if (t.idx === currentIndex) {
        togglePlay();
      } else {
        loadTrack(t.idx);
        play();
      }
    });
    grid.appendChild(card);
  });

  document.getElementById('playlistCount').textContent = filter ? `(${filtered.length}/${tracks.length})` : tracks.length ? `(${tracks.length})` : '';
  document.getElementById('trackCount').textContent = `${tracks.length} track${tracks.length !== 1 ? 's' : ''}`;
}

function loadTrack(idx) {
  if (idx < 0 || idx >= tracks.length) return;
  currentIndex = idx;
  const t = tracks[idx];
  audio.src = t.url;
  audio.load();

  document.getElementById('playerTitle').textContent = t.name;
  document.getElementById('playerArtist').textContent = t.artist;
  document.getElementById('playerBar').style.display = '';

  renderPlaylist(document.getElementById('searchInput').value);
}

function play() {
  if (currentIndex === -1 && tracks.length) { loadTrack(0); }
  if (currentIndex === -1) return;
  initVisualizer();
  audio.play().then(() => {
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸';
    document.getElementById('playerArt').classList.add('playing');
    renderPlaylist(document.getElementById('searchInput').value);
  }).catch(() => {});
}

function pause() {
  audio.pause();
  isPlaying = false;
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('playerArt').classList.remove('playing');
  renderPlaylist(document.getElementById('searchInput').value);
}

function togglePlay() {
  isPlaying ? pause() : play();
}

function nextTrack() {
  if (!tracks.length) return;
  let next;
  if (isShuffle) {
    next = Math.floor(Math.random() * tracks.length);
    if (next === currentIndex) next = (next + 1) % tracks.length;
  } else {
    next = (currentIndex + 1) % tracks.length;
  }
  loadTrack(next);
  play();
}

function prevTrack() {
  if (!tracks.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  let prev;
  if (isShuffle) {
    prev = Math.floor(Math.random() * tracks.length);
  } else {
    prev = (currentIndex - 1 + tracks.length) % tracks.length;
  }
  loadTrack(prev);
  play();
}

// Controls
document.getElementById('playBtn').addEventListener('click', togglePlay);
document.getElementById('nextBtn').addEventListener('click', nextTrack);
document.getElementById('prevBtn').addEventListener('click', prevTrack);

document.getElementById('shuffleBtn').addEventListener('click', () => {
  isShuffle = !isShuffle;
  document.getElementById('shuffleBtn').classList.toggle('active', isShuffle);
  showToast(isShuffle ? '🔀 Shuffle ON' : '🔀 Shuffle OFF');
});

document.getElementById('repeatBtn').addEventListener('click', () => {
  repeatMode = (repeatMode + 1) % 3;
  const btn = document.getElementById('repeatBtn');
  btn.classList.toggle('active', repeatMode > 0);
  btn.textContent = repeatMode === 2 ? '🔂' : '🔁';
  const labels = ['🔁 Repeat OFF', '🔁 Repeat ALL', '🔂 Repeat ONE'];
  showToast(labels[repeatMode]);
});

// Volume
const volumeSlider = document.getElementById('volumeSlider');
const muteBtn = document.getElementById('muteBtn');
audio.volume = 0.8;

volumeSlider.addEventListener('input', e => {
  audio.volume = parseFloat(e.target.value);
  updateVolumeIcon();
});

muteBtn.addEventListener('click', () => {
  audio.muted = !audio.muted;
  updateVolumeIcon();
});

function updateVolumeIcon() {
  if (audio.muted || audio.volume === 0) muteBtn.textContent = '🔇';
  else if (audio.volume < 0.5) muteBtn.textContent = '🔉';
  else muteBtn.textContent = '🔊';
}

// Progress
const progressContainer = document.getElementById('progressContainer');
const progressBar = document.getElementById('progressBar');

progressContainer.addEventListener('click', e => {
  if (!audio.duration) return;
  const rect = progressContainer.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressBar.style.width = pct + '%';
  document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  document.getElementById('totalTime').textContent = formatTime(audio.duration);
  if (currentIndex >= 0) tracks[currentIndex].duration = audio.duration;
  renderPlaylist(document.getElementById('searchInput').value);
});

audio.addEventListener('ended', () => {
  if (repeatMode === 2) {
    audio.currentTime = 0;
    play();
  } else if (repeatMode === 1 || currentIndex < tracks.length - 1) {
    nextTrack();
  } else {
    pause();
  }
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  renderPlaylist(e.target.value);
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch (e.code) {
    case 'Space': e.preventDefault(); togglePlay(); break;
    case 'ArrowRight': audio.currentTime += 5; break;
    case 'ArrowLeft': audio.currentTime -= 5; break;
    case 'ArrowUp': e.preventDefault(); audio.volume = Math.min(1, audio.volume + 0.05); volumeSlider.value = audio.volume; updateVolumeIcon(); break;
    case 'ArrowDown': e.preventDefault(); audio.volume = Math.max(0, audio.volume - 0.05); volumeSlider.value = audio.volume; updateVolumeIcon(); break;
    case 'KeyN': nextTrack(); break;
    case 'KeyP': prevTrack(); break;
  }
});

// Helpers
function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

// Media Session API (lock screen controls)
if ('mediaSession' in navigator) {
  audio.addEventListener('play', () => {
    if (currentIndex < 0) return;
    const t = tracks[currentIndex];
    navigator.mediaSession.metadata = new MediaMetadata({
      title: t.name,
      artist: t.artist,
    });
  });
  navigator.mediaSession.setActionHandler('play', play);
  navigator.mediaSession.setActionHandler('pause', pause);
  navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
  navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
}

// Init
renderPlaylist();
</script>
</body>
</html>
