<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NovaBeats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060a;--bg-deep:#020204;--surface:#0c0c14;--surface2:#111120;
  --accent:#e85d3a;--accent2:#f4845f;--accent3:#f7a58c;
  --teal:#2dd4bf;--cyan:#22d3ee;--text:#e8e8ee;--dim:#555570;
  --dim2:#2a2a3e;--glass:rgba(12,12,20,.7);--border:rgba(255,255,255,.05);
  --radius:14px;--radius-sm:10px;
  /* z-index scale */
  --z-bg:0;--z-particles:1;--z-content:2;--z-ring:3;
  --z-sidebar:10;--z-bar:20;--z-toggle:21;--z-toast:30;
}
html,body{
  font-family:'Outfit',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  height:100%;overflow:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background 1.2s cubic-bezier(.4,0,.2,1);
}
body.playing{background:var(--bg-deep)}

/* ===== LAYOUT ===== */
.app{display:grid;grid-template-columns:280px 1fr;grid-template-rows:1fr;height:100vh;overflow:hidden}
@media(max-width:800px){.app{grid-template-columns:1fr}}

/* ===== SIDEBAR ===== */
.sidebar{
  background:rgba(8,8,14,.92);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:var(--z-sidebar);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  overflow:hidden;
}
@media(max-width:800px){
  .sidebar{
    position:fixed;bottom:0;left:0;right:0;top:auto;
    height:auto;max-height:55vh;border-right:none;
    border-top:1px solid var(--border);
    transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);
    z-index:var(--z-sidebar);
  }
  .sidebar.open{transform:translateY(0)}
}
.sb-header{
  padding:28px 24px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.sb-logo{
  font-family:'Outfit',sans-serif;font-size:22px;font-weight:900;letter-spacing:-1.5px;
  color:var(--text);
}
.sb-sub{font-size:11px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}

.sb-queue-label{
  padding:16px 24px 8px;font-size:11px;color:var(--dim);
  letter-spacing:2px;text-transform:uppercase;font-weight:600;flex-shrink:0;
}
.sb-queue{flex:1;overflow-y:auto;padding:0 12px 12px;scrollbar-width:thin;scrollbar-color:var(--dim2) transparent}
.sb-queue::-webkit-scrollbar{width:4px}
.sb-queue::-webkit-scrollbar-thumb{background:var(--dim2);border-radius:4px}
.q-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;
  border-radius:var(--radius-sm);cursor:pointer;
  transition:background .2s,transform .15s;position:relative;overflow:hidden;
}
.q-item:hover{background:rgba(232,93,58,.06)}
.q-item:active{transform:scale(.98)}
.q-item.active{
  background:rgba(232,93,58,.08);
  border:1px solid rgba(232,93,58,.12);
}
.q-item.active::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--accent);border-radius:0 3px 3px 0;
}
.q-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);width:20px;text-align:center}
.q-item.active .q-num{color:var(--accent)}
.q-art{
  width:40px;height:40px;border-radius:8px;overflow:hidden;flex-shrink:0;
  position:relative;
}
.q-art canvas{width:100%;height:100%;display:block}
.q-meta{flex:1;min-width:0}
.q-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-artist{font-size:11px;color:var(--dim);margin-top:2px}
.q-dur{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim)}
.playing-indicator{display:none;align-items:flex-end;gap:2px;height:14px}
.q-item.active .playing-indicator{display:flex}
.q-item.active .q-num span{display:none}
.playing-indicator span{
  width:3px;background:var(--accent);border-radius:2px;
  animation:indicator .8s ease-in-out infinite;
}
.playing-indicator span:nth-child(2){animation-delay:.15s;height:60%}
.playing-indicator span:nth-child(3){animation-delay:.3s;height:40%}
@keyframes indicator{0%,100%{height:30%}50%{height:100%}}

/* ===== MAIN ===== */
.main{position:relative;overflow:hidden;display:flex;flex-direction:column}

/* ===== BG EFFECTS ===== */
.bg-effects{position:absolute;inset:0;z-index:var(--z-bg);pointer-events:none;overflow:hidden;transition:opacity 1s}
.orb{
  position:absolute;border-radius:50%;
  filter:blur(80px);opacity:0;transition:opacity 2s ease,filter 1s;will-change:transform,opacity;
}
body.playing .orb{opacity:1}
.orb.o1{width:70vmax;height:70vmax;left:-20%;top:-20%;background:radial-gradient(circle,rgba(232,93,58,.2),transparent 55%)}
.orb.o2{width:60vmax;height:60vmax;right:-15%;bottom:-15%;background:radial-gradient(circle,rgba(244,132,95,.15),transparent 55%)}
.orb.o3{width:50vmax;height:50vmax;left:30%;top:50%;background:radial-gradient(circle,rgba(45,212,191,.12),transparent 50%)}
.orb.o4{width:45vmax;height:45vmax;right:20%;top:10%;background:radial-gradient(circle,rgba(34,211,238,.1),transparent 50%)}

.particles-canvas{position:absolute;inset:0;z-index:var(--z-particles);pointer-events:none}

/* ===== CONTENT ===== */
.content{
  position:relative;z-index:var(--z-content);flex:1;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px 140px;gap:24px;
}

/* ===== NOW PLAYING ART ===== */
.np-art-wrap{
  position:relative;width:min(300px,50vw);aspect-ratio:1;
  border-radius:20px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px var(--border);
  transition:transform .6s cubic-bezier(.16,1,.3,1),box-shadow .8s;
}
body.playing .np-art-wrap{
  transform:scale(1.02);
  box-shadow:0 30px 80px rgba(232,93,58,.1),0 0 0 1px rgba(232,93,58,.1);
}
.np-art-canvas{width:100%;height:100%;display:block}

.np-ring-wrap{
  position:absolute;inset:-50px;pointer-events:none;z-index:var(--z-ring);
}
.np-ring-canvas{width:100%;height:100%;display:block}

/* ===== TRACK INFO ===== */
.np-info{text-align:center;z-index:2;max-width:90vw}
.np-title{
  font-family:'Outfit',sans-serif;font-size:clamp(20px,5vw,30px);font-weight:800;
  letter-spacing:-.8px;line-height:1.2;color:var(--text);
}
body.playing .np-title{color:#fff}
.np-artist{font-size:clamp(13px,3vw,15px);color:var(--dim);margin-top:8px;font-weight:500;letter-spacing:.3px}

/* ===== WAVEFORM ===== */
.waveform-bar{
  width:min(560px,80vw);height:50px;position:relative;z-index:2;
  border-radius:var(--radius-sm);overflow:hidden;
}
.waveform-bar canvas{width:100%;height:100%;display:block}

/* ===== PLAYER BAR ===== */
.player-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:var(--z-bar);
  background:linear-gradient(180deg,transparent,rgba(4,4,8,.8) 30%,rgba(4,4,8,.96));
  padding:0 24px max(12px,env(safe-area-inset-bottom));
  transition:opacity .4s;
}
@media(max-width:800px){.player-bar{padding:0 16px max(12px,env(safe-area-inset-bottom))}}

/* Progress */
.pb-progress{
  width:100%;height:4px;background:rgba(255,255,255,.06);
  cursor:pointer;position:relative;transition:height .2s;border-radius:2px;
  margin-bottom:12px;
}
.pb-progress:hover{height:6px}
.pb-fill{
  height:100%;width:0%;border-radius:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2),var(--teal));
  transition:width .12s linear;position:relative;
}
.pb-fill::after{
  content:'';position:absolute;right:-7px;top:50%;transform:translateY(-50%) scale(0);
  width:14px;height:14px;border-radius:50%;
  background:#fff;box-shadow:0 0 10px rgba(232,93,58,.5);
  opacity:0;transition:opacity .2s,transform .2s;
}
.pb-progress:hover .pb-fill::after{opacity:1;transform:translateY(-50%) scale(1)}

/* Controls */
.pb-controls{
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;padding-bottom:4px;
}
@media(max-width:800px){.pb-controls{gap:8px}}
.pb-left{display:flex;align-items:center;gap:14px;min-width:0;flex:1}
.pb-center{display:flex;align-items:center;gap:16px;flex-shrink:0}
.pb-right{display:flex;align-items:center;gap:12px;flex:1;justify-content:flex-end}

.pb-track-info{display:flex;align-items:center;gap:12px;min-width:0}
.pb-mini-art{width:44px;height:44px;border-radius:8px;overflow:hidden;flex-shrink:0}
.pb-mini-art canvas{width:100%;height:100%;display:block}
.pb-mini-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.pb-mini-artist{font-size:11px;color:var(--dim);margin-top:2px}

/* SVG Icon Buttons */
.pb-btn{
  width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
  background:transparent;color:var(--text);font-size:0;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .15s;-webkit-tap-highlight-color:transparent;
}
.pb-btn:hover{background:rgba(255,255,255,.06)}
.pb-btn:active{transform:scale(.92)}
.pb-btn svg{width:20px;height:20px;fill:currentColor;pointer-events:none}
.pb-btn.play-main{
  width:56px;height:56px;
  background:var(--accent);color:#fff;
  box-shadow:0 4px 20px rgba(232,93,58,.25);
}
.pb-btn.play-main:hover{
  background:var(--accent2);
  box-shadow:0 6px 28px rgba(232,93,58,.35);
}
.pb-btn.play-main svg{width:22px;height:22px}
.pb-btn.active{color:var(--accent)!important}

/* Time */
.pb-time{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--dim);font-variant-numeric:tabular-nums;
  display:flex;gap:6px;align-items:center;
}

/* Volume */
.pb-vol{display:flex;align-items:center;gap:8px}
@media(max-width:800px){.pb-vol{display:none}}
.pb-vol-slider{
  -webkit-appearance:none;appearance:none;
  width:90px;height:3px;background:rgba(255,255,255,.08);
  border-radius:2px;outline:none;cursor:pointer;
}
.pb-vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;
  background:var(--accent);border-radius:50%;cursor:pointer;
  box-shadow:0 0 6px rgba(232,93,58,.4);
}

/* Mobile toggle */
.sb-toggle{
  display:none;position:fixed;bottom:90px;right:16px;z-index:var(--z-toggle);
  width:48px;height:48px;border-radius:50%;border:none;
  background:var(--surface2);color:var(--text);font-size:0;
  cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);
  border:1px solid var(--border);
}
.sb-toggle svg{width:20px;height:20px;fill:currentColor}
@media(max-width:800px){.sb-toggle{display:flex;align-items:center;justify-content:center}}

/* ===== LOAD STATUS ===== */
.load-status{
  font-size:12px;color:var(--dim);letter-spacing:1px;
  text-align:center;z-index:2;min-height:18px;
  font-family:'JetBrains Mono',monospace;
}
.load-status.error{color:#ef4444}
.load-status.ready{color:var(--teal)}

/* ===== INITIAL TAP HINT ===== */
.tap-hint{
  position:absolute;bottom:28%;left:50%;transform:translateX(-50%);
  z-index:5;text-align:center;
  animation:fadePulse 2.5s ease-in-out infinite;
}
.tap-hint-icon{
  width:72px;height:72px;border-radius:50%;margin:0 auto 14px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(232,93,58,.08);
  border:1.5px solid rgba(232,93,58,.15);
}
.tap-hint-icon svg{width:28px;height:28px;fill:var(--accent)}
.tap-hint-text{
  font-size:12px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;
}
body.playing .tap-hint{opacity:0;pointer-events:none;transition:opacity .5s}
@keyframes fadePulse{0%,100%{opacity:.35}50%{opacity:.85}}

/* ===== ORB ANIMATIONS ===== */
@keyframes orbFloat{
  0%{transform:translate(0,0) scale(1)}
  25%{transform:translate(30px,-20px) scale(1.05)}
  50%{transform:translate(-20px,30px) scale(.95)}
  75%{transform:translate(20px,10px) scale(1.03)}
  100%{transform:translate(0,0) scale(1)}
}
.orb.o1{animation:orbFloat 20s ease-in-out infinite}
.orb.o2{animation:orbFloat 25s ease-in-out infinite reverse}
.orb.o3{animation:orbFloat 22s ease-in-out infinite 5s}
.orb.o4{animation:orbFloat 18s ease-in-out infinite 8s}

/* ===== REDUCED MOTION ===== */
@media(prefers-reduced-motion:reduce){
  .orb,.particles-canvas,.playing-indicator span,.tap-hint{animation:none!important}
  *{transition-duration:0s!important}
  .orb{opacity:.15!important}
}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim2);border-radius:4px}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sb-header">
      <div>
        <div class="sb-logo">NovaBeats</div>
        <div class="sb-sub">curated music</div>
      </div>
    </div>
    <div class="sb-queue-label">Queue</div>
    <div class="sb-queue" id="sbQueue"></div>
  </aside>

  <main class="main">
    <div class="bg-effects">
      <div class="orb o1"></div>
      <div class="orb o2"></div>
      <div class="orb o3"></div>
      <div class="orb o4"></div>
    </div>
    <canvas class="particles-canvas" id="particlesCanvas"></canvas>

    <div class="content" id="content">
      <div class="np-art-wrap">
        <canvas class="np-art-canvas" id="npArtCanvas"></canvas>
        <div class="np-ring-wrap">
          <canvas class="np-ring-canvas" id="npRingCanvas"></canvas>
        </div>
      </div>
      <div class="np-info">
        <div class="np-title" id="npTitle">NovaBeats</div>
        <div class="np-artist" id="npArtist">tap to play</div>
      </div>
      <div class="waveform-bar">
        <canvas id="waveCanvas"></canvas>
      </div>
      <div class="load-status" id="loadStatus"></div>
    </div>

    <div class="tap-hint" id="tapHint">
      <div class="tap-hint-icon">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="tap-hint-text">tap anywhere</div>
    </div>

    <div class="player-bar" id="playerBar">
      <div class="pb-progress" id="pbProgress">
        <div class="pb-fill" id="pbFill"></div>
      </div>
      <div class="pb-controls">
        <div class="pb-left">
          <div class="pb-track-info">
            <div class="pb-mini-art"><canvas id="pbMiniArt" width="88" height="88"></canvas></div>
            <div>
              <div class="pb-mini-title" id="pbMiniTitle">NovaBeats</div>
              <div class="pb-mini-artist" id="pbMiniArtist">&mdash;</div>
            </div>
          </div>
        </div>
        <div class="pb-center">
          <button class="pb-btn" id="shuffleBtn" title="Shuffle" aria-label="Shuffle">
            <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
          </button>
          <button class="pb-btn" id="prevBtn" title="Previous" aria-label="Previous track">
            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          <button class="pb-btn play-main" id="playBtn" title="Play" aria-label="Play">
            <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button class="pb-btn" id="nextBtn" title="Next" aria-label="Next track">
            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
          <button class="pb-btn" id="repeatBtn" title="Repeat" aria-label="Repeat">
            <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
          </button>
        </div>
        <div class="pb-right">
          <div class="pb-time">
            <span id="curTime">0:00</span><span>/</span><span id="totTime">0:00</span>
          </div>
          <div class="pb-vol">
            <button class="pb-btn" id="muteBtn" style="width:36px;height:36px" aria-label="Mute">
              <svg viewBox="0 0 24 24" style="width:18px;height:18px"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
            <input type="range" class="pb-vol-slider" id="volSlider" min="0" max="1" step=".01" value=".8" aria-label="Volume">
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<button class="sb-toggle" id="sbToggle" aria-label="Toggle queue">
  <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
</button>

<script>
// ===== ICON PATHS =====
const ICONS = {
  play: '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>',
  pause: '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>',
};

// ===== TRACKLIST =====
const TRACKS = [
  {title:'Body Pata Pata',artist:'Faris Adam & Diva Aurel',yt:'epLVftkQojw',hue:15,seed:1},
  {title:'Es Lilin',artist:'Nining Meida',yt:'d0FvMDpVEfg',hue:190,seed:2},
  {title:'Cintaku Padamu',artist:'Rhoma Irama',yt:'ZbZFGDM6EBc',hue:330,seed:3},
  {title:'Pergi Pagi Pulang Pagi',artist:'Armada',yt:'tZp5HCT4gAQ',hue:155,seed:4},
  {title:'Hati-Hati di Jalan',artist:'Tulus',yt:'LmHp1gKZtNc',hue:210,seed:5},
  {title:'Rungkad',artist:'Happy Asmara',yt:'j4DGCK3i2aI',hue:350,seed:6},
  {title:'Tak Segampang Itu',artist:'Anggi Marito',yt:'VZhEcKExqZo',hue:175,seed:7},
  {title:'Komang',artist:'Raim Laode',yt:'cwJTbmf0bKM',hue:120,seed:8},
];

const INV = [
  'https://inv.nadeko.net','https://invidious.fdn.fr','https://yewtu.be',
  'https://vid.puffyan.us','https://invidious.lunar.icu','https://yt.artemislena.eu',
  'https://inv.tux.pizza','https://invidious.privacyredirect.com',
];

// ===== STATE =====
let playing = false, shuffle = false, repeat = 0, curIdx = 0;
let audioCtx, analyser, dataArr, vizOk = false;
let artCanvases = {};
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const audio = new Audio();
audio.volume = .8;
audio.preload = 'auto';
audio.crossOrigin = 'anonymous';

// ===== SEEDED RANDOM =====
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

// ===== GENERATE ALBUM ART =====
function generateArt(track, canvas, size) {
  const ctx = canvas.getContext('2d');
  canvas.width = size * 2;
  canvas.height = size * 2;
  ctx.scale(2, 2);
  const rng = seededRandom(track.seed * 7919);
  const hue = track.hue;

  // Dark base
  const grd = ctx.createLinearGradient(0, 0, size, size);
  grd.addColorStop(0, `hsl(${hue}, 60%, 6%)`);
  grd.addColorStop(.5, `hsl(${(hue + 30) % 360}, 50%, 10%)`);
  grd.addColorStop(1, `hsl(${(hue + 60) % 360}, 40%, 5%)`);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, size, size);

  // Abstract forms
  for (let i = 0; i < 5; i++) {
    const x = rng() * size;
    const y = rng() * size;
    const r = 30 + rng() * size * .35;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, `hsla(${(hue + rng() * 60) % 360}, 70%, 55%, ${.06 + rng() * .1})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Geometric accent lines
  ctx.strokeStyle = `hsla(${hue}, 50%, 50%, .1)`;
  ctx.lineWidth = 1;
  for (let i = 0; i < 6; i++) {
    ctx.beginPath();
    ctx.moveTo(rng() * size, rng() * size);
    ctx.lineTo(rng() * size, rng() * size);
    ctx.stroke();
  }

  // Center glow
  const cg = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size * .3);
  cg.addColorStop(0, `hsla(${hue}, 70%, 55%, .12)`);
  cg.addColorStop(.5, `hsla(${(hue+20)%360}, 60%, 45%, .05)`);
  cg.addColorStop(1, 'transparent');
  ctx.fillStyle = cg;
  ctx.fillRect(0, 0, size, size);

  // Subtle music note
  ctx.fillStyle = `hsla(${hue}, 40%, 70%, .06)`;
  ctx.font = `${size * .28}px 'Outfit', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('\u266B', size/2, size/2);
}

function ensureArt(idx) {
  if (artCanvases[idx]) return artCanvases[idx];
  const c = document.createElement('canvas');
  generateArt(TRACKS[idx], c, 300);
  artCanvases[idx] = c;
  return c;
}

// ===== QUEUE UI =====
function buildQueue() {
  const el = document.getElementById('sbQueue');
  el.innerHTML = '';
  TRACKS.forEach((t, i) => {
    const d = document.createElement('div');
    d.className = 'q-item' + (i === curIdx ? ' active' : '');
    d.setAttribute('role', 'button');
    d.setAttribute('tabindex', '0');
    d.setAttribute('aria-label', `Play ${t.title} by ${t.artist}`);
    d.innerHTML = `
      <span class="q-num"><span>${i+1}</span><div class="playing-indicator"><span></span><span></span><span></span></div></span>
      <div class="q-art"><canvas width="80" height="80" data-idx="${i}"></canvas></div>
      <div class="q-meta"><div class="q-title">${t.title}</div><div class="q-artist">${t.artist}</div></div>
    `;
    d.addEventListener('click', () => { loadTrack(i); doPlay(); });
    d.addEventListener('keydown', (e) => { if (e.key === 'Enter') { loadTrack(i); doPlay(); }});
    el.appendChild(d);
    const mc = d.querySelector('canvas');
    const mctx = mc.getContext('2d');
    mctx.drawImage(ensureArt(i), 0, 0, 80, 80);
  });
}

// ===== AUDIO ENGINE =====
function initAudio() {
  if (vizOk) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = .82;
    dataArr = new Uint8Array(analyser.frequencyBinCount);
    const src = audioCtx.createMediaElementSource(audio);
    src.connect(analyser);
    analyser.connect(audioCtx.destination);
    vizOk = true;
    if (!prefersReducedMotion) {
      drawRing();
      drawWave();
      drawParticles();
      reactLoop();
    }
    drawNpArt();
  } catch(e) { console.warn('Audio init:', e); }
}

// ===== NP ART (reactive overlay) =====
function drawNpArt() {
  requestAnimationFrame(drawNpArt);
  const c = document.getElementById('npArtCanvas');
  const ctx = c.getContext('2d');
  const wrap = c.parentElement;
  const sz = wrap.offsetWidth;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  if (c.width !== sz * dpr || c.height !== sz * dpr) {
    c.width = sz * dpr;
    c.height = sz * dpr;
  }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, sz, sz);

  const base = ensureArt(curIdx);
  ctx.drawImage(base, 0, 0, sz, sz);

  if (!analyser || !playing) return;
  analyser.getByteFrequencyData(dataArr);

  const track = TRACKS[curIdx];
  const hue = track.hue;
  let bass = 0, mid = 0;
  for (let i = 0; i < 20; i++) bass += dataArr[i];
  bass = bass / 20 / 255;
  for (let i = 50; i < 150; i++) mid += dataArr[i];
  mid = mid / 100 / 255;

  // Reactive glow
  const g = ctx.createRadialGradient(sz/2, sz/2, 0, sz/2, sz/2, sz * .55);
  g.addColorStop(0, `hsla(${hue}, 70%, 55%, ${bass * .2})`);
  g.addColorStop(.4, `hsla(${(hue+20)%360}, 60%, 45%, ${mid * .1})`);
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, sz, sz);

  // Beat flash
  if (bass > .55) {
    ctx.fillStyle = `hsla(${hue}, 80%, 60%, ${(bass - .55) * .15})`;
    ctx.fillRect(0, 0, sz, sz);
  }
}

// ===== RING VISUALIZER =====
const ringC = document.getElementById('npRingCanvas');
const rx = ringC.getContext('2d');
let ringW = 0;
function drawRing() {
  requestAnimationFrame(drawRing);
  if (!analyser) return;
  const wrap = ringC.parentElement;
  const s = wrap.offsetWidth;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  if (ringW !== s * dpr) {
    ringC.width = s * dpr;
    ringC.height = s * dpr;
    ringW = s * dpr;
  }
  rx.setTransform(dpr, 0, 0, dpr, 0, 0);
  rx.clearRect(0, 0, s, s);
  analyser.getByteFrequencyData(dataArr);

  const cx = s / 2, cy = s / 2;
  const baseR = s * .3;
  const bars = 160;
  const step = Math.max(1, Math.floor(dataArr.length / bars));
  const track = TRACKS[curIdx];
  const hue = track.hue;

  for (let i = 0; i < bars; i++) {
    const v = dataArr[Math.min(i * step, dataArr.length - 1)] / 255;
    const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
    const barLen = v * s * .18 + 2;
    const r1 = baseR + v * 6;
    const r2 = r1 + barLen;
    const x1 = cx + Math.cos(angle) * r1;
    const y1 = cy + Math.sin(angle) * r1;
    const x2 = cx + Math.cos(angle) * r2;
    const y2 = cy + Math.sin(angle) * r2;
    const h = (hue + i / bars * 40) % 360;
    const a = .12 + v * .8;
    rx.strokeStyle = `hsla(${h}, 70%, ${50 + v * 25}%, ${a})`;
    rx.lineWidth = 2;
    rx.lineCap = 'round';
    rx.beginPath();
    rx.moveTo(x1, y1);
    rx.lineTo(x2, y2);
    rx.stroke();
    if (v > .4) {
      rx.beginPath();
      rx.arc(x2, y2, 1 + v * 3, 0, Math.PI * 2);
      rx.fillStyle = `hsla(${h}, 80%, 70%, ${v * .4})`;
      rx.fill();
    }
  }

  // Inner waveform ring
  rx.beginPath();
  const wBars = 80;
  for (let i = 0; i <= wBars; i++) {
    const v = dataArr[Math.min(i * step, dataArr.length - 1)] / 255;
    const angle = (i / wBars) * Math.PI * 2 - Math.PI / 2;
    const r = baseR * .6 + v * baseR * .35;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) rx.moveTo(x, y); else rx.lineTo(x, y);
  }
  rx.closePath();
  rx.strokeStyle = `hsla(${hue}, 60%, 55%, .2)`;
  rx.lineWidth = 1.5;
  rx.stroke();

  // Center dot
  let avg = 0;
  for (let i = 0; i < dataArr.length; i++) avg += dataArr[i];
  avg = avg / dataArr.length / 255;
  const dotR = 4 + avg * 10;
  rx.beginPath();
  rx.arc(cx, cy, dotR, 0, Math.PI * 2);
  rx.fillStyle = `hsla(${hue}, 70%, 60%, ${.2 + avg * .5})`;
  rx.fill();
}

// ===== WAVE BARS =====
const waveC = document.getElementById('waveCanvas');
const wx = waveC.getContext('2d');
let waveW = 0;
function drawWave() {
  requestAnimationFrame(drawWave);
  if (!analyser) return;
  const wrap = waveC.parentElement;
  const w = wrap.offsetWidth;
  const h = wrap.offsetHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  if (waveW !== w * dpr) {
    waveC.width = w * dpr;
    waveC.height = h * dpr;
    waveW = w * dpr;
  }
  wx.setTransform(dpr, 0, 0, dpr, 0, 0);
  wx.clearRect(0, 0, w, h);
  analyser.getByteFrequencyData(dataArr);

  const bars = 70;
  const step = Math.max(1, Math.floor(dataArr.length / bars));
  const bw = w / bars;
  const track = TRACKS[curIdx];
  const hue = track.hue;

  for (let i = 0; i < bars; i++) {
    const v = dataArr[Math.min(i * step, dataArr.length - 1)] / 255;
    const bh = v * h * .8 + 1;
    const x = i * bw;
    const y = h - bh;
    const h2 = (hue + i / bars * 40) % 360;
    const grad = wx.createLinearGradient(x, y, x, h);
    grad.addColorStop(0, `hsla(${h2}, 70%, 60%, ${v * .8})`);
    grad.addColorStop(.3, `hsla(${h2}, 60%, 45%, ${v * .4})`);
    grad.addColorStop(1, `hsla(${h2}, 50%, 30%, 0)`);
    wx.fillStyle = grad;
    wx.beginPath();
    wx.roundRect(x + 1, y, bw - 2, bh, [3, 3, 0, 0]);
    wx.fill();
  }
}

// ===== PARTICLES =====
const pCanvas = document.getElementById('particlesCanvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];
let pW = 0, pH = 0;

function initParticles() {
  particles = [];
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - .5) * .2,
      vy: -.15 - Math.random() * .4,
      size: 1 + Math.random() * 2.5,
      hue: 10 + Math.random() * 30,
      alpha: .1 + Math.random() * .3,
      life: Math.random(),
    });
  }
}

function drawParticles() {
  requestAnimationFrame(drawParticles);
  const w = window.innerWidth;
  const h = window.innerHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  if (pW !== w * dpr || pH !== h * dpr) {
    pCanvas.width = w * dpr;
    pCanvas.height = h * dpr;
    pW = w * dpr;
    pH = h * dpr;
  }
  pCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  pCtx.clearRect(0, 0, w, h);

  let avg = 0;
  if (analyser && playing) {
    analyser.getByteFrequencyData(dataArr);
    for (let i = 0; i < dataArr.length; i++) avg += dataArr[i];
    avg = avg / dataArr.length / 255;
  }

  const boost = playing ? 1 + avg * 2.5 : 1;
  const track = TRACKS[curIdx];

  for (const p of particles) {
    p.life += .003 * boost;
    if (p.life > 1) {
      p.life = 0;
      p.x = Math.random() * w;
      p.y = h + 10;
    }
    p.x += p.vx * boost;
    p.y += p.vy * boost;

    const fadeIn = Math.min(p.life * 5, 1);
    const fadeOut = Math.max(1 - (p.life - .7) / .3, 0);
    const a = p.alpha * fadeIn * (p.life > .7 ? fadeOut : 1) * (playing ? (.4 + avg * .6) : .15);
    const s = p.size * (playing ? (1 + avg * .4) : 1);
    const hue = playing ? (track.hue + avg * 40) % 360 : p.hue;

    pCtx.beginPath();
    pCtx.arc(p.x, p.y, s, 0, Math.PI * 2);
    pCtx.fillStyle = `hsla(${hue}, 60%, 60%, ${a})`;
    pCtx.fill();
  }
}

// ===== REACTIVE LOOP =====
function reactLoop() {
  requestAnimationFrame(reactLoop);
  if (!analyser || !playing) return;
  analyser.getByteFrequencyData(dataArr);

  let sum = 0;
  for (let i = 0; i < dataArr.length; i++) sum += dataArr[i];
  const avg = sum / dataArr.length / 255;
  const bass = dataArr[Math.floor(dataArr.length * .05)] / 255;
  const mid = dataArr[Math.floor(dataArr.length * .3)] / 255;
  const now = Date.now();

  // ORBS — motivated: breathe with bass, not random
  document.querySelectorAll('.orb').forEach((o, i) => {
    const s = 1 + bass * .3 * ((i % 2) ? 1 : -1) + mid * .1;
    const tx = Math.sin(now / (2500 + i * 600)) * 35 * (avg + .15);
    const ty = Math.cos(now / (3500 + i * 800)) * 30 * (avg + .15);
    o.style.transform = `translate(${tx}px,${ty}px) scale(${s})`;
    o.style.opacity = (.1 + avg * .6).toFixed(3);
    o.style.filter = `blur(${70 + bass * 40}px)`;
  });
}

// ===== RESOLVE YOUTUBE =====
async function resolveYT(ytId) {
  setStatus('resolving...');
  for (const h of INV) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 5000);
      const r = await fetch(`${h}/api/v1/videos/${ytId}?fields=title,author,adaptiveFormats,formatStreams`, {signal: ctrl.signal});
      clearTimeout(t);
      if (!r.ok) continue;
      const d = await r.json();
      let url = null;
      if (d.adaptiveFormats) {
        const af = d.adaptiveFormats.filter(f => f.type && f.type.startsWith('audio/')).sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0));
        if (af.length) url = af[0].url;
      }
      if (!url && d.formatStreams) {
        for (const f of d.formatStreams) { if (f.url) { url = f.url; break; } }
      }
      if (url) {
        if (d.title) TRACKS[curIdx].resolvedTitle = d.title;
        if (d.author) TRACKS[curIdx].resolvedArtist = d.author;
        return url;
      }
    } catch(e) {}
  }
  return null;
}

// ===== LOAD TRACK =====
async function loadTrack(idx) {
  curIdx = idx;
  const t = TRACKS[idx];
  const title = t.resolvedTitle || t.title;
  const artist = t.resolvedArtist || t.artist;

  document.getElementById('npTitle').textContent = title;
  document.getElementById('npArtist').textContent = artist;
  document.getElementById('pbMiniTitle').textContent = title;
  document.getElementById('pbMiniArtist').textContent = artist;

  const mc = document.getElementById('pbMiniArt');
  const mctx = mc.getContext('2d');
  mctx.drawImage(ensureArt(idx), 0, 0, 88, 88);

  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({title, artist, album: 'NovaBeats'});
  }

  document.querySelectorAll('.q-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  const url = await resolveYT(t.yt);
  if (url) {
    audio.src = url;
    audio.load();
    setStatus('ready', false, true);
  } else {
    setStatus('resolve failed', true);
    setTimeout(() => loadTrack(idx), 3000);
  }
}

// ===== PLAY/PAUSE =====
function doPlay() {
  initAudio();
  if (audioCtx?.state === 'suspended') audioCtx.resume();
  audio.play().catch(e => console.warn(e));
}
function doPause() { audio.pause(); }
function toggle() { playing ? doPause() : doPlay(); }

function updatePlayIcon(isPlaying) {
  const icon = document.getElementById('playIcon');
  icon.innerHTML = isPlaying
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

function onPlay() {
  playing = true;
  document.body.classList.add('playing');
  updatePlayIcon(true);
  document.getElementById('playBtn').setAttribute('aria-label', 'Pause');
  startProg();
}
function onPause() {
  playing = false;
  document.body.classList.remove('playing');
  updatePlayIcon(false);
  document.getElementById('playBtn').setAttribute('aria-label', 'Play');
  clearInterval(progIv);
}

audio.addEventListener('play', onPlay);
audio.addEventListener('pause', onPause);
audio.addEventListener('ended', () => {
  if (repeat === 1) { audio.currentTime = 0; audio.play(); return; }
  playNext();
});
audio.addEventListener('error', () => {
  setStatus('playback error', true);
  setTimeout(() => loadTrack(curIdx), 2000);
});

let progIv;
function startProg() {
  clearInterval(progIv);
  progIv = setInterval(() => {
    const c = audio.currentTime || 0;
    const d = audio.duration || 0;
    if (d > 0) {
      document.getElementById('pbFill').style.width = (c / d * 100) + '%';
      document.getElementById('curTime').textContent = fmt(c);
      document.getElementById('totTime').textContent = fmt(d);
    }
  }, 120);
}

// ===== NAVIGATION =====
function getNextIdx() {
  if (shuffle) {
    let n;
    do { n = Math.floor(Math.random() * TRACKS.length); } while (n === curIdx && TRACKS.length > 1);
    return n;
  }
  return (curIdx + 1) % TRACKS.length;
}
function playNext() {
  if (!TRACKS.length) return;
  if (repeat === 2) { loadTrack(curIdx); return; }
  loadTrack(getNextIdx());
  if (playing) doPlay();
}
function playPrev() {
  if (!TRACKS.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  loadTrack((curIdx - 1 + TRACKS.length) % TRACKS.length);
  if (playing) doPlay();
}

// ===== CONTROLS =====
document.getElementById('playBtn').addEventListener('click', toggle);
document.getElementById('prevBtn').addEventListener('click', playPrev);
document.getElementById('nextBtn').addEventListener('click', playNext);
document.getElementById('shuffleBtn').addEventListener('click', () => {
  shuffle = !shuffle;
  document.getElementById('shuffleBtn').classList.toggle('active', shuffle);
});
document.getElementById('repeatBtn').addEventListener('click', () => {
  repeat = (repeat + 1) % 3;
  const b = document.getElementById('repeatBtn');
  b.classList.toggle('active', repeat > 0);
  // Update repeat icon for repeat-one
  if (repeat === 2) {
    b.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/><text x="12" y="15" text-anchor="middle" font-size="7" fill="currentColor" font-weight="700">1</text></svg>';
  } else {
    b.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>';
  }
});

// Volume
const volS = document.getElementById('volSlider');
const muteB = document.getElementById('muteBtn');
volS.addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  audio.volume = v;
  updateVolIcon(v, audio.muted);
});
muteB.addEventListener('click', () => {
  audio.muted = !audio.muted;
  updateVolIcon(audio.volume, audio.muted);
});
function updateVolIcon(vol, muted) {
  const icon = muteB.querySelector('svg');
  if (muted || vol === 0) {
    icon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>';
  } else if (vol < .5) {
    icon.innerHTML = '<path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/></svg>';
  } else {
    icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>';
  }
}

// Progress seek
document.getElementById('pbProgress').addEventListener('click', e => {
  const r = e.currentTarget.getBoundingClientRect();
  if (audio.duration) audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});

// Sidebar toggle
document.getElementById('sbToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

// Click anywhere to start
document.addEventListener('click', function firstClick() {
  if (!playing && TRACKS.length) { doPlay(); }
}, {once: true});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.code) {
    case 'Space': e.preventDefault(); toggle(); break;
    case 'ArrowRight': e.preventDefault(); if (audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 5); break;
    case 'ArrowLeft': e.preventDefault(); audio.currentTime = Math.max(0, audio.currentTime - 5); break;
    case 'ArrowUp': e.preventDefault(); { const v = Math.min(1, audio.volume + .05); audio.volume = v; volS.value = v; updateVolIcon(v, false); } break;
    case 'ArrowDown': e.preventDefault(); { const v = Math.max(0, audio.volume - .05); audio.volume = v; volS.value = v; updateVolIcon(v, false); } break;
  }
});

// Media Session
if ('mediaSession' in navigator) {
  navigator.mediaSession.setActionHandler('play', doPlay);
  navigator.mediaSession.setActionHandler('pause', doPause);
  navigator.mediaSession.setActionHandler('previoustrack', playPrev);
  navigator.mediaSession.setActionHandler('nexttrack', playNext);
}

// ===== HELPERS =====
function setStatus(msg, isErr, isReady) {
  const el = document.getElementById('loadStatus');
  el.textContent = msg;
  el.className = 'load-status' + (isErr ? ' error' : isReady ? ' ready' : '');
}
function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// ===== INIT =====
initParticles();
buildQueue();
loadTrack(0);
</script>
