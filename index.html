<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NovaBeats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050508;--bg-surface:rgba(255,255,255,.025);--bg-hover:rgba(255,255,255,.05);
  --accent:#7c3aed;--accent2:#a855f7;--accent3:#ec4899;--cyan:#06b6d4;
  --text:#f0f0f5;--dim:#5a5a72;--border:rgba(255,255,255,.06);
  --glass:rgba(12,12,18,.75);--glass-border:rgba(255,255,255,.08);
  --r:20px;--r-sm:14px;
  --glow-intensity:0;
}
html{scroll-behavior:smooth}
body{
  font-family:'Plus Jakarta Sans',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background .8s;
}
body.playing{background:#020204}

/* ===== ANIMATED MESH BACKGROUND ===== */
.mesh-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  opacity:.6;transition:opacity 1.2s;
}
body.playing .mesh-bg{opacity:1}
.mesh-blob{
  position:absolute;border-radius:50%;filter:blur(100px);
  transition:all .3s;will-change:transform,opacity;
}
.mesh-blob.b1{
  width:600px;height:600px;left:-10%;top:-15%;
  background:radial-gradient(circle,rgba(124,58,237,.25),transparent 70%);
}
.mesh-blob.b2{
  width:500px;height:500px;right:-8%;bottom:-10%;
  background:radial-gradient(circle,rgba(168,85,247,.2),transparent 70%);
}
.mesh-blob.b3{
  width:450px;height:450px;left:40%;top:50%;
  background:radial-gradient(circle,rgba(236,72,153,.15),transparent 70%);
}
.mesh-blob.b4{
  width:350px;height:350px;right:25%;top:15%;
  background:radial-gradient(circle,rgba(6,182,212,.12),transparent 70%);
}
body.playing .mesh-blob{animation:meshPulse 4s ease-in-out infinite}
body.playing .mesh-blob.b2{animation-delay:1s}
body.playing .mesh-blob.b3{animation-delay:2s}
body.playing .mesh-blob.b4{animation-delay:.5s}
@keyframes meshPulse{
  0%,100%{transform:scale(1) translate(0,0);opacity:.7}
  25%{transform:scale(1.15) translate(20px,-15px);opacity:1}
  50%{transform:scale(.9) translate(-10px,20px);opacity:.6}
  75%{transform:scale(1.1) translate(15px,10px);opacity:.9}
}

/* ===== PARTICLES ===== */
.particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.particle{
  position:absolute;border-radius:50%;
  opacity:0;pointer-events:none;
  animation:particleFloat linear infinite;
}
@keyframes particleFloat{
  0%{transform:translateY(105vh) scale(0);opacity:0}
  5%{opacity:.8}
  95%{opacity:.8}
  100%{transform:translateY(-5vh) scale(1);opacity:0}
}

/* ===== GRID OVERLAY ===== */
.grid-overlay{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(124,58,237,.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(124,58,237,.015) 1px,transparent 1px);
  background-size:80px 80px;
  mask-image:radial-gradient(ellipse at 50% 40%,black 15%,transparent 65%);
  opacity:.5;transition:opacity 1s;
}
body.playing .grid-overlay{opacity:1}

/* ===== APP CONTAINER ===== */
.app{
  position:relative;z-index:1;
  max-width:1100px;margin:0 auto;
  padding:28px 24px 220px;
}

/* ===== HEADER ===== */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 0 36px;
}
.logo{
  font-size:32px;font-weight:900;letter-spacing:-1.5px;
  background:linear-gradient(135deg,#fff 20%,var(--accent2) 50%,var(--accent3) 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  position:relative;
}
.logo::after{
  content:'';position:absolute;bottom:-4px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent3),var(--cyan));
  border-radius:2px;opacity:.6;
}
.header-pill{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:40px;
  font-size:12px;color:var(--dim);
  font-weight:500;
}
.header-pill .dot{
  width:6px;height:6px;border-radius:50%;background:#22c55e;
  box-shadow:0 0 8px rgba(34,197,94,.5);
}

/* ===== GLASS PANEL ===== */
.glass{
  background:linear-gradient(160deg,rgba(255,255,255,.04),rgba(255,255,255,.015));
  border:1px solid var(--glass-border);
  border-radius:var(--r);
  backdrop-filter:blur(30px) saturate(1.3);
  -webkit-backdrop-filter:blur(30px) saturate(1.3);
  box-shadow:0 24px 64px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);
  position:relative;overflow:hidden;
}
.glass::before{
  content:'';position:absolute;inset:0;
  border-radius:inherit;padding:1px;
  background:linear-gradient(135deg,rgba(124,58,237,.25),transparent 35%,rgba(236,72,153,.15) 65%,rgba(6,182,212,.1));
  mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  pointer-events:none;opacity:.5;
  transition:opacity .6s;
}
body.playing .glass::before{opacity:.9}

/* ===== SEARCH ===== */
.search-wrap{margin-bottom:28px}
.search-inner{
  position:relative;
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:50px;
  transition:all .3s;
  overflow:hidden;
}
.search-inner:focus-within{
  border-color:rgba(124,58,237,.4);
  box-shadow:0 0 0 4px rgba(124,58,237,.1),0 8px 32px rgba(0,0,0,.3);
}
.search-inner input{
  width:100%;padding:16px 20px 16px 50px;
  background:transparent;border:none;
  color:var(--text);font-size:15px;
  font-family:inherit;outline:none;
}
.search-inner input::placeholder{color:var(--dim)}
.search-icon{
  position:absolute;left:18px;top:50%;transform:translateY(-50%);
  font-size:16px;opacity:.4;
}

/* ===== TABS ===== */
.tabs{
  display:flex;gap:4px;margin-bottom:28px;
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:14px;padding:4px;
  width:fit-content;
}
.tab{
  padding:10px 20px;
  border-radius:10px;
  font-size:13px;font-weight:600;
  cursor:pointer;transition:all .25s;
  color:var(--dim);background:transparent;
  border:none;font-family:inherit;
  letter-spacing:-.2px;
}
.tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab.active{
  color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 4px 16px rgba(124,58,237,.3);
}

/* ===== VISUALIZER ===== */
.viz-wrap{
  width:100%;height:120px;
  margin-bottom:24px;
  border-radius:var(--r);
  overflow:hidden;
  background:rgba(0,0,0,.5);
  border:1px solid var(--border);
  position:relative;
}
#visualizer{width:100%;height:100%;display:block}
.viz-glow{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 100%,rgba(124,58,237,.15),transparent 70%);
  opacity:0;transition:opacity .5s;pointer-events:none;
}
body.playing .viz-glow{opacity:1}

/* ===== NOW PLAYING HERO ===== */
.np-hero{
  display:none;
  padding:28px;
  margin-bottom:28px;
  align-items:center;gap:24px;
}
.np-hero.show{display:flex}

.np-art-wrap{
  position:relative;flex-shrink:0;
}
.np-art{
  width:120px;height:120px;
  border-radius:18px;overflow:hidden;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
  transition:transform .5s,box-shadow .5s;
  position:relative;
}
.np-art img{width:100%;height:100%;object-fit:cover;display:block}
body.playing .np-art{
  transform:scale(1.03);
  box-shadow:0 16px 60px rgba(124,58,237,.3),0 8px 30px rgba(0,0,0,.5);
}
.np-art-glow{
  position:absolute;inset:-20px;
  border-radius:30px;
  background:radial-gradient(circle,rgba(124,58,237,.3),transparent 70%);
  opacity:0;transition:opacity .8s;filter:blur(20px);
  z-index:-1;
}
body.playing .np-art-glow{opacity:1;animation:glowPulse 3s ease-in-out infinite}
@keyframes glowPulse{
  0%,100%{opacity:.4;transform:scale(1)}
  50%{opacity:.7;transform:scale(1.1)}
}

.np-info{flex:1;min-width:0}
.np-label{
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:1.5px;
  color:var(--accent2);margin-bottom:8px;
}
.np-title{
  font-size:26px;font-weight:800;
  letter-spacing:-.8px;line-height:1.2;
  margin-bottom:6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.np-artist{
  font-size:15px;color:var(--dim);font-weight:500;
}
.np-badge{
  display:inline-block;margin-top:10px;
  font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:6px;
  text-transform:uppercase;letter-spacing:.5px;
}
.np-badge.yt{background:rgba(255,0,0,.12);color:#ff4444}
.np-badge.local{background:rgba(34,197,94,.12);color:#22c55e}

/* ===== YOUTUBE ADD ===== */
.section-head{
  font-size:15px;font-weight:700;
  letter-spacing:-.3px;
  margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.section-head .num{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:600;
  padding:3px 8px;border-radius:6px;
  background:rgba(124,58,237,.12);color:var(--accent2);
}

.yt-add{
  display:flex;gap:10px;margin-bottom:32px;
}
.yt-add input{
  flex:1;padding:16px 22px;
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:16px;
  color:var(--text);font-size:14px;
  font-family:inherit;outline:none;
  transition:all .3s;
}
.yt-add input:focus{
  border-color:rgba(124,58,237,.4);
  box-shadow:0 0 0 4px rgba(124,58,237,.08);
}
.yt-add input::placeholder{color:var(--dim)}
.yt-add button{
  padding:16px 28px;
  background:linear-gradient(135deg,#ff0000,#cc0000);
  border:none;border-radius:16px;
  color:#fff;font-weight:700;font-size:14px;
  font-family:inherit;cursor:pointer;
  transition:all .25s;white-space:nowrap;
  position:relative;overflow:hidden;
}
.yt-add button::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  transform:translateX(-100%);transition:transform .5s;
}
.yt-add button:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(255,0,0,.25);
}
.yt-add button:hover::before{transform:translateX(100%)}

/* ===== UPLOAD ===== */
.upload-zone{
  border:2px dashed rgba(124,58,237,.2);
  border-radius:var(--r);
  padding:36px 24px;
  text-align:center;cursor:pointer;
  transition:all .3s;margin-bottom:32px;
  background:rgba(124,58,237,.015);
  position:relative;overflow:hidden;
}
.upload-zone:hover{
  border-color:rgba(124,58,237,.5);
  background:rgba(124,58,237,.04);
}
.upload-zone.dragover{
  border-color:var(--accent);
  background:rgba(124,58,237,.08);
  transform:scale(1.01);
}
.upload-zone .icon{font-size:36px;margin-bottom:8px;opacity:.6}
.upload-zone .text{font-size:14px;color:var(--dim)}
.upload-zone .text strong{color:var(--accent2)}
.upload-zone .sub{font-size:11px;color:var(--dim);opacity:.5;margin-top:4px}
#fileInput{display:none}

/* ===== PLAYLIST ===== */
.playlist-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(310px,1fr));
  gap:10px;margin-bottom:40px;
}

.track-card{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  cursor:pointer;
  transition:transform .25s,background .25s,border-color .25s,box-shadow .25s;
  position:relative;overflow:hidden;
}
.track-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(110deg,transparent 38%,rgba(255,255,255,.04) 48%,transparent 58%);
  transform:translateX(-130%) skewX(-10deg);
  pointer-events:none;
}
.track-card:hover{
  background:var(--bg-hover);
  border-color:rgba(124,58,237,.2);
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,.3);
}
.track-card:hover::after{
  animation:shimmer 1.2s ease forwards;
}
@keyframes shimmer{
  100%{transform:translateX(130%) skewX(-10deg)}
}
.track-card.active{
  background:rgba(124,58,237,.06);
  border-color:rgba(124,58,237,.3);
  box-shadow:0 0 0 1px rgba(124,58,237,.15),0 8px 32px rgba(0,0,0,.3);
}
.track-card.active::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--accent),var(--accent3));
}

.track-art{
  width:50px;height:50px;
  border-radius:12px;overflow:hidden;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  display:flex;align-items:center;justify-content:center;
  font-size:20px;position:relative;
}
.track-art img{width:100%;height:100%;object-fit:cover}

.track-info{flex:1;min-width:0}
.track-name{
  font-weight:600;font-size:13px;letter-spacing:-.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.track-meta{
  display:flex;align-items:center;gap:6px;margin-top:3px;
}
.track-artist{
  font-size:11px;color:var(--dim);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.track-tag{
  font-size:9px;padding:2px 6px;border-radius:4px;
  font-weight:700;text-transform:uppercase;letter-spacing:.3px;
  flex-shrink:0;
}
.track-tag.yt{background:rgba(255,0,0,.1);color:#ff4444}
.track-tag.local{background:rgba(34,197,94,.1);color:#22c55e}
.track-dur{font-size:11px;color:var(--dim);flex-shrink:0;font-variant-numeric:tabular-nums}

.eq-bars{display:none;gap:2px;align-items:flex-end;height:14px}
.track-card.active.playing .eq-bars{display:flex}
.eq-bar{
  width:3px;background:var(--accent2);border-radius:2px;
  animation:eq .8s ease-in-out infinite;
}
.eq-bar:nth-child(1){height:40%;animation-delay:0s}
.eq-bar:nth-child(2){height:80%;animation-delay:.2s}
.eq-bar:nth-child(3){height:60%;animation-delay:.4s}
@keyframes eq{
  0%,100%{height:25%}50%{height:100%}
}

.empty-state{
  text-align:center;padding:60px 20px;color:var(--dim);
}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.3}
.empty-state p{font-size:14px}

/* ===== PLAYER BAR ===== */
.player-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(8,8,14,.9);
  backdrop-filter:blur(60px) saturate(1.4);
  -webkit-backdrop-filter:blur(60px) saturate(1.4);
  border-top:1px solid rgba(255,255,255,.06);
  z-index:100;display:none;
  box-shadow:0 -8px 40px rgba(0,0,0,.4);
}
.player-bar.show{display:block}

.progress-wrap{
  width:100%;height:4px;background:rgba(255,255,255,.04);
  cursor:pointer;position:relative;transition:height .15s;
}
.progress-wrap:hover{height:6px}
.progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));
  border-radius:0 3px 3px 0;
  position:relative;transition:width .15s linear;
}
.progress-fill::after{
  content:'';position:absolute;right:-7px;top:50%;
  transform:translateY(-50%);width:14px;height:14px;
  background:#fff;border-radius:50%;
  opacity:0;transition:opacity .15s;
  box-shadow:0 0 12px rgba(124,58,237,.6);
}
.progress-wrap:hover .progress-fill::after{opacity:1}

.player-inner{
  display:flex;align-items:center;
  padding:12px 28px 18px;gap:20px;
  max-width:1100px;margin:0 auto;
}

.p-track{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
.p-art{
  width:50px;height:50px;border-radius:12px;overflow:hidden;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
  transition:box-shadow .5s;
}
body.playing .p-art{box-shadow:0 4px 24px rgba(124,58,237,.3)}
.p-art img{width:100%;height:100%;object-fit:cover}
.p-info{min-width:0}
.p-title{
  font-weight:700;font-size:13px;letter-spacing:-.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;
}
.p-artist{
  font-size:11px;color:var(--dim);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.p-time{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--dim);
  font-variant-numeric:tabular-nums;
  font-family:'JetBrains Mono',monospace;
  flex-shrink:0;
}

.controls{display:flex;align-items:center;gap:10px}
.ctrl{
  background:none;border:none;color:var(--dim);
  cursor:pointer;padding:8px;border-radius:50%;
  transition:all .2s;display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.ctrl:hover{color:var(--text);background:rgba(255,255,255,.06)}
.ctrl.active{color:var(--accent2)}

.play-ctrl{
  width:50px;height:50px;
  background:linear-gradient(135deg,var(--accent),var(--accent2)) !important;
  color:#fff !important;border-radius:50%;
  font-size:20px;
  box-shadow:0 6px 24px rgba(124,58,237,.4);
  transition:all .25s;
}
.play-ctrl:hover{
  transform:scale(1.08);
  box-shadow:0 8px 32px rgba(124,58,237,.5);
}
.play-ctrl:active{transform:scale(.95)}

.vol-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.vol-slider{
  -webkit-appearance:none;appearance:none;
  width:80px;height:4px;background:rgba(255,255,255,.08);
  border-radius:2px;outline:none;cursor:pointer;
}
.vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  background:var(--accent2);border-radius:50%;cursor:pointer;
  box-shadow:0 0 8px rgba(168,85,247,.4);
}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:210px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(12,12,20,.9);
  backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  padding:14px 28px;border-radius:14px;
  font-size:13px;font-weight:500;
  opacity:0;transition:all .35s;z-index:200;
  pointer-events:none;white-space:nowrap;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .app{padding:16px 16px 220px}
  .header{padding:12px 0 24px}
  .logo{font-size:26px}
  .player-inner{padding:10px 16px 14px;gap:12px}
  .p-title{max-width:120px}
  .p-art{width:44px;height:44px;border-radius:10px}
  .vol-wrap{display:none}
  .p-time{display:none}
  .controls{gap:8px}
  .play-ctrl{width:44px;height:44px;font-size:18px}
  .np-hero{flex-direction:column;text-align:center;padding:20px}
  .np-art{width:100px;height:100px}
  .np-title{font-size:22px}
  .yt-add{flex-direction:column}
  .playlist-grid{grid-template-columns:1fr}
  .viz-wrap{height:80px}
  .tabs{width:100%}
  .tab{flex:1;text-align:center;padding:10px 12px;font-size:12px}
  .mesh-blob.b1{width:350px;height:350px}
  .mesh-blob.b2{width:300px;height:300px}
  .mesh-blob.b3{width:250px;height:250px}
  .mesh-blob.b4{display:none}
}

@media(prefers-reduced-motion:reduce){
  .mesh-blob,.particle,.eq-bar,.np-art-glow{animation:none !important}
  .track-card::after{display:none}
  .progress-fill::after{display:none}
}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.12)}

#ytPlayer{position:absolute;left:-9999px;width:1px;height:1px}
</style>
</head>
<body>

<!-- MESH BACKGROUND -->
<div class="mesh-bg">
  <div class="mesh-blob b1"></div>
  <div class="mesh-blob b2"></div>
  <div class="mesh-blob b3"></div>
  <div class="mesh-blob b4"></div>
</div>
<div class="grid-overlay"></div>
<div class="particles" id="particles"></div>

<!-- YT IFRAME -->
<div id="ytPlayer"></div>

<!-- APP -->
<div class="app">
  <div class="header">
    <div class="logo">NovaBeats</div>
    <div class="header-pill"><div class="dot"></div><span id="trackCount">0 tracks</span></div>
  </div>

  <div class="search-wrap">
    <div class="search-inner">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search tracks...">
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="all">🎵 All</button>
    <button class="tab" data-tab="youtube">▶️ YouTube</button>
    <button class="tab" data-tab="local">📁 Local</button>
  </div>

  <div class="viz-wrap glass">
    <canvas id="visualizer"></canvas>
    <div class="viz-glow"></div>
  </div>

  <!-- NOW PLAYING HERO -->
  <div class="np-hero glass" id="npHero">
    <div class="np-art-wrap">
      <div class="np-art" id="npArt"><img src="" id="npImg" alt=""></div>
      <div class="np-art-glow"></div>
    </div>
    <div class="np-info">
      <div class="np-label">Now Playing</div>
      <div class="np-title" id="npTitle">—</div>
      <div class="np-artist" id="npArtist">—</div>
      <div class="np-badge" id="npBadge"></div>
    </div>
  </div>

  <!-- YOUTUBE ADD -->
  <div class="section-head"><span class="num">01</span> Add from YouTube</div>
  <div class="yt-add">
    <input type="text" id="ytUrl" placeholder="Paste YouTube URL...">
    <button id="ytBtn">+ Add</button>
  </div>

  <!-- UPLOAD -->
  <div class="section-head"><span class="num">02</span> Upload Local Files</div>
  <div class="upload-zone" id="uploadZone">
    <div class="icon">📁</div>
    <div class="text"><strong>Click to upload</strong> or drag & drop</div>
    <div class="sub">MP3 · WAV · OGG · FLAC · M4A</div>
  </div>
  <input type="file" id="fileInput" multiple accept="audio/*">

  <!-- PLAYLIST -->
  <div class="section-head"><span class="num">03</span> Playlist <span id="plCount" style="font-weight:400;color:var(--dim)"></span></div>
  <div class="playlist-grid" id="playlist">
    <div class="empty-state"><div class="icon">🎵</div><p>Add tracks from YouTube or upload files</p></div>
  </div>
</div>

<!-- PLAYER BAR -->
<div class="player-bar" id="playerBar">
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="player-inner">
    <div class="p-track">
      <div class="p-art" id="pArt">🎵</div>
      <div class="p-info">
        <div class="p-title" id="pTitle">—</div>
        <div class="p-artist" id="pArtist">—</div>
      </div>
    </div>
    <div class="p-time"><span id="curTime">0:00</span><span>/</span><span id="totTime">0:00</span></div>
    <div class="controls">
      <button class="ctrl" id="shuffleBtn" title="Shuffle">🔀</button>
      <button class="ctrl" id="prevBtn" title="Previous">⏮</button>
      <button class="ctrl play-ctrl" id="playBtn" title="Play">▶</button>
      <button class="ctrl" id="nextBtn" title="Next">⏭</button>
      <button class="ctrl" id="repeatBtn" title="Repeat">🔁</button>
    </div>
    <div class="vol-wrap">
      <button class="ctrl" id="muteBtn" title="Mute">🔊</button>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step=".01" value=".8">
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
const tracks=[];
let curIdx=-1,playing=false,shuffle=false,repeat=0,srcType=null,ytOk=false;

// ===== AUDIO =====
const audio=new Audio();audio.volume=.8;

// ===== PARTICLES =====
(function initParticles(){
  const el=document.getElementById('particles');
  const colors=['rgba(124,58,237,.6)','rgba(168,85,247,.5)','rgba(236,72,153,.4)','rgba(6,182,212,.5)','rgba(255,255,255,.3)'];
  for(let i=0;i<30;i++){
    const p=document.createElement('div');p.className='particle';
    const size=2+Math.random()*4;
    const x=Math.random()*100;
    const dur=15+Math.random()*25;
    const delay=Math.random()*20;
    const c=colors[Math.floor(Math.random()*colors.length)];
    Object.assign(p.style,{
      width:size+'px',height:size+'px',
      left:x+'%',
      background:c,
      boxShadow:`0 0 ${size*3}px ${c},0 0 ${size*6}px ${c}`,
      animationDuration:dur+'s',
      animationDelay:delay+'s',
    });
    el.appendChild(p);
  }
})();

// ===== AUDIO-REACTIVE BACKGROUND =====
let audioCtx,analyser,dataArr,vizInited=false;

function initAudio(){
  if(vizInited)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();analyser.fftSize=256;
    dataArr=new Uint8Array(analyser.frequencyBinCount);
    const src=audioCtx.createMediaElementSource(audio);
    src.connect(analyser);analyser.connect(audioCtx.destination);
    vizInited=true;drawViz();reactLoop();
  }catch(e){}
}

const canvas=document.getElementById('visualizer');
const cx=canvas.getContext('2d');

function drawViz(){
  requestAnimationFrame(drawViz);
  if(!analyser)return;
  const w=canvas.offsetWidth*2,h=canvas.offsetHeight*2;
  if(canvas.width!==w)canvas.width=w;
  if(canvas.height!==h)canvas.height=h;
  cx.clearRect(0,0,w,h);
  analyser.getByteFrequencyData(dataArr);
  const n=dataArr.length,bw=(w/n)*1.8,gap=2;
  for(let i=0;i<n;i++){
    const v=dataArr[i]/255;
    const bh=v*h*.85,x=i*(bw+gap),y=h-bh;
    const g=cx.createLinearGradient(x,y,x,h);
    g.addColorStop(0,`rgba(168,85,247,${.4+v*.6})`);
    g.addColorStop(.4,`rgba(124,58,237,${.3+v*.6})`);
    g.addColorStop(.7,`rgba(236,72,153,${.2+v*.4})`);
    g.addColorStop(1,'rgba(124,58,237,.02)');
    cx.fillStyle=g;
    cx.beginPath();cx.roundRect(x,y,bw,bh,[3,3,0,0]);cx.fill();
    if(v>.6){
      cx.shadowColor='rgba(124,58,237,.5)';cx.shadowBlur=18;
      cx.fillStyle=`rgba(124,58,237,${v*.1})`;
      cx.fillRect(x,y,bw,bh);cx.shadowBlur=0;
    }
  }
}

// REACTIVE: mesh blobs + particles + glow intensity
function reactLoop(){
  requestAnimationFrame(reactLoop);
  if(!analyser||!playing)return;
  analyser.getByteFrequencyData(dataArr);
  let sum=0;for(let i=0;i<dataArr.length;i++)sum+=dataArr[i];
  const avg=sum/dataArr.length/255;// 0..1

  // Mesh blob scale reacts to bass
  const bass=dataArr[10]/255;
  const mid=dataArr[60]/255;
  document.querySelectorAll('.mesh-blob').forEach((b,i)=>{
    const s=1+bass*.25*(i%2?1:-1);
    b.style.transform=`scale(${s})`;
    b.style.opacity=(.5+avg*.5).toFixed(2);
  });

  // Particles speed up with energy
  const particles=document.querySelectorAll('.particle');
  const speedFactor=1+avg*1.5;
  particles.forEach(p=>{
    if(!p._baseDur){
      p._baseDur=parseFloat(p.style.animationDuration);
    }
    p.style.animationDuration=(p._baseDur/speedFactor)+'s';
  });

  // Grid overlay opacity
  document.querySelector('.grid-overlay').style.opacity=(.3+avg*.7).toFixed(2);

  // CSS var for potential use
  document.documentElement.style.setProperty('--glow-intensity',avg.toFixed(2));
}

// ===== YT IFRAME API =====
const ytTag=document.createElement('script');
ytTag.src='https://www.youtube.com/iframe_api';
document.head.appendChild(ytTag);

let ytPlayer;
window.onYouTubeIframeAPIReady=function(){
  ytOk=true;
  ytPlayer=new YT.Player('ytPlayer',{
    height:'1',width:'1',
    playerVars:{autoplay:0,controls:0,disablekb:1,fs:0,modestbranding:1},
    events:{
      onStateChange:onYT,
      onError:()=>toast('⚠️ YouTube error')
    }
  });
};

function onYT(e){
  if(e.data===YT.PlayerState.ENDED)handleEnd();
  else if(e.data===YT.PlayerState.PLAYING){
    playing=true;updateUI();startYTProg();
    document.body.classList.add('playing');
  }else if(e.data===YT.PlayerState.PAUSED){
    playing=false;updateUI();
    document.body.classList.remove('playing');
  }
}

let ytProgIv;
function startYTProg(){
  clearInterval(ytProgIv);
  ytProgIv=setInterval(()=>{
    if(!ytPlayer?.getDuration)return;
    const c=ytPlayer.getCurrentTime()||0,d=ytPlayer.getDuration()||0;
    if(d>0){
      document.getElementById('progressFill').style.width=(c/d*100)+'%';
      document.getElementById('curTime').textContent=fmt(c);
      document.getElementById('totTime').textContent=fmt(d);
    }
  },200);
}

// ===== DEFAULT TRACKS =====
tracks.push({
  name:'Faris Adam & Diva Aurel Body Pata Pata - Thailand Style',
  artist:'FX NOBLE',source:'youtube',
  ytId:'epLVftkQojw',
  thumb:'https://i.ytimg.com/vi/epLVftkQojw/hqdefault.jpg',
  url:null,dur:null
});

// ===== FILE UPLOAD =====
const upZone=document.getElementById('uploadZone');
const fileIn=document.getElementById('fileInput');
upZone.addEventListener('click',()=>fileIn.click());
upZone.addEventListener('dragover',e=>{e.preventDefault();upZone.classList.add('dragover')});
upZone.addEventListener('dragleave',()=>upZone.classList.remove('dragover'));
upZone.addEventListener('drop',e=>{e.preventDefault();upZone.classList.remove('dragover');addFiles(e.dataTransfer.files)});
fileIn.addEventListener('change',e=>addFiles(e.target.files));

function addFiles(files){
  const re=/\.(mp3|wav|ogg|flac|m4a|aac|webm)$/i;
  let n=0;
  for(const f of files){
    if(re.test(f.name)||/audio\//.test(f.type)){
      tracks.push({name:f.name.replace(re,''),artist:'Local File',source:'local',
        url:URL.createObjectURL(f),file:f,dur:null,thumb:null,ytId:null});
      n++;
    }
  }
  if(n){toast(`✅ Added ${n} track${n>1?'s':''}`);render();if(curIdx===-1)curIdx=0;}
}

// ===== YT ADD =====
document.getElementById('ytBtn').addEventListener('click',addYT);
document.getElementById('ytUrl').addEventListener('keydown',e=>{if(e.key==='Enter')addYT()});

function addYT(){
  const inp=document.getElementById('ytUrl');
  const url=inp.value.trim();if(!url)return;
  const m=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(!m){toast('❌ Invalid YouTube URL');return;}
  const vid=m[1];
  if(tracks.some(t=>t.ytId===vid)){toast('⚠️ Already added');return;}
  fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${vid}&format=json`)
    .then(r=>r.json()).then(d=>{
      tracks.push({name:d.title||vid,artist:d.author_name||'YouTube',source:'youtube',
        ytId:vid,thumb:d.thumbnail_url||`https://i.ytimg.com/vi/${vid}/hqdefault.jpg`,url:null,dur:null});
      toast(`✅ ${d.title||vid}`);inp.value='';render();
    }).catch(()=>{
      tracks.push({name:vid,artist:'YouTube',source:'youtube',ytId:vid,
        thumb:`https://i.ytimg.com/vi/${vid}/hqdefault.jpg`,url:null,dur:null});
      toast(`✅ ${vid}`);inp.value='';render();
    });
}

// ===== RENDER =====
let activeTab='all';
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');activeTab=t.dataset.tab;render();
  });
});

function render(filter=''){
  const grid=document.getElementById('playlist');
  const lo=filter.toLowerCase();
  let list=tracks.map((t,i)=>({...t,i}));
  if(activeTab!=='all')list=list.filter(t=>t.source===activeTab);
  if(filter)list=list.filter(t=>t.name.toLowerCase().includes(lo)||t.artist.toLowerCase().includes(lo));

  grid.innerHTML='';
  if(!list.length)grid.innerHTML=`<div class="empty-state"><div class="icon">🎵</div><p>${filter?'No matches':'No tracks yet'}</p></div>`;

  list.forEach(t=>{
    const active=t.i===curIdx;
    const card=document.createElement('div');
    card.className=`track-card${active?' active':''}${active&&playing?' playing':''}`;
    const art=t.thumb?`<img src="${t.thumb}" alt="">`:'🎵';
    const tag=t.source==='youtube'?'<span class="track-tag yt">YT</span>':'<span class="track-tag local">LOCAL</span>';
    card.innerHTML=`
      <div class="track-art">${art}</div>
      <div class="track-info">
        <div class="track-name">${esc(t.name)}</div>
        <div class="track-meta"><div class="track-artist">${esc(t.artist)}</div>${tag}</div>
      </div>
      <div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
      <div class="track-dur">${t.dur?fmt(t.dur):'—'}</div>`;
    card.addEventListener('click',()=>{
      if(t.i===curIdx)toggle();else{load(t.i);play();}
    });
    grid.appendChild(card);
  });

  const cnt=tracks.length;
  document.getElementById('plCount').textContent=list.length<cnt?`(${list.length}/${cnt})`:cnt?`(${cnt})`:'';
  document.getElementById('trackCount').textContent=`${cnt} track${cnt!==1?'s':''}`;
}

// ===== PLAYBACK =====
function load(i){
  if(i<0||i>=tracks.length)return;
  curIdx=i;const t=tracks[i];
  if(srcType==='local'){audio.pause();audio.currentTime=0;}
  if(srcType==='youtube'&&ytPlayer?.stopVideo)ytPlayer.stopVideo();
  clearInterval(ytProgIv);srcType=t.source;

  if(t.source==='youtube'){if(ytPlayer?.loadVideoById)ytPlayer.loadVideoById(t.ytId);}
  else{audio.src=t.url;audio.load();}

  updateNP(t);updatePB(t);render(document.getElementById('searchInput').value);
}

function play(){
  if(curIdx===-1&&tracks.length)load(0);
  if(curIdx===-1)return;
  initAudio();const t=tracks[curIdx];
  if(t.source==='youtube'){if(ytPlayer?.playVideo){if(audioCtx?.state==='suspended')audioCtx.resume();ytPlayer.playVideo();}}
  else{audio.play().then(()=>{playing=true;document.body.classList.add('playing');updateUI();render(document.getElementById('searchInput').value);}).catch(()=>{});}
}

function pause(){
  const t=tracks[curIdx];
  if(t?.source==='youtube'&&ytPlayer?.pauseVideo)ytPlayer.pauseVideo();
  else audio.pause();
  playing=false;document.body.classList.remove('playing');
  updateUI();render(document.getElementById('searchInput').value);
}

function toggle(){playing?pause():play();}

function next(){
  if(!tracks.length)return;
  let n=shuffle?Math.floor(Math.random()*tracks.length):(curIdx+1)%tracks.length;
  if(n===curIdx&&tracks.length>1)n=(n+1)%tracks.length;
  load(n);play();
}

function prev(){
  if(!tracks.length)return;
  const t=tracks[curIdx];
  const ct=t?.source==='youtube'?(ytPlayer?.getCurrentTime?.()||0):audio.currentTime;
  if(ct>3){if(t.source==='youtube'&&ytPlayer?.seekTo)ytPlayer.seekTo(0);else audio.currentTime=0;return;}
  let p=shuffle?Math.floor(Math.random()*tracks.length):(curIdx-1+tracks.length)%tracks.length;
  load(p);play();
}

function handleEnd(){
  if(repeat===2){const t=tracks[curIdx];if(t.source==='youtube'&&ytPlayer?.seekTo){ytPlayer.seekTo(0);ytPlayer.playVideo();}else{audio.currentTime=0;play();}}
  else if(repeat===1||curIdx<tracks.length-1)next();
  else pause();
}

// ===== UI =====
function updatePB(t){
  document.getElementById('playerBar').classList.add('show');
  const a=document.getElementById('pArt');
  a.innerHTML=t.thumb?`<img src="${t.thumb}" alt="">`:'🎵';
  document.getElementById('pTitle').textContent=t.name;
  document.getElementById('pArtist').textContent=t.artist;
}

function updateNP(t){
  const h=document.getElementById('npHero');h.classList.add('show');
  const img=document.getElementById('npImg');
  if(t.thumb){img.src=t.thumb;img.style.display='';}
  else img.style.display='none';
  document.getElementById('npTitle').textContent=t.name;
  document.getElementById('npArtist').textContent=t.artist;
  const b=document.getElementById('npBadge');
  b.textContent=t.source==='youtube'?'▶️ YouTube':'📁 Local';
  b.className='np-badge '+(t.source==='youtube'?'yt':'local');
}

function updateUI(){
  document.getElementById('playBtn').textContent=playing?'⏸':'▶';
  render(document.getElementById('searchInput').value);
}

// ===== CONTROLS =====
document.getElementById('playBtn').addEventListener('click',toggle);
document.getElementById('nextBtn').addEventListener('click',next);
document.getElementById('prevBtn').addEventListener('click',prev);

document.getElementById('shuffleBtn').addEventListener('click',()=>{
  shuffle=!shuffle;
  document.getElementById('shuffleBtn').classList.toggle('active',shuffle);
  toast(shuffle?'🔀 Shuffle ON':'🔀 Shuffle OFF');
});

document.getElementById('repeatBtn').addEventListener('click',()=>{
  repeat=(repeat+1)%3;
  const b=document.getElementById('repeatBtn');
  b.classList.toggle('active',repeat>0);
  b.textContent=repeat===2?'🔂':'🔁';
  toast(['🔁 Repeat OFF','🔁 Repeat ALL','🔂 Repeat ONE'][repeat]);
});

// Volume
const volS=document.getElementById('volSlider');
const muteB=document.getElementById('muteBtn');
volS.addEventListener('input',e=>{
  const v=parseFloat(e.target.value);audio.volume=v;
  if(ytPlayer?.setVolume)ytPlayer.setVolume(v*100);
  volIcon(v);
});
muteB.addEventListener('click',()=>{
  audio.muted=!audio.muted;
  if(ytPlayer){audio.muted?ytPlayer.mute():ytPlayer.unMute();}
  volIcon(audio.muted?0:audio.volume);
});
function volIcon(v){muteB.textContent=v===0?'🔇':v<.5?'🔉':'🔊';}

// Progress seek
document.getElementById('progressWrap').addEventListener('click',e=>{
  const r=e.currentTarget.getBoundingClientRect(),p=(e.clientX-r.left)/r.width;
  const t=tracks[curIdx];if(!t)return;
  if(t.source==='youtube'&&ytPlayer?.seekTo)ytPlayer.seekTo(p*ytPlayer.getDuration(),true);
  else if(audio.duration)audio.currentTime=p*audio.duration;
});

// Audio events
audio.addEventListener('timeupdate',()=>{
  if(srcType!=='local'||!audio.duration)return;
  document.getElementById('progressFill').style.width=(audio.currentTime/audio.duration*100)+'%';
  document.getElementById('curTime').textContent=fmt(audio.currentTime);
});
audio.addEventListener('loadedmetadata',()=>{
  if(srcType!=='local')return;
  document.getElementById('totTime').textContent=fmt(audio.duration);
  if(curIdx>=0)tracks[curIdx].dur=audio.duration;
  render(document.getElementById('searchInput').value);
});
audio.addEventListener('ended',()=>{if(srcType==='local')handleEnd();});
audio.addEventListener('play',()=>{document.body.classList.add('playing');});
audio.addEventListener('pause',()=>{if(!playing)document.body.classList.remove('playing');});

// Search
document.getElementById('searchInput').addEventListener('input',e=>render(e.target.value));

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  switch(e.code){
    case'Space':e.preventDefault();toggle();break;
    case'ArrowRight':{const t=tracks[curIdx];if(t?.source==='youtube'&&ytPlayer?.seekTo)ytPlayer.seekTo(ytPlayer.getCurrentTime()+5);else audio.currentTime+=5;}break;
    case'ArrowLeft':{const t=tracks[curIdx];if(t?.source==='youtube'&&ytPlayer?.seekTo)ytPlayer.seekTo(ytPlayer.getCurrentTime()-5);else audio.currentTime-=5;}break;
    case'ArrowUp':e.preventDefault();{const v=Math.min(1,audio.volume+.05);audio.volume=v;if(ytPlayer?.setVolume)ytPlayer.setVolume(v*100);volS.value=v;volIcon(v);}break;
    case'ArrowDown':e.preventDefault();{const v=Math.max(0,audio.volume-.05);audio.volume=v;if(ytPlayer?.setVolume)ytPlayer.setVolume(v*100);volS.value=v;volIcon(v);}break;
    case'KeyN':next();break;
    case'KeyP':prev();break;
  }
});

// Media Session
if('mediaSession' in navigator){
  navigator.mediaSession.setActionHandler('play',play);
  navigator.mediaSession.setActionHandler('pause',pause);
  navigator.mediaSession.setActionHandler('previoustrack',prev);
  navigator.mediaSession.setActionHandler('nexttrack',next);
}

// ===== HELPERS =====
function fmt(s){if(!s||isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

// ===== INIT =====
render();
</script>
</body>
</html>
