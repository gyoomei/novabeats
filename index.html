<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NovaBeats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#020204;--accent:#7c3aed;--accent2:#a855f7;--accent3:#ec4899;
  --cyan:#06b6d4;--text:#eaeaf0;--dim:#3a3a55;
}
html,body{
  font-family:'Plus Jakarta Sans',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  height:100%;overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ===== EXPERIENCE BG ===== */
.experience{position:fixed;inset:0;z-index:0;overflow:hidden;background:var(--bg)}

/* ===== ORBS — MASSIVE ===== */
.orb{
  position:absolute;border-radius:50%;
  filter:blur(100px);opacity:0;
  transition:opacity 3s ease;will-change:transform,opacity;
  pointer-events:none;
}
body.active .orb{opacity:1}
.orb.o1{width:90vmax;height:90vmax;left:-30%;top:-30%;background:radial-gradient(circle,rgba(124,58,237,.35),transparent 60%)}
.orb.o2{width:80vmax;height:80vmax;right:-25%;bottom:-25%;background:radial-gradient(circle,rgba(168,85,247,.3),transparent 60%)}
.orb.o3{width:70vmax;height:70vmax;left:20%;top:40%;background:radial-gradient(circle,rgba(236,72,153,.25),transparent 55%)}
.orb.o4{width:60vmax;height:60vmax;right:10%;top:5%;background:radial-gradient(circle,rgba(6,182,212,.22),transparent 55%)}
.orb.o5{width:75vmax;height:75vmax;left:-10%;bottom:0%;background:radial-gradient(circle,rgba(99,102,241,.25),transparent 55%)}
.orb.o6{width:50vmax;height:50vmax;left:50%;top:10%;background:radial-gradient(circle,rgba(244,114,182,.18),transparent 50%)}
.orb.o7{width:45vmax;height:45vmax;right:30%;bottom:10%;background:radial-gradient(circle,rgba(34,211,238,.15),transparent 50%)}

/* ===== PARTICLES ===== */
.particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.particle{position:absolute;border-radius:50%;opacity:0;animation:pFloat linear infinite}
@keyframes pFloat{
  0%{transform:translateY(110vh) rotate(0deg) scale(0);opacity:0}
  8%{opacity:1}85%{opacity:.5}
  100%{transform:translateY(-15vh) rotate(400deg) scale(.8);opacity:0}
}

/* ===== BEAMS ===== */
.beams{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.beam{
  position:absolute;width:2px;height:120%;top:-10%;
  opacity:.04;transform-origin:top center;
}

/* ===== WAVE BARS ===== */
.wave-wrap{position:fixed;bottom:0;left:0;right:0;height:200px;z-index:2;pointer-events:none}
.wave-wrap canvas{width:100%;height:100%;display:block}

/* ===== CENTER ===== */
.center-content{
  position:fixed;inset:0;z-index:3;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:transform .8s cubic-bezier(.4,0,.2,1),opacity .8s;
}

/* Ring */
.ring-wrap{position:relative;width:min(380px,70vmin);height:min(380px,70vmin);z-index:2}
.ring-canvas{width:100%;height:100%;display:block}
.ring-glow{
  position:absolute;inset:-50%;border-radius:50%;
  background:radial-gradient(circle,rgba(124,58,237,.12),transparent 45%);
  opacity:0;transition:opacity 2s;pointer-events:none;filter:blur(60px);z-index:-1;
}
body.active .ring-glow{opacity:1;animation:ringGlow 4s ease-in-out infinite}
@keyframes ringGlow{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.7;transform:scale(1.2)}}

/* Track Info */
.track-info{text-align:center;z-index:2}
.track-title{
  font-size:clamp(18px,4vw,28px);font-weight:800;
  letter-spacing:-1px;line-height:1.2;
  text-shadow:0 0 40px rgba(168,85,247,.4);
  max-width:85vw;
}
.track-artist{
  font-size:clamp(12px,2.5vw,15px);color:var(--dim);
  margin-top:6px;letter-spacing:1px;font-weight:500;
}

/* Play Button */
.play-btn-wrap{
  cursor:pointer;transition:transform .4s;user-select:none;
  -webkit-tap-highlight-color:transparent;z-index:2;
}
.play-btn-wrap:hover{transform:scale(1.1)}
.play-btn-wrap:active{transform:scale(.92)}
.play-ring{
  width:130px;height:130px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:40px;
  background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(168,85,247,.08));
  border:2px solid rgba(168,85,247,.25);
  position:relative;transition:all .4s;
}
body.active .play-ring{
  background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(236,72,153,.15));
  animation:playPulse 2.5s ease-in-out infinite;
}
@keyframes playPulse{
  0%,100%{box-shadow:0 0 30px rgba(124,58,237,.2),0 0 60px rgba(168,85,247,.1)}
  50%{box-shadow:0 0 60px rgba(124,58,237,.5),0 0 120px rgba(168,85,247,.25),0 0 200px rgba(236,72,153,.1)}
}
.play-ring .orbit{
  position:absolute;inset:-10px;border-radius:50%;
  border:1px solid rgba(168,85,247,.12);opacity:0;transition:opacity .8s;
}
body.active .play-ring .orbit{opacity:1;animation:orbitSpin 10s linear infinite}
.play-ring .orbit.o2{inset:-24px;border-color:rgba(236,72,153,.08);animation-duration:15s;animation-direction:reverse}
.play-ring .orbit.o3{inset:-38px;border-color:rgba(6,182,212,.06);animation-duration:20s}
@keyframes orbitSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Status */
.load-status{
  font-size:12px;color:var(--dim);letter-spacing:1px;
  text-align:center;z-index:2;
  min-height:18px;
}
.load-status.error{color:#ef4444}
.load-status.ready{color:var(--accent2)}

/* ===== CONTROLS (bottom bar) ===== */
.controls-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;
  opacity:0;pointer-events:none;transition:opacity .6s;
  padding-bottom:max(16px,env(safe-area-inset-bottom));
}
body.active .controls-bar,.controls-bar.show{opacity:1;pointer-events:auto}

/* Progress */
.progress-wrap{
  width:100%;height:4px;background:rgba(255,255,255,.04);
  cursor:pointer;position:relative;transition:height .2s;
}
.progress-wrap:hover{height:6px}
.progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));
  transition:width .15s linear;position:relative;
}
.progress-fill::after{
  content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%);
  width:12px;height:12px;border-radius:50%;background:var(--accent2);
  box-shadow:0 0 10px rgba(168,85,247,.6);opacity:0;transition:opacity .2s;
}
.progress-wrap:hover .progress-fill::after{opacity:1}

/* Control Row */
.ctrl-row{
  display:flex;align-items:center;gap:20px;
  padding:12px 20px 0;width:100%;justify-content:center;
}
.ctrl-btn{
  width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,.04);color:var(--text);
  font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:all .2s;backdrop-filter:blur(10px);
  -webkit-tap-highlight-color:transparent;
}
.ctrl-btn:hover{background:rgba(255,255,255,.1);transform:scale(1.1)}
.ctrl-btn:active{transform:scale(.9)}
.ctrl-btn.play{width:64px;height:64px;font-size:24px;background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.25)}
.ctrl-btn.play:hover{background:rgba(124,58,237,.3)}
.ctrl-btn.active{color:var(--accent2)!important}

/* Time */
.time-row{
  display:flex;align-items:center;gap:8px;padding:6px 20px 0;
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);
  font-variant-numeric:tabular-nums;width:100%;justify-content:center;
}

/* Volume */
.vol-wrap{
  position:fixed;top:24px;right:28px;z-index:20;
  display:flex;align-items:center;gap:8px;
  opacity:0;transition:opacity .6s;
}
body.active .vol-wrap,.vol-wrap.show{opacity:1}
.vol-slider{
  -webkit-appearance:none;appearance:none;
  width:100px;height:3px;background:rgba(255,255,255,.08);
  border-radius:2px;outline:none;cursor:pointer;
}
.vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;
  background:var(--accent2);border-radius:50%;cursor:pointer;
  box-shadow:0 0 8px rgba(168,85,247,.5);
}
.vol-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(255,255,255,.04);color:var(--text);
  font-size:16px;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
}
.vol-btn:hover{background:rgba(255,255,255,.1)}

/* Brand */
.brand{
  position:fixed;top:24px;left:28px;z-index:20;
  font-size:22px;font-weight:900;letter-spacing:-1px;
  background:linear-gradient(135deg,#fff 20%,var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  opacity:.6;transition:opacity .6s;
}
body.active .brand{opacity:1}

/* ===== LANDING HINT ===== */
.landing-hint{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
  font-size:12px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;
  animation:hintPulse 2s ease-in-out infinite;z-index:5;
  transition:opacity .6s;
}
body.active .landing-hint{opacity:0;pointer-events:none}
@keyframes hintPulse{0%,100%{opacity:.3}50%{opacity:.8}}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
  .orb,.particle,.play-ring .orbit{animation:none!important}
  .ring-glow{animation:none!important}
  .beam{display:none}
}
@media(max-width:600px){
  .play-ring{width:100px;height:100px;font-size:32px}
  .play-ring .orbit{inset:-6px}
  .play-ring .orbit.o2{inset:-16px}
  .play-ring .orbit.o3{display:none}
  .ring-wrap{width:min(280px,65vmin);height:min(280px,65vmin)}
  .ctrl-btn{width:42px;height:42px;font-size:16px}
  .ctrl-btn.play{width:56px;height:56px;font-size:22px}
  .wave-wrap{height:150px}
  .brand{left:16px;top:16px;font-size:18px}
  .vol-wrap{top:16px;right:16px}
  .vol-slider{width:70px}
  .orb{filter:blur(70px)}
}
</style>
</head>
<body>

<div class="experience">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="orb o4"></div>
  <div class="orb o5"></div>
  <div class="orb o6"></div>
  <div class="orb o7"></div>
</div>

<div class="beams" id="beams"></div>
<div class="particles" id="particles"></div>
<div class="wave-wrap"><canvas id="waveCanvas"></canvas></div>

<!-- CENTER -->
<div class="center-content" id="centerContent">
  <div class="ring-wrap">
    <canvas class="ring-canvas" id="ringCanvas"></canvas>
    <div class="ring-glow"></div>
  </div>
  <div class="track-info">
    <div class="track-title" id="trackTitle">NovaBeats</div>
    <div class="track-artist" id="trackArtist">loading...</div>
  </div>
  <div class="play-btn-wrap" id="playBtn">
    <div class="play-ring" id="playRing">
      ▶
      <div class="orbit"></div>
      <div class="orbit o2"></div>
      <div class="orbit o3"></div>
    </div>
  </div>
  <div class="load-status" id="loadStatus"></div>
</div>

<div class="brand">NovaBeats</div>

<!-- VOLUME -->
<div class="vol-wrap" id="volWrap">
  <button class="vol-btn" id="muteBtn">🔊</button>
  <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step=".01" value=".8">
</div>

<!-- CONTROLS -->
<div class="controls-bar" id="controlsBar">
  <div class="progress-wrap" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="ctrl-row">
    <button class="ctrl-btn" id="prevBtn">⏮</button>
    <button class="ctrl-btn play" id="miniPlay">▶</button>
    <button class="ctrl-btn" id="nextBtn">⏭</button>
    <button class="ctrl-btn" id="repeatBtn">🔁</button>
  </div>
  <div class="time-row">
    <span id="curTime">0:00</span><span>/</span><span id="totTime">0:00</span>
  </div>
</div>

<div class="landing-hint" id="landingHint">tap anywhere to play</div>

<script>
// ===== CURATED TRACKLIST (owner only) =====
const TRACKS=[
  {title:'Faris Adam & Diva Aurel — Body Pata Pata',artist:'Thailand Style · FX NOBLE',yt:'epLVftkQojw'},
  // Add more: {title:'...',artist:'...',yt:'VIDEO_ID'}
];

const INV=[
  'https://inv.nadeko.net','https://invidious.fdn.fr','https://yewtu.be',
  'https://vid.puffyan.us','https://invidious.lunar.icu','https://yt.artemislena.eu'
];

// ===== STATE =====
let playing=false,repeat=0,curIdx=0;
const audio=new Audio();audio.volume=.8;audio.preload='auto';audio.crossOrigin='anonymous';

// ===== PARTICLES =====
(function(){
  const el=document.getElementById('particles');
  const cols=['rgba(124,58,237,.8)','rgba(168,85,247,.7)','rgba(236,72,153,.6)','rgba(6,182,212,.7)','rgba(99,102,241,.6)','rgba(255,255,255,.35)','rgba(244,114,182,.5)'];
  for(let i=0;i<80;i++){
    const p=document.createElement('div');p.className='particle';
    const sz=2+Math.random()*8,x=Math.random()*100,dur=14+Math.random()*28,delay=Math.random()*20;
    const c=cols[Math.floor(Math.random()*cols.length)];
    Object.assign(p.style,{width:sz+'px',height:sz+'px',left:x+'%',background:c,boxShadow:`0 0 ${sz*5}px ${c},0 0 ${sz*10}px ${c}`,animationDuration:dur+'s',animationDelay:delay+'s'});
    el.appendChild(p);
  }
})();

// ===== BEAMS =====
(function(){
  const el=document.getElementById('beams');
  for(let i=0;i<18;i++){
    const b=document.createElement('div');b.className='beam';
    const x=Math.random()*100;
    const c=['var(--accent)','var(--accent2)','var(--accent3)','var(--cyan)'][Math.floor(Math.random()*4)];
    Object.assign(b.style,{left:x+'%',background:`linear-gradient(180deg,${c},transparent 70%)`,opacity:(.02+Math.random()*.06).toFixed(2),transform:`rotate(${-15+Math.random()*30}deg)`,animation:`beamPulse ${3+Math.random()*4}s ease-in-out infinite`,animationDelay:Math.random()*3+'s'});
    el.appendChild(b);
  }
  const s=document.createElement('style');
  s.textContent=`@keyframes beamPulse{0%,100%{opacity:.01;transform:scaleY(.7) rotate(var(--r,0deg))}50%{opacity:.08;transform:scaleY(1.1) rotate(var(--r,0deg))}}`;
  document.head.appendChild(s);
})();

// ===== AUDIO ENGINE =====
let audioCtx,analyser,dataArr,vizOk=false;
function initAudio(){
  if(vizOk)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();analyser.fftSize=1024;analyser.smoothingTimeConstant=.8;
    dataArr=new Uint8Array(analyser.frequencyBinCount);
    const src=audioCtx.createMediaElementSource(audio);
    src.connect(analyser);analyser.connect(audioCtx.destination);
    vizOk=true;drawRing();drawWave();reactLoop();
  }catch(e){console.warn('Audio init:',e)}
}

// ===== RING VISUALIZER =====
const ringC=document.getElementById('ringCanvas');
const rx=ringC.getContext('2d');
function drawRing(){
  requestAnimationFrame(drawRing);
  if(!analyser)return;
  const s=ringC.parentElement.offsetWidth,dpr=window.devicePixelRatio||1;
  ringC.width=s*dpr;ringC.height=s*dpr;rx.scale(dpr,dpr);rx.clearRect(0,0,s,s);
  analyser.getByteFrequencyData(dataArr);
  const cx=s/2,cy=s/2,baseR=s*.26,bars=180,step=Math.max(1,Math.floor(dataArr.length/bars));

  // Outer frequency ring
  for(let i=0;i<bars;i++){
    const v=dataArr[Math.min(i*step,dataArr.length-1)]/255;
    const angle=(i/bars)*Math.PI*2-Math.PI/2;
    const barLen=v*s*.24+1,r1=baseR+v*10,r2=r1+barLen;
    const x1=cx+Math.cos(angle)*r1,y1=cy+Math.sin(angle)*r1;
    const x2=cx+Math.cos(angle)*r2,y2=cy+Math.sin(angle)*r2;
    const hue=260+i/bars*100,a=.2+v*.8;
    rx.strokeStyle=`hsla(${hue},85%,${45+v*35}%,${a})`;rx.lineWidth=2;rx.lineCap='round';
    rx.beginPath();rx.moveTo(x1,y1);rx.lineTo(x2,y2);rx.stroke();
    if(v>.4){rx.beginPath();rx.arc(x2,y2,1+v*4,0,Math.PI*2);rx.fillStyle=`hsla(${hue},90%,70%,${v*.5})`;rx.fill()}
  }

  // Mid ring — waveform
  rx.beginPath();
  const wBars=90;
  for(let i=0;i<=wBars;i++){
    const v=dataArr[Math.min(i*step,dataArr.length-1)]/255;
    const angle=(i/wBars)*Math.PI*2-Math.PI/2;
    const r=baseR*.65+v*baseR*.3;
    const x=cx+Math.cos(angle)*r,y=cy+Math.sin(angle)*r;
    if(i===0)rx.moveTo(x,y);else rx.lineTo(x,y);
  }
  rx.closePath();
  const grd=rx.createRadialGradient(cx,cy,0,cx,cy,baseR*.7);
  grd.addColorStop(0,'rgba(124,58,237,.06)');grd.addColorStop(1,'rgba(168,85,247,.01)');
  rx.fillStyle=grd;rx.fill();rx.strokeStyle='rgba(168,85,247,.2)';rx.lineWidth=1.5;rx.stroke();

  // Inner glow dot
  let avg=0;for(let i=0;i<dataArr.length;i++)avg+=dataArr[i];avg=avg/dataArr.length/255;
  const dotR=5+avg*15;
  rx.beginPath();rx.arc(cx,cy,dotR,0,Math.PI*2);rx.fillStyle=`rgba(168,85,247,${.2+avg*.6})`;rx.fill();
  rx.beginPath();rx.arc(cx,cy,dotR+12,0,Math.PI*2);rx.strokeStyle=`rgba(168,85,247,${avg*.25})`;rx.lineWidth=1;rx.stroke();
  rx.beginPath();rx.arc(cx,cy,dotR+24,0,Math.PI*2);rx.strokeStyle=`rgba(236,72,153,${avg*.15})`;rx.lineWidth=.5;rx.stroke();
}

// ===== WAVE BARS =====
const waveC=document.getElementById('waveCanvas');
const wx=waveC.getContext('2d');
function drawWave(){
  requestAnimationFrame(drawWave);
  if(!analyser)return;
  const w=waveC.parentElement.offsetWidth,h=waveC.parentElement.offsetHeight;
  const dpr=window.devicePixelRatio||1;
  waveC.width=w*dpr;waveC.height=h*dpr;wx.scale(dpr,dpr);wx.clearRect(0,0,w,h);
  analyser.getByteFrequencyData(dataArr);
  const bars=100,step=Math.max(1,Math.floor(dataArr.length/bars)),bw=w/bars;
  for(let i=0;i<bars;i++){
    const v=dataArr[Math.min(i*step,dataArr.length-1)]/255;
    const bh=v*h*.9+1,x=i*bw,y=h-bh;
    const hue=260+i/bars*70;
    const grad=wx.createLinearGradient(x,y,x,h);
    grad.addColorStop(0,`hsla(${hue},85%,65%,${v*.9})`);
    grad.addColorStop(.4,`hsla(${hue},75%,50%,${v*.5})`);
    grad.addColorStop(1,`hsla(${hue},60%,35%,0)`);
    wx.fillStyle=grad;wx.beginPath();wx.roundRect(x+1,y,bw-2,bh,[3,3,0,0]);wx.fill();
    if(v>.5){wx.shadowColor=`hsla(${hue},90%,70%,.5)`;wx.shadowBlur=15;wx.fillStyle=`hsla(${hue},85%,60%,${v*.2})`;wx.fillRect(x+1,y,bw-2,bh);wx.shadowBlur=0}
  }
}

// ===== REACTIVE LOOP =====
function reactLoop(){
  requestAnimationFrame(reactLoop);
  if(!analyser)return;
  analyser.getByteFrequencyData(dataArr);
  let sum=0;for(let i=0;i<dataArr.length;i++)sum+=dataArr[i];
  const avg=sum/dataArr.length/255;
  const bass=dataArr[Math.floor(dataArr.length*.05)]/255;
  const mid=dataArr[Math.floor(dataArr.length*.3)]/255;
  const high=dataArr[Math.floor(dataArr.length*.7)]/255;
  const now=Date.now();

  // ORBS — massive reactive
  document.querySelectorAll('.orb').forEach((o,i)=>{
    const sp=1+i*.4;
    const s=1+bass*.4*((i%2)?1:-1)+mid*.15;
    const tx=Math.sin(now/(2500+i*600))*50*(avg+.2);
    const ty=Math.cos(now/(3500+i*800))*40*(avg+.2);
    const extra=i>4?high*20*((i%2)?1:-1):0;
    o.style.transform=`translate(${tx+extra}px,${ty}px) scale(${s})`;
    o.style.opacity=(.15+avg*.8).toFixed(3);
    o.style.filter=`blur(${70+bass*60}px)`;
  });

  // PARTICLES
  document.querySelectorAll('.particle').forEach(p=>{
    if(!p._base)p._base=parseFloat(p.style.animationDuration)||20;
    p.style.animationDuration=(p._base/(1+avg*3))+'s';
  });

  // BEAMS
  document.querySelectorAll('.beam').forEach(b=>{
    const base=parseFloat(b.style.opacity)||.03;
    b.style.opacity=(base+avg*.12+bass*.08).toFixed(3);
  });

  // BG — deep dark reactive
  const r=Math.floor(1+bass*5),g=Math.floor(1+bass*3),bl=Math.floor(3+bass*8);
  document.querySelector('.experience').style.background=`rgb(${r},${g},${bl})`;
}

// ===== YOUTUBE RESOLVE =====
async function resolveYT(ytId){
  setStatus('resolving audio...');
  for(const h of INV){
    try{
      const ctrl=new AbortController();
      const t=setTimeout(()=>ctrl.abort(),6000);
      const r=await fetch(`${h}/api/v1/videos/${ytId}?fields=title,author,adaptiveFormats,formatStreams`,{signal:ctrl.signal});
      clearTimeout(t);if(!r.ok)continue;
      const d=await r.json();
      let url=null;
      if(d.adaptiveFormats){
        const af=d.adaptiveFormats.filter(f=>f.type&&f.type.startsWith('audio/')).sort((a,b)=>(b.bitrate||0)-(a.bitrate||0));
        if(af.length)url=af[0].url;
      }
      if(!url&&d.formatStreams){
        for(const f of d.formatStreams){if(f.url){url=f.url;break}}
      }
      if(url){
        if(d.title)TRACKS[curIdx].resolvedTitle=d.title;
        if(d.author)TRACKS[curIdx].resolvedArtist=d.author;
        return url;
      }
    }catch(e){}
  }
  return null;
}

async function loadTrack(idx){
  curIdx=idx;const t=TRACKS[idx];
  const title=t.resolvedTitle||t.title;
  const artist=t.resolvedArtist||t.artist;
  document.getElementById('trackTitle').textContent=title;
  document.getElementById('trackArtist').textContent=artist;
  if('mediaSession' in navigator){
    navigator.mediaSession.metadata=new MediaMetadata({title,artist,album:'NovaBeats'});
  }
  const url=await resolveYT(t.yt);
  if(url){
    audio.src=url;audio.load();setStatus('ready',false,true);
  }else{
    setStatus('audio resolve failed',true);
  }
}

function playNext(){
  if(TRACKS.length===0)return;
  if(repeat===2){loadTrack(curIdx);return;}
  loadTrack((curIdx+1)%TRACKS.length);
}
function playPrev(){
  if(TRACKS.length===0)return;
  if(audio.currentTime>3){audio.currentTime=0;return;}
  loadTrack((curIdx-1+TRACKS.length)%TRACKS.length);
}

// ===== PLAY/PAUSE =====
function doPlay(){
  initAudio();
  if(audioCtx?.state==='suspended')audioCtx.resume();
  audio.play().catch(e=>console.warn(e));
}
function doPause(){audio.pause()}
function toggle(){playing?doPause():doPlay()}

function onPlay(){
  playing=true;document.body.classList.add('active');
  document.getElementById('miniPlay').textContent='⏸';
  document.getElementById('playRing').innerHTML='⏸<div class="orbit"></div><div class="orbit o2"></div><div class="orbit o3"></div>';
  startProg();
}
function onPause(){
  playing=false;document.body.classList.remove('active');
  document.getElementById('miniPlay').textContent='▶';
  document.getElementById('playRing').innerHTML='▶<div class="orbit"></div><div class="orbit o2"></div><div class="orbit o3"></div>';
  clearInterval(progIv);
}

audio.addEventListener('play',onPlay);
audio.addEventListener('pause',onPause);
audio.addEventListener('ended',()=>{
  if(repeat===1){audio.currentTime=0;audio.play();return;}
  playNext();
});
audio.addEventListener('error',()=>{
  setStatus('playback error — retrying...',true);
  setTimeout(()=>loadTrack(curIdx),2000);
});

let progIv;
function startProg(){
  clearInterval(progIv);
  progIv=setInterval(()=>{
    const c=audio.currentTime||0,d=audio.duration||0;
    if(d>0){
      document.getElementById('progressFill').style.width=(c/d*100)+'%';
      document.getElementById('curTime').textContent=fmt(c);
      document.getElementById('totTime').textContent=fmt(d);
    }
  },150);
}

// ===== CONTROLS =====
document.getElementById('playBtn').addEventListener('click',toggle);
document.getElementById('miniPlay').addEventListener('click',toggle);
document.getElementById('prevBtn').addEventListener('click',playPrev);
document.getElementById('nextBtn').addEventListener('click',playNext);

document.getElementById('repeatBtn').addEventListener('click',()=>{
  repeat=(repeat+1)%3;
  const b=document.getElementById('repeatBtn');
  b.classList.toggle('active',repeat>0);
  b.style.color=repeat>0?'var(--accent2)':'var(--text)';
  b.textContent=repeat===2?'🔂':'🔁';
});

// Volume
const volS=document.getElementById('volSlider');
const muteB=document.getElementById('muteBtn');
volS.addEventListener('input',e=>{const v=parseFloat(e.target.value);audio.volume=v;muteB.textContent=v===0?'🔇':v<.5?'🔉':'🔊'});
muteB.addEventListener('click',()=>{audio.muted=!audio.muted;muteB.textContent=audio.muted?'🔇':audio.volume<.5?'🔉':'🔊'});

// Progress
document.getElementById('progressBar').addEventListener('click',e=>{
  const r=e.currentTarget.getBoundingClientRect();
  if(audio.duration)audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
});

// Keyboard
document.addEventListener('keydown',e=>{
  switch(e.code){
    case'Space':e.preventDefault();toggle();break;
    case'ArrowRight':e.preventDefault();if(audio.duration)audio.currentTime=Math.min(audio.duration,audio.currentTime+5);break;
    case'ArrowLeft':e.preventDefault();audio.currentTime=Math.max(0,audio.currentTime-5);break;
    case'ArrowUp':e.preventDefault();{const v=Math.min(1,audio.volume+.05);audio.volume=v;volS.value=v}break;
    case'ArrowDown':e.preventDefault();{const v=Math.max(0,audio.volume-.05);audio.volume=v;volS.value=v}break;
  }
});

// Media Session
if('mediaSession' in navigator){
  navigator.mediaSession.setActionHandler('play',doPlay);
  navigator.mediaSession.setActionHandler('pause',doPause);
  navigator.mediaSession.setActionHandler('previoustrack',playPrev);
  navigator.mediaSession.setActionHandler('nexttrack',playNext);
}

// Tap anywhere to start
document.addEventListener('click',function firstClick(){
  if(!playing&&TRACKS.length){doPlay()}
},{once:true});

// ===== HELPERS =====
function setStatus(msg,isErr,isReady){
  const el=document.getElementById('loadStatus');
  el.textContent=msg;el.className='load-status'+(isErr?' error':isReady?' ready':'');
}
function fmt(s){if(!s||isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec}

// ===== INIT =====
loadTrack(0);
</script>
</body>
</html>
