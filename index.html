<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NovaBeats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060a;--bg-deep:#020204;--surface:#0c0c14;--surface2:#111120;
  --accent:#e85d3a;--accent2:#f4845f;--accent3:#f7a58c;
  --teal:#2dd4bf;--cyan:#22d3ee;--text:#e8e8ee;--dim:#555570;
  --dim2:#2a2a3e;--border:rgba(255,255,255,.05);
  --radius:14px;--radius-sm:10px;
  --z-bg:0;--z-particles:1;--z-content:2;--z-ring:3;
  --z-yt:5;--z-sidebar:10;--z-bar:20;--z-toggle:21;
}
html,body{
  font-family:'Outfit',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  height:100%;overflow:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background 1.2s cubic-bezier(.4,0,.2,1);
}
body.playing{background:var(--bg-deep)}

.app{display:grid;grid-template-columns:260px 1fr;grid-template-rows:1fr;height:100vh;height:100dvh;overflow:hidden}
@media(max-width:768px){
  .app{grid-template-columns:1fr;grid-template-rows:1fr}
}

/* SIDEBAR */
.sidebar{
  background:rgba(8,8,14,.94);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:var(--z-sidebar);
  overflow:hidden;
}
@media(max-width:768px){
  .sidebar{
    position:fixed;bottom:0;left:0;right:0;top:auto;
    height:50vh;border-right:none;
    border-top:1px solid var(--border);
    transform:translateY(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);
    z-index:calc(var(--z-bar) + 1);
    border-radius:var(--radius) var(--radius) 0 0;
  }
  .sidebar.open{transform:translateY(0)}
  .sidebar-handle{display:block!important}
}
.sidebar-handle{display:none;width:36px;height:4px;background:var(--dim2);border-radius:2px;margin:8px auto 0}
.sb-header{padding:24px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-logo{font-size:20px;font-weight:900;letter-spacing:-1.2px;color:var(--text)}
.sb-sub{font-size:10px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.sb-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-tab{
  flex:1;padding:10px 0;text-align:center;font-size:12px;font-weight:600;
  color:var(--dim);cursor:pointer;border:none;background:none;
  border-bottom:2px solid transparent;transition:all .2s;
  letter-spacing:.5px;text-transform:uppercase;
}
.sb-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.sb-tab:hover{color:var(--text)}
.sb-queue{flex:1;overflow-y:auto;padding:6px 10px 80px;scrollbar-width:thin;scrollbar-color:var(--dim2) transparent}
.sb-queue::-webkit-scrollbar{width:4px}
.sb-queue::-webkit-scrollbar-thumb{background:var(--dim2);border-radius:4px}
.q-item{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  border-radius:var(--radius-sm);cursor:pointer;
  transition:background .15s,transform .1s;position:relative;
}
.q-item:hover{background:rgba(232,93,58,.05)}
.q-item:active{transform:scale(.98)}
.q-item.active{background:rgba(232,93,58,.07)}
.q-item.active::before{
  content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;
  background:var(--accent);border-radius:0 3px 3px 0;
}
.q-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);width:18px;text-align:center;flex-shrink:0}
.q-art{width:36px;height:36px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--surface2)}
.q-art canvas{width:100%;height:100%;display:block}
.q-meta{flex:1;min-width:0}
.q-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-artist{font-size:10px;color:var(--dim);margin-top:1px}
.q-type{
  font-size:9px;color:var(--dim);background:var(--surface2);
  padding:2px 5px;border-radius:3px;flex-shrink:0;letter-spacing:.5px;text-transform:uppercase;
}
.q-item.active .q-num{color:var(--accent)}
.playing-indicator{display:none;align-items:flex-end;gap:2px;height:12px}
.q-item.active .playing-indicator{display:flex}
.q-item.active .q-num span{display:none}
.playing-indicator span{width:2px;background:var(--accent);border-radius:1px;animation:ind .7s ease-in-out infinite}
.playing-indicator span:nth-child(2){animation-delay:.12s;height:60%}
.playing-indicator span:nth-child(3){animation-delay:.24s;height:40%}
@keyframes ind{0%,100%{height:30%}50%{height:100%}}

.sb-upload{
  padding:12px;border-top:1px solid var(--border);flex-shrink:0;
}
.upload-zone{
  border:1.5px dashed var(--dim2);border-radius:var(--radius-sm);
  padding:14px;text-align:center;cursor:pointer;transition:all .2s;
  font-size:11px;color:var(--dim);
}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);color:var(--accent2)}
.upload-zone input{display:none}

/* MAIN */
.main{position:relative;overflow:hidden;display:flex;flex-direction:column}
.bg-effects{position:absolute;inset:0;z-index:var(--z-bg);pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0;transition:opacity 2s ease;will-change:transform,opacity}
body.playing .orb{opacity:1}
.orb.o1{width:60vmax;height:60vmax;left:-15%;top:-15%;background:radial-gradient(circle,rgba(232,93,58,.18),transparent 55%)}
.orb.o2{width:50vmax;height:50vmax;right:-10%;bottom:-10%;background:radial-gradient(circle,rgba(244,132,95,.12),transparent 55%)}
.orb.o3{width:40vmax;height:40vmax;left:30%;top:50%;background:radial-gradient(circle,rgba(45,212,191,.08),transparent 50%)}
.particles-canvas{position:absolute;inset:0;z-index:var(--z-particles);pointer-events:none}

/* YouTube iframe (hidden) */
#ytPlayerWrap{
  position:absolute;top:-9999px;left:-9999px;
  width:1px;height:1px;overflow:hidden;z-index:var(--z-yt);
}

.content{
  position:relative;z-index:var(--z-content);flex:1;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  padding:24px 16px 120px;gap:20px;
}
.np-art-wrap{
  position:relative;width:min(280px,55vw);aspect-ratio:1;
  border-radius:18px;overflow:hidden;
  box-shadow:0 16px 50px rgba(0,0,0,.5),0 0 0 1px var(--border);
  transition:transform .5s cubic-bezier(.16,1,.3,1),box-shadow .7s;
}
body.playing .np-art-wrap{
  transform:scale(1.01);
  box-shadow:0 24px 60px rgba(232,93,58,.08),0 0 0 1px rgba(232,93,58,.08);
}
.np-art-canvas{width:100%;height:100%;display:block}
.np-ring-wrap{position:absolute;inset:-40px;pointer-events:none;z-index:var(--z-ring)}
.np-ring-canvas{width:100%;height:100%;display:block}
.np-info{text-align:center;z-index:2;max-width:90vw}
.np-title{font-size:clamp(18px,4.5vw,28px);font-weight:800;letter-spacing:-.6px;line-height:1.2;color:var(--text)}
body.playing .np-title{color:#fff}
.np-artist{font-size:clamp(12px,3vw,14px);color:var(--dim);margin-top:6px;font-weight:500}
.waveform-bar{width:min(500px,82vw);height:44px;position:relative;z-index:2;border-radius:var(--radius-sm);overflow:hidden}
.waveform-bar canvas{width:100%;height:100%;display:block}
.load-status{font-size:11px;color:var(--dim);letter-spacing:1px;text-align:center;z-index:2;min-height:16px;font-family:'JetBrains Mono',monospace}
.load-status.error{color:#ef4444}
.load-status.ready{color:var(--teal)}

/* PLAYER BAR */
.player-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:var(--z-bar);
  background:linear-gradient(180deg,transparent,rgba(4,4,8,.75) 25%,rgba(4,4,8,.95));
  padding:0 16px max(10px,env(safe-area-inset-bottom));
}
.pb-progress{width:100%;height:4px;background:rgba(255,255,255,.05);cursor:pointer;position:relative;transition:height .2s;border-radius:2px;margin-bottom:8px}
.pb-progress:hover{height:6px}
.pb-fill{height:100%;width:0%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--teal));transition:width .15s linear}
.pb-controls{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-bottom:2px}
.pb-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.pb-center{display:flex;align-items:center;gap:10px;flex-shrink:0}
.pb-right{display:flex;align-items:center;gap:8px;flex:1;justify-content:flex-end}
.pb-track-info{display:flex;align-items:center;gap:10px;min-width:0}
.pb-mini-art{width:40px;height:40px;border-radius:6px;overflow:hidden;flex-shrink:0}
.pb-mini-art canvas{width:100%;height:100%;display:block}
.pb-mini-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
@media(max-width:400px){.pb-mini-title{max-width:80px}}
.pb-mini-artist{font-size:10px;color:var(--dim);margin-top:1px}
.pb-btn{
  width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  background:transparent;color:var(--text);display:flex;align-items:center;justify-content:center;
  transition:background .12s,transform .12s;-webkit-tap-highlight-color:transparent;
}
.pb-btn:hover{background:rgba(255,255,255,.05)}
.pb-btn:active{transform:scale(.9)}
.pb-btn svg{width:18px;height:18px;fill:currentColor;pointer-events:none}
.pb-btn.play-main{width:52px;height:52px;background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(232,93,58,.2)}
.pb-btn.play-main:hover{background:var(--accent2)}
.pb-btn.play-main svg{width:20px;height:20px}
.pb-btn.active{color:var(--accent)!important}
.pb-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);font-variant-numeric:tabular-nums;display:flex;gap:4px}
.pb-vol{display:flex;align-items:center;gap:6px}
@media(max-width:768px){.pb-vol{display:none}}
.pb-vol-slider{-webkit-appearance:none;appearance:none;width:80px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;outline:none;cursor:pointer}
.pb-vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:pointer}
.sb-toggle{
  display:none;position:fixed;bottom:80px;right:12px;z-index:calc(var(--z-bar)+1);
  width:44px;height:44px;border-radius:50%;border:none;
  background:var(--surface2);color:var(--text);cursor:pointer;
  box-shadow:0 4px 12px rgba(0,0,0,.4);border:1px solid var(--border);
  align-items:center;justify-content:center;
}
.sb-toggle svg{width:18px;height:18px;fill:currentColor}
@media(max-width:768px){.sb-toggle{display:flex}}
.tap-hint{position:absolute;bottom:25%;left:50%;transform:translateX(-50%);z-index:5;text-align:center;animation:fp 2.5s ease-in-out infinite}
.tap-hint-icon{width:64px;height:64px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;background:rgba(232,93,58,.06);border:1.5px solid rgba(232,93,58,.12)}
.tap-hint-icon svg{width:24px;height:24px;fill:var(--accent)}
.tap-hint-text{font-size:11px;color:var(--dim);letter-spacing:3px;text-transform:uppercase}
body.playing .tap-hint{opacity:0;pointer-events:none;transition:opacity .4s}
@keyframes fp{0%,100%{opacity:.3}50%{opacity:.8}}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-15px) scale(1.03)}66%{transform:translate(-15px,20px) scale(.97)}100%{transform:translate(0,0) scale(1)}}
.orb.o1{animation:orbFloat 18s ease-in-out infinite}
.orb.o2{animation:orbFloat 22s ease-in-out infinite reverse}
.orb.o3{animation:orbFloat 20s ease-in-out infinite 4s}
@media(prefers-reduced-motion:reduce){
  .orb,.particles-canvas,.playing-indicator span,.tap-hint{animation:none!important}
  *{transition-duration:0s!important}
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim2);border-radius:3px}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-handle"></div>
    <div class="sb-header">
      <div class="sb-logo">NovaBeats</div>
      <div class="sb-sub">curated music</div>
    </div>
    <div class="sb-tabs">
      <button class="sb-tab active" data-tab="queue">Queue</button>
      <button class="sb-tab" data-tab="local">Upload</button>
    </div>
    <div class="sb-queue" id="sbQueue"></div>
    <div class="sb-upload" id="sbUpload" style="display:none">
      <div class="upload-zone" id="uploadZone">
        <svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:var(--dim);margin-bottom:6px"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
        <div>Drop audio files or <strong style="color:var(--accent)">browse</strong></div>
        <div style="font-size:10px;margin-top:4px;color:var(--dim2)">MP3, WAV, OGG, FLAC</div>
        <input type="file" id="fileInput" accept="audio/*" multiple>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="bg-effects">
      <div class="orb o1"></div>
      <div class="orb o2"></div>
      <div class="orb o3"></div>
    </div>
    <canvas class="particles-canvas" id="particlesCanvas"></canvas>
    <div id="ytPlayerWrap"></div>

    <div class="content" id="content">
      <div class="np-art-wrap">
        <canvas class="np-art-canvas" id="npArtCanvas"></canvas>
        <div class="np-ring-wrap"><canvas class="np-ring-canvas" id="npRingCanvas"></canvas></div>
      </div>
      <div class="np-info">
        <div class="np-title" id="npTitle">NovaBeats</div>
        <div class="np-artist" id="npArtist">tap to play</div>
      </div>
      <div class="waveform-bar"><canvas id="waveCanvas"></canvas></div>
      <div class="load-status" id="loadStatus"></div>
    </div>

    <div class="tap-hint" id="tapHint">
      <div class="tap-hint-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="tap-hint-text">tap anywhere</div>
    </div>

    <div class="player-bar">
      <div class="pb-progress" id="pbProgress"><div class="pb-fill" id="pbFill"></div></div>
      <div class="pb-controls">
        <div class="pb-left">
          <div class="pb-track-info">
            <div class="pb-mini-art"><canvas id="pbMiniArt" width="80" height="80"></canvas></div>
            <div><div class="pb-mini-title" id="pbMiniTitle">NovaBeats</div><div class="pb-mini-artist" id="pbMiniArtist">&mdash;</div></div>
          </div>
        </div>
        <div class="pb-center">
          <button class="pb-btn" id="shuffleBtn" title="Shuffle" aria-label="Shuffle"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
          <button class="pb-btn" id="prevBtn" title="Previous" aria-label="Previous"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
          <button class="pb-btn play-main" id="playBtn" title="Play" aria-label="Play"><svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg></button>
          <button class="pb-btn" id="nextBtn" title="Next" aria-label="Next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
          <button class="pb-btn" id="repeatBtn" title="Repeat" aria-label="Repeat"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
        </div>
        <div class="pb-right">
          <div class="pb-time"><span id="curTime">0:00</span><span>/</span><span id="totTime">0:00</span></div>
          <div class="pb-vol">
            <button class="pb-btn" id="muteBtn" style="width:36px;height:36px" aria-label="Mute"><svg viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
            <input type="range" class="pb-vol-slider" id="volSlider" min="0" max="1" step=".01" value=".8" aria-label="Volume">
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<button class="sb-toggle" id="sbToggle" aria-label="Toggle queue"><svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg></button>

<script>
// ===== TRACKLIST =====
const TRACKS = [
  {title:'Body Pata Pata',artist:'Faris Adam & Diva Aurel',yt:'epLVftkQojw',hue:15,seed:1,type:'yt'},
  {title:'Es Lilin',artist:'Nining Meida',yt:'d0FvMDpVEfg',hue:190,seed:2,type:'yt'},
  {title:'Cintaku Padamu',artist:'Rhoma Irama',yt:'ZbZFGDM6EBc',hue:330,seed:3,type:'yt'},
  {title:'Pergi Pagi Pulang Pagi',artist:'Armada',yt:'tZp5HCT4gAQ',hue:155,seed:4,type:'yt'},
  {title:'Hati-Hati di Jalan',artist:'Tulus',yt:'LmHp1gKZtNc',hue:210,seed:5,type:'yt'},
  {title:'Rungkad',artist:'Happy Asmara',yt:'j4DGCK3i2aI',hue:350,seed:6,type:'yt'},
  {title:'Tak Segampang Itu',artist:'Anggi Marito',yt:'VZhEcKExqZo',hue:175,seed:7,type:'yt'},
  {title:'Komang',artist:'Raim Laode',yt:'cwJTbmf0bKM',hue:120,seed:8,type:'yt'},
];

// ===== STATE =====
let playing = false, shuffle = false, repeat = 0, curIdx = 0;
let ytPlayer = null, ytReady = false;
let localAudio = new Audio(); localAudio.volume = .8;
let audioCtx, analyser, dataArr, vizOk = false;
let artCanvases = {};
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let useYt = true; // true = YouTube, false = local file

// ===== SEEDED RANDOM =====
function seededRandom(seed){let s=seed;return function(){s=(s*16807+0)%2147483647;return(s-1)/2147483646}}

// ===== ALBUM ART =====
function generateArt(track,canvas,size){
  const ctx=canvas.getContext('2d');canvas.width=size*2;canvas.height=size*2;ctx.scale(2,2);
  const rng=seededRandom(track.seed*7919);const hue=track.hue||0;
  const grd=ctx.createLinearGradient(0,0,size,size);
  grd.addColorStop(0,`hsl(${hue},55%,6%)`);grd.addColorStop(.5,`hsl(${(hue+30)%360},45%,10%)`);grd.addColorStop(1,`hsl(${(hue+60)%360},35%,5%)`);
  ctx.fillStyle=grd;ctx.fillRect(0,0,size,size);
  for(let i=0;i<4;i++){const x=rng()*size,y=rng()*size,r=30+rng()*size*.3;const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,`hsla(${(hue+rng()*50)%360},60%,50%,${.05+rng()*.08})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill()}
  ctx.strokeStyle=`hsla(${hue},40%,45%,.08)`;ctx.lineWidth=1;for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(rng()*size,rng()*size);ctx.lineTo(rng()*size,rng()*size);ctx.stroke()}
  const cg=ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size*.28);cg.addColorStop(0,`hsla(${hue},60%,50%,.1)`);cg.addColorStop(1,'transparent');ctx.fillStyle=cg;ctx.fillRect(0,0,size,size);
  ctx.fillStyle=`hsla(${hue},35%,65%,.05)`;ctx.font=`${size*.25}px 'Outfit',sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('\u266B',size/2,size/2);
}
function ensureArt(idx){if(artCanvases[idx])return artCanvases[idx];const c=document.createElement('canvas');generateArt(TRACKS[idx],c,300);artCanvases[idx]=c;return c}

// ===== QUEUE UI =====
function buildQueue(){
  const el=document.getElementById('sbQueue');el.innerHTML='';
  TRACKS.forEach((t,i)=>{
    const d=document.createElement('div');d.className='q-item'+(i===curIdx?' active':'');
    d.setAttribute('role','button');d.setAttribute('tabindex','0');
    d.innerHTML=`<span class="q-num"><span>${i+1}</span><div class="playing-indicator"><span></span><span></span><span></span></div></span><div class="q-art"><canvas width="72" height="72"></canvas></div><div class="q-meta"><div class="q-title">${t.title}</div><div class="q-artist">${t.artist}</div></div><span class="q-type">${t.type==='yt'?'YT':'FILE'}</span>`;
    d.addEventListener('click',()=>{loadTrack(i);doPlay()});
    d.addEventListener('keydown',e=>{if(e.key==='Enter'){loadTrack(i);doPlay()}});
    el.appendChild(d);
    const mc=d.querySelector('canvas');mc.getContext('2d').drawImage(ensureArt(i),0,0,72,72);
  });
}

// ===== YT IFRAME API =====
let ytApiReady = false;
function onYouTubeIframeAPIReady() {
  ytApiReady = true;
  ytPlayer = new YT.Player('ytPlayerWrap', {
    height: '1', width: '1',
    playerVars: { autoplay: 0, controls: 0, disablekb: 1, fs: 0, modestbranding: 1, rel: 0 },
    events: {
      onReady: () => { ytReady = true; setStatus('YouTube ready', false, true); loadTrack(0); },
      onStateChange: onYtStateChange,
      onError: (e) => { setStatus('YT error ' + e.data, true); }
    }
  });
}

function onYtStateChange(e) {
  if (e.data === YT.PlayerState.PLAYING) { onPlay(); }
  else if (e.data === YT.PlayerState.PAUSED) { onPause(); }
  else if (e.data === YT.PlayerState.ENDED) {
    if (repeat === 1) { ytPlayer.seekTo(0); ytPlayer.playVideo(); return; }
    playNext();
  }
}

// Load YT API
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);
window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

// ===== AUDIO ENGINE (for visualizer) =====
function initAudio() {
  if (vizOk) return;
  try {
    // For YT: we create a MediaElementSource from a silent oscillator for the analyser
    // Actually, we can't connect YT iframe to Web Audio due to cross-origin.
    // We'll use a simulated visualizer based on timing data instead.
    vizOk = true;
    if (!prefersReducedMotion) {
      drawRing(); drawWave(); drawParticles(); reactLoop();
    }
    drawNpArt();
  } catch(e) { console.warn('Audio init:', e); }
}

// For local files: real audio analyser
function initLocalAudio() {
  if (vizOk) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024; analyser.smoothingTimeConstant = .82;
    dataArr = new Uint8Array(analyser.frequencyBinCount);
    const src = audioCtx.createMediaElementSource(localAudio);
    src.connect(analyser); analyser.connect(audioCtx.destination);
    vizOk = true;
    if (!prefersReducedMotion) { drawRing(); drawWave(); drawParticles(); reactLoop(); }
    drawNpArt();
  } catch(e) { console.warn('Local audio init:', e); }
}

// ===== SIMULATED FREQUENCY DATA (for YT when analyser not available) =====
let simData = new Uint8Array(512);
function simulateFrequency() {
  if (!playing) { simData.fill(0); return; }
  const now = Date.now() / 1000;
  for (let i = 0; i < 512; i++) {
    const bass = Math.sin(now * 2.1 + i * .01) * 60 + 60;
    const mid = Math.sin(now * 3.7 + i * .03) * 40 + 40;
    const high = Math.sin(now * 5.3 + i * .08) * 25 + 25;
    const beat = Math.pow(Math.sin(now * 1.05), 8) * 80;
    simData[i] = Math.max(0, Math.min(255, bass * .4 + mid * .3 + high * .2 + beat * (i < 40 ? 1 : .2)));
  }
}
function getData() { return analyser ? (analyser.getByteFrequencyData(dataArr), dataArr) : (simulateFrequency(), simData); }

// ===== VISUALIZERS =====
function drawNpArt() {
  requestAnimationFrame(drawNpArt);
  const c = document.getElementById('npArtCanvas');
  const ctx = c.getContext('2d');
  const wrap = c.parentElement;
  const sz = wrap.offsetWidth;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  if (c.width !== sz * dpr || c.height !== sz * dpr) { c.width = sz * dpr; c.height = sz * dpr; }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, sz, sz);
  ctx.drawImage(ensureArt(curIdx), 0, 0, sz, sz);
  if (!playing) return;
  const d = getData();
  const track = TRACKS[curIdx]; const hue = track.hue || 0;
  let bass = 0; for (let i = 0; i < 20; i++) bass += d[i]; bass = bass / 20 / 255;
  const g = ctx.createRadialGradient(sz/2, sz/2, 0, sz/2, sz/2, sz * .5);
  g.addColorStop(0, `hsla(${hue}, 65%, 50%, ${bass * .18})`);
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g; ctx.fillRect(0, 0, sz, sz);
}

const ringC = document.getElementById('npRingCanvas');
const rx = ringC.getContext('2d');
let ringW = 0;
function drawRing() {
  requestAnimationFrame(drawRing);
  if (!playing) { if (ringW) { rx.clearRect(0, 0, ringC.width, ringC.height); ringW = 0; } return; }
  const wrap = ringC.parentElement; const s = wrap.offsetWidth;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  if (ringW !== s * dpr) { ringC.width = s * dpr; ringC.height = s * dpr; ringW = s * dpr; }
  rx.setTransform(dpr, 0, 0, dpr, 0, 0); rx.clearRect(0, 0, s, s);
  const d = getData(); const cx = s / 2, cy = s / 2; const baseR = s * .3;
  const bars = 140; const step = Math.max(1, Math.floor(d.length / bars));
  const track = TRACKS[curIdx]; const hue = track.hue || 0;
  for (let i = 0; i < bars; i++) {
    const v = d[Math.min(i * step, d.length - 1)] / 255;
    const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
    const r1 = baseR + v * 5, r2 = r1 + v * s * .16 + 2;
    const x1 = cx + Math.cos(angle) * r1, y1 = cy + Math.sin(angle) * r1;
    const x2 = cx + Math.cos(angle) * r2, y2 = cy + Math.sin(angle) * r2;
    rx.strokeStyle = `hsla(${(hue + i / bars * 35) % 360}, 65%, ${48 + v * 22}%, ${.1 + v * .8})`;
    rx.lineWidth = 2; rx.lineCap = 'round'; rx.beginPath(); rx.moveTo(x1, y1); rx.lineTo(x2, y2); rx.stroke();
  }
  let avg = 0; for (let i = 0; i < d.length; i++) avg += d[i]; avg = avg / d.length / 255;
  rx.beginPath(); rx.arc(cx, cy, 3 + avg * 8, 0, Math.PI * 2);
  rx.fillStyle = `hsla(${hue}, 65%, 55%, ${.15 + avg * .45})`; rx.fill();
}

const waveC = document.getElementById('waveCanvas');
const wx = waveC.getContext('2d');
let waveW = 0;
function drawWave() {
  requestAnimationFrame(drawWave);
  if (!playing) { if (waveW) { wx.clearRect(0, 0, waveC.width, waveC.height); waveW = 0; } return; }
  const wrap = waveC.parentElement; const w = wrap.offsetWidth, h = wrap.offsetHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  if (waveW !== w * dpr) { waveC.width = w * dpr; waveC.height = h * dpr; waveW = w * dpr; }
  wx.setTransform(dpr, 0, 0, dpr, 0, 0); wx.clearRect(0, 0, w, h);
  const d = getData(); const bars = 60; const step = Math.max(1, Math.floor(d.length / bars));
  const bw = w / bars; const track = TRACKS[curIdx]; const hue = track.hue || 0;
  for (let i = 0; i < bars; i++) {
    const v = d[Math.min(i * step, d.length - 1)] / 255;
    const bh = v * h * .75 + 1, x = i * bw, y = h - bh;
    const grad = wx.createLinearGradient(x, y, x, h);
    grad.addColorStop(0, `hsla(${(hue + i / bars * 35) % 360}, 60%, 55%, ${v * .7})`);
    grad.addColorStop(.35, `hsla(${(hue + i / bars * 35) % 360}, 50%, 40%, ${v * .35})`);
    grad.addColorStop(1, `hsla(${(hue + i / bars * 35) % 360}, 40%, 25%, 0)`);
    wx.fillStyle = grad; wx.beginPath(); wx.roundRect(x + 1, y, bw - 2, bh, [2, 2, 0, 0]); wx.fill();
  }
}

// ===== PARTICLES =====
const pCanvas = document.getElementById('particlesCanvas');
const pCtx = pCanvas.getContext('2d');
let particles = []; let pW = 0, pH = 0;
function initParticles() {
  particles = [];
  for (let i = 0; i < 40; i++) particles.push({
    x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
    vx: (Math.random() - .5) * .15, vy: -.1 - Math.random() * .3,
    size: 1 + Math.random() * 2, hue: 10 + Math.random() * 25, alpha: .08 + Math.random() * .2, life: Math.random()
  });
}
function drawParticles() {
  requestAnimationFrame(drawParticles);
  const w = window.innerWidth, h = window.innerHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  if (pW !== w * dpr || pH !== h * dpr) { pCanvas.width = w * dpr; pCanvas.height = h * dpr; pW = w * dpr; pH = h * dpr; }
  pCtx.setTransform(dpr, 0, 0, dpr, 0, 0); pCtx.clearRect(0, 0, w, h);
  let avg = 0;
  if (playing) { const d = getData(); for (let i = 0; i < d.length; i++) avg += d[i]; avg = avg / d.length / 255; }
  const boost = playing ? 1 + avg * 2 : 1;
  const track = TRACKS[curIdx];
  for (const p of particles) {
    p.life += .002 * boost;
    if (p.life > 1) { p.life = 0; p.x = Math.random() * w; p.y = h + 10; }
    p.x += p.vx * boost; p.y += p.vy * boost;
    const fadeIn = Math.min(p.life * 5, 1), fadeOut = Math.max(1 - (p.life - .7) / .3, 0);
    const a = p.alpha * fadeIn * (p.life > .7 ? fadeOut : 1) * (playing ? (.3 + avg * .7) : .1);
    const hue = playing ? (track.hue + avg * 30) % 360 : p.hue;
    pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size * boost, 0, Math.PI * 2);
    pCtx.fillStyle = `hsla(${hue}, 55%, 55%, ${a})`; pCtx.fill();
  }
}

// ===== REACTIVE LOOP =====
function reactLoop() {
  requestAnimationFrame(reactLoop);
  if (!playing) return;
  const d = getData();
  let sum = 0; for (let i = 0; i < d.length; i++) sum += d[i];
  const avg = sum / d.length / 255;
  const bass = d[Math.floor(d.length * .05)] / 255;
  const now = Date.now();
  document.querySelectorAll('.orb').forEach((o, i) => {
    const s = 1 + bass * .25 * ((i % 2) ? 1 : -1);
    const tx = Math.sin(now / (2500 + i * 600)) * 30 * (avg + .1);
    const ty = Math.cos(now / (3500 + i * 800)) * 25 * (avg + .1);
    o.style.transform = `translate(${tx}px,${ty}px) scale(${s})`;
    o.style.opacity = (.08 + avg * .5).toFixed(3);
    o.style.filter = `blur(${70 + bass * 35}px)`;
  });
}

// ===== LOAD TRACK =====
function loadTrack(idx) {
  curIdx = idx;
  const t = TRACKS[idx];
  const title = t.resolvedTitle || t.title;
  const artist = t.resolvedArtist || t.artist;
  document.getElementById('npTitle').textContent = title;
  document.getElementById('npArtist').textContent = artist;
  document.getElementById('pbMiniTitle').textContent = title;
  document.getElementById('pbMiniArtist').textContent = artist;
  const mc = document.getElementById('pbMiniArt');
  mc.getContext('2d').drawImage(ensureArt(idx), 0, 0, 80, 80);
  document.querySelectorAll('.q-item').forEach((el, i) => el.classList.toggle('active', i === idx));
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({title, artist, album: 'NovaBeats'});
  }

  if (t.type === 'yt') {
    useYt = true;
    if (ytReady) {
      ytPlayer.loadVideoById(t.yt);
      ytPlayer.pauseVideo(); // Don't autoplay, let doPlay control
      setStatus('YouTube loaded', false, true);
    } else {
      setStatus('loading YouTube...', false, false);
    }
  } else if (t.type === 'local') {
    useYt = false;
    localAudio.src = t.url;
    localAudio.load();
    setStatus('local file loaded', false, true);
  }
}

// ===== PLAY/PAUSE =====
function doPlay() {
  initAudio();
  if (useYt && ytReady) {
    ytPlayer.playVideo();
  } else if (!useYt) {
    if (!analyser) initLocalAudio();
    if (audioCtx?.state === 'suspended') audioCtx.resume();
    localAudio.play().catch(e => console.warn(e));
  }
}
function doPause() {
  if (useYt && ytReady) ytPlayer.pauseVideo();
  else localAudio.pause();
}
function toggle() { playing ? doPause() : doPlay(); }

function updatePlayIcon(isPlaying) {
  document.getElementById('playIcon').innerHTML = isPlaying
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

function onPlay() {
  playing = true; document.body.classList.add('playing');
  updatePlayIcon(true);
  document.getElementById('playBtn').setAttribute('aria-label', 'Pause');
  startProg();
}
function onPause() {
  playing = false; document.body.classList.remove('playing');
  updatePlayIcon(false);
  document.getElementById('playBtn').setAttribute('aria-label', 'Play');
  clearInterval(progIv);
}

// Local audio events
localAudio.addEventListener('play', onPlay);
localAudio.addEventListener('pause', onPause);
localAudio.addEventListener('ended', () => {
  if (repeat === 1) { localAudio.currentTime = 0; localAudio.play(); return; }
  playNext();
});

let progIv;
function startProg() {
  clearInterval(progIv);
  progIv = setInterval(() => {
    let c = 0, d = 0;
    if (useYt && ytReady) {
      c = ytPlayer.getCurrentTime() || 0;
      d = ytPlayer.getDuration() || 0;
    } else {
      c = localAudio.currentTime || 0;
      d = localAudio.duration || 0;
    }
    if (d > 0) {
      document.getElementById('pbFill').style.width = (c / d * 100) + '%';
      document.getElementById('curTime').textContent = fmt(c);
      document.getElementById('totTime').textContent = fmt(d);
    }
  }, 150);
}

// ===== NAVIGATION =====
function getNextIdx() {
  if (shuffle) { let n; do { n = Math.floor(Math.random() * TRACKS.length); } while (n === curIdx && TRACKS.length > 1); return n; }
  return (curIdx + 1) % TRACKS.length;
}
function playNext() { if (!TRACKS.length) return; if (repeat === 2) { loadTrack(curIdx); return; } loadTrack(getNextIdx()); doPlay(); }
function playPrev() {
  if (!TRACKS.length) return;
  let c = useYt && ytReady ? ytPlayer.getCurrentTime() : localAudio.currentTime;
  if (c > 3) { if (useYt && ytReady) ytPlayer.seekTo(0); else localAudio.currentTime = 0; return; }
  loadTrack((curIdx - 1 + TRACKS.length) % TRACKS.length); doPlay();
}

// ===== CONTROLS =====
document.getElementById('playBtn').addEventListener('click', toggle);
document.getElementById('prevBtn').addEventListener('click', playPrev);
document.getElementById('nextBtn').addEventListener('click', playNext);
document.getElementById('shuffleBtn').addEventListener('click', () => { shuffle = !shuffle; document.getElementById('shuffleBtn').classList.toggle('active', shuffle); });
document.getElementById('repeatBtn').addEventListener('click', () => {
  repeat = (repeat + 1) % 3;
  const b = document.getElementById('repeatBtn');
  b.classList.toggle('active', repeat > 0);
});

// Volume
const volS = document.getElementById('volSlider');
const muteB = document.getElementById('muteBtn');
volS.addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  if (useYt && ytReady) ytPlayer.setVolume(v * 100);
  else localAudio.volume = v;
  updateVolIcon(v, false);
});
muteB.addEventListener('click', () => {
  if (useYt && ytReady) {
    ytPlayer.isMuted() ? ytPlayer.unMute() : ytPlayer.mute();
    updateVolIcon(volS.value, ytPlayer.isMuted());
  } else {
    localAudio.muted = !localAudio.muted;
    updateVolIcon(localAudio.volume, localAudio.muted);
  }
});
function updateVolIcon(vol, muted) {
  const icon = muteB.querySelector('svg');
  if (muted || vol == 0) icon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>';
  else if (vol < .5) icon.innerHTML = '<path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/></svg>';
  else icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>';
}

// Progress seek
document.getElementById('pbProgress').addEventListener('click', e => {
  const r = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - r.left) / r.width;
  if (useYt && ytReady) { const d = ytPlayer.getDuration(); if (d) ytPlayer.seekTo(pct * d); }
  else { if (localAudio.duration) localAudio.currentTime = pct * localAudio.duration; }
});

// Sidebar toggle
document.getElementById('sbToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

// Tabs
document.querySelectorAll('.sb-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.sb-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const isQueue = tab.dataset.tab === 'queue';
    document.getElementById('sbQueue').style.display = isQueue ? '' : 'none';
    document.getElementById('sbUpload').style.display = isQueue ? 'none' : '';
  });
});

// File upload
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  for (const f of files) {
    if (!f.type.startsWith('audio/')) continue;
    const url = URL.createObjectURL(f);
    const name = f.name.replace(/\.[^.]+$/, '');
    TRACKS.push({ title: name, artist: 'Local File', url, hue: Math.floor(Math.random() * 360), seed: TRACKS.length + 1, type: 'local' });
    artCanvases = {}; // Reset art cache
  }
  buildQueue();
  setStatus(`${files.length} file(s) added`, false, true);
}

// Click to start
document.addEventListener('click', function firstClick() { if (!playing && TRACKS.length) doPlay(); }, {once: true});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.code) {
    case 'Space': e.preventDefault(); toggle(); break;
    case 'ArrowRight': e.preventDefault();
      if (useYt && ytReady) { const d = ytPlayer.getDuration(); if (d) ytPlayer.seekTo(Math.min(d, ytPlayer.getCurrentTime() + 5)); }
      else if (localAudio.duration) localAudio.currentTime = Math.min(localAudio.duration, localAudio.currentTime + 5);
      break;
    case 'ArrowLeft': e.preventDefault();
      if (useYt && ytReady) ytPlayer.seekTo(Math.max(0, ytPlayer.getCurrentTime() - 5));
      else localAudio.currentTime = Math.max(0, localAudio.currentTime - 5);
      break;
  }
});

// Media Session
if ('mediaSession' in navigator) {
  navigator.mediaSession.setActionHandler('play', doPlay);
  navigator.mediaSession.setActionHandler('pause', doPause);
  navigator.mediaSession.setActionHandler('previoustrack', playPrev);
  navigator.mediaSession.setActionHandler('nexttrack', playNext);
}

// ===== HELPERS =====
function setStatus(msg, isErr, isReady) {
  const el = document.getElementById('loadStatus');
  el.textContent = msg; el.className = 'load-status' + (isErr ? ' error' : isReady ? ' ready' : '');
}
function fmt(s) { if (!s || isNaN(s)) return '0:00'; const m = Math.floor(s / 60), sec = Math.floor(s % 60); return m + ':' + (sec < 10 ? '0' : '') + sec; }

// ===== INIT =====
initParticles();
buildQueue();
</script>
