<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NovaBeats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030306;
  --accent:#7c3aed;--accent2:#a855f7;--accent3:#ec4899;--cyan:#06b6d4;
  --text:#eaeaf0;--dim:#4a4a60;
}
html,body{
  font-family:'Plus Jakarta Sans',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  height:100%;overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ===== FULLSCREEN VISUAL EXPERIENCE ===== */
.experience{
  position:fixed;inset:0;z-index:0;
  display:flex;align-items:center;justify-content:center;
  transition:background 2s;
}
body.active .experience{background:#010104}

/* ===== MESH BLOBS — GIANT REACTIVE ORBS ===== */
.orb{
  position:absolute;border-radius:50%;
  filter:blur(80px);
  opacity:0;
  transition:opacity 2s;
  will-change:transform,opacity;
  pointer-events:none;
}
body.active .orb{opacity:1}
.orb.o1{
  width:70vmax;height:70vmax;left:-20%;top:-25%;
  background:radial-gradient(circle,rgba(124,58,237,.3),transparent 65%);
}
.orb.o2{
  width:60vmax;height:60vmax;right:-15%;bottom:-20%;
  background:radial-gradient(circle,rgba(168,85,247,.25),transparent 65%);
}
.orb.o3{
  width:50vmax;height:50vmax;left:35%;top:55%;
  background:radial-gradient(circle,rgba(236,72,153,.2),transparent 60%);
}
.orb.o4{
  width:40vmax;height:40vmax;right:20%;top:10%;
  background:radial-gradient(circle,rgba(6,182,212,.18),transparent 60%);
}
.orb.o5{
  width:55vmax;height:55vmax;left:10%;bottom:5%;
  background:radial-gradient(circle,rgba(99,102,241,.2),transparent 60%);
}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(3vw,-2vh) scale(1.08)}
  50%{transform:translate(-2vw,3vh) scale(.92)}
  75%{transform:translate(1vw,1vh) scale(1.05)}
}

/* ===== RING VISUALIZER — CENTER ===== */
.ring-wrap{
  position:relative;
  width:min(380px,85vmin);height:min(380px,85vmin);
  z-index:2;
}
.ring-canvas{
  width:100%;height:100%;
  display:block;
}
.ring-glow{
  position:absolute;inset:-40%;
  border-radius:50%;
  background:radial-gradient(circle,rgba(124,58,237,.15),transparent 50%);
  opacity:0;transition:opacity 1.5s;
  pointer-events:none;filter:blur(40px);
  z-index:-1;
}
body.active .ring-glow{opacity:1;animation:ringGlow 3s ease-in-out infinite}
@keyframes ringGlow{
  0%,100%{opacity:.4;transform:scale(1)}
  50%{opacity:.8;transform:scale(1.15)}
}

/* ===== PARTICLES — HUGE FIELD ===== */
.particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.particle{
  position:absolute;border-radius:50%;
  opacity:0;
  animation:pFloat linear infinite;
}
@keyframes pFloat{
  0%{transform:translateY(110vh) rotate(0deg) scale(0);opacity:0}
  8%{opacity:.9}
  92%{opacity:.9}
  100%{transform:translateY(-10vh) rotate(360deg) scale(1);opacity:0}
}

/* ===== WAVE BARS — BOTTOM ===== */
.wave-wrap{
  position:fixed;bottom:0;left:0;right:0;
  height:200px;z-index:1;pointer-events:none;
}
#waveCanvas{width:100%;height:100%;display:block}

/* ===== BEAM RAYS — TOP ===== */
.beams{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  overflow:hidden;opacity:0;transition:opacity 2s;
}
body.active .beams{opacity:1}
.beam{
  position:absolute;top:0;
  width:2px;height:100%;
  opacity:0;
}
.beam::after{
  content:'';position:absolute;top:0;left:0;
  width:100%;height:100%;
  background:linear-gradient(180deg,var(--accent),transparent 80%);
  filter:blur(3px);
}

/* ===== CENTER CONTENT ===== */
.center-content{
  position:relative;z-index:10;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;
  gap:20px;
  transition:opacity .8s,transform .8s;
}

/* Play Button */
.play-btn-wrap{
  position:relative;
  cursor:pointer;
  transition:transform .4s;
}
.play-btn-wrap:hover{transform:scale(1.08)}
.play-btn-wrap:active{transform:scale(.95)}

.play-ring{
  width:120px;height:120px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  display:flex;align-items:center;justify-content:center;
  font-size:40px;
  box-shadow:0 0 60px rgba(124,58,237,.4),0 0 120px rgba(124,58,237,.2);
  transition:box-shadow .5s;
  position:relative;
}
body.active .play-ring{
  box-shadow:0 0 80px rgba(124,58,237,.6),0 0 160px rgba(124,58,237,.3);
  animation:playPulse 2s ease-in-out infinite;
}
@keyframes playPulse{
  0%,100%{box-shadow:0 0 60px rgba(124,58,237,.4),0 0 120px rgba(124,58,237,.2)}
  50%{box-shadow:0 0 100px rgba(124,58,237,.7),0 0 200px rgba(124,58,237,.35)}
}

.play-ring .orbit{
  position:absolute;inset:-12px;
  border:2px solid rgba(168,85,247,.2);
  border-radius:50%;
  border-top-color:rgba(168,85,247,.6);
  animation:orbit 3s linear infinite;
  opacity:0;transition:opacity 1s;
}
body.active .play-ring .orbit{opacity:1}
.play-ring .orbit.o2{
  inset:-24px;
  border-color:rgba(236,72,153,.1);
  border-top-color:rgba(236,72,153,.4);
  animation-duration:5s;animation-direction:reverse;
}
@keyframes orbit{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Track Info */
.track-info{
  transition:opacity .6s,transform .6s;
}
.track-title{
  font-size:clamp(18px,4vw,28px);
  font-weight:800;letter-spacing:-.5px;
  line-height:1.3;
  max-width:400px;
  background:linear-gradient(135deg,#fff 30%,var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.track-artist{
  font-size:clamp(13px,2.5vw,16px);
  color:var(--dim);font-weight:500;
  margin-top:6px;
}
.track-badge{
  display:inline-block;margin-top:10px;
  font-size:10px;font-weight:700;
  padding:4px 12px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.5px;
  background:rgba(124,58,237,.15);color:var(--accent2);
  border:1px solid rgba(124,58,237,.2);
}

/* Minimized Controls (after play) */
.mini-controls{
  position:fixed;bottom:40px;left:50%;
  transform:translateX(-50%);
  display:flex;align-items:center;gap:20px;
  z-index:20;
  opacity:0;pointer-events:none;
  transition:opacity .6s,transform .6s;
}
.mini-controls.show{
  opacity:1;pointer-events:all;
}
.mc-btn{
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
  color:var(--text);
  width:48px;height:48px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;
  transition:all .25s;
}
.mc-btn:hover{
  background:rgba(255,255,255,.12);
  border-color:rgba(124,58,237,.3);
  transform:scale(1.1);
}
.mc-btn.play{
  width:64px;height:64px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:2px solid rgba(255,255,255,.1);
  font-size:22px;
  box-shadow:0 8px 32px rgba(124,58,237,.4);
}
.mc-btn.play:hover{
  box-shadow:0 12px 48px rgba(124,58,237,.6);
}

/* Volume */
.vol-wrap{
  display:flex;align-items:center;gap:8px;
}
.vol-slider{
  -webkit-appearance:none;appearance:none;
  width:100px;height:3px;
  background:rgba(255,255,255,.1);
  border-radius:2px;outline:none;cursor:pointer;
}
.vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  background:var(--accent2);border-radius:50%;cursor:pointer;
  box-shadow:0 0 10px rgba(168,85,247,.5);
}

/* Progress */
.progress-mini{
  position:fixed;bottom:0;left:0;right:0;
  height:3px;z-index:20;
  background:rgba(255,255,255,.03);
  cursor:pointer;
  opacity:0;transition:opacity .6s;
}
.progress-mini.show{opacity:1}
.progress-mini:hover{height:5px}
.progress-mini-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));
  transition:width .2s linear;
}

/* Time */
.time-display{
  position:fixed;bottom:20px;right:28px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--dim);
  font-variant-numeric:tabular-nums;
  z-index:20;
  opacity:0;transition:opacity .6s;
}
.time-display.show{opacity:1}

/* Brand */
.brand{
  position:fixed;top:24px;left:28px;z-index:20;
  font-size:20px;font-weight:900;letter-spacing:-1px;
  background:linear-gradient(135deg,#fff 20%,var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  opacity:.7;transition:opacity .6s;
}
body.active .brand{opacity:1}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
  .orb,.particle,.play-ring .orbit{animation:none !important}
  .ring-glow{animation:none !important}
  .beam{display:none}
}

@media(max-width:600px){
  .play-ring{width:100px;height:100px;font-size:32px}
  .vol-wrap{display:none}
  .mini-controls{gap:14px;bottom:30px}
  .mc-btn{width:42px;height:42px;font-size:16px}
  .mc-btn.play{width:56px;height:56px;font-size:20px}
  .ring-wrap{width:min(300px,80vmin);height:min(300px,80vmin)}
  .brand{left:16px;top:16px;font-size:16px}
  .time-display{right:16px;bottom:14px}
  .wave-wrap{height:140px}
}
</style>
</head>
<body>

<div class="experience">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="orb o4"></div>
  <div class="orb o5"></div>
</div>

<div class="beams" id="beams"></div>
<div class="particles" id="particles"></div>

<div class="wave-wrap"><canvas id="waveCanvas"></canvas></div>

<!-- CENTER -->
<div class="center-content" id="centerContent">
  <div class="ring-wrap"><canvas class="ring-canvas" id="ringCanvas"></canvas><div class="ring-glow"></div></div>
  <div class="track-info">
    <div class="track-title">Faris Adam & Diva Aurel<br>Body Pata Pata</div>
    <div class="track-artist">Thailand Style · FX NOBLE</div>
    <div class="track-badge">YouTube</div>
  </div>
  <div class="play-btn-wrap" id="playBtn">
    <div class="play-ring">
      ▶
      <div class="orbit"></div>
      <div class="orbit o2"></div>
    </div>
  </div>
</div>

<!-- BRAND -->
<div class="brand">NovaBeats</div>

<!-- MINI CONTROLS -->
<div class="mini-controls" id="miniCtrl">
  <div class="vol-wrap">
    <button class="mc-btn" id="muteBtn" title="Mute">🔊</button>
    <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step=".01" value=".8">
  </div>
  <button class="mc-btn" id="prevBtn" title="Previous">⏮</button>
  <button class="mc-btn play" id="miniPlay" title="Play/Pause">▶</button>
  <button class="mc-btn" id="nextBtn" title="Next">⏭</button>
  <button class="mc-btn" id="repeatBtn" title="Repeat">🔁</button>
</div>

<!-- PROGRESS -->
<div class="progress-mini" id="progressBar">
  <div class="progress-mini-fill" id="progressFill"></div>
</div>

<!-- TIME -->
<div class="time-display" id="timeDisplay">
  <span id="curTime">0:00</span> / <span id="totTime">0:00</span>
</div>

<!-- YT IFRAME (hidden) -->
<div id="ytFrame" style="position:absolute;left:-9999px;width:1px;height:1px"></div>

<script>
// ===== STATE =====
let playing=false, repeat=0;
const audio=new Audio();audio.volume=.8;

// ===== PARTICLES =====
(function(){
  const el=document.getElementById('particles');
  const colors=[
    'rgba(124,58,237,.7)','rgba(168,85,247,.6)','rgba(236,72,153,.5)',
    'rgba(6,182,212,.6)','rgba(99,102,241,.5)','rgba(255,255,255,.3)'
  ];
  for(let i=0;i<50;i++){
    const p=document.createElement('div');p.className='particle';
    const size=3+Math.random()*6;
    const x=Math.random()*100;
    const dur=18+Math.random()*30;
    const delay=Math.random()*25;
    const c=colors[Math.floor(Math.random()*colors.length)];
    Object.assign(p.style,{
      width:size+'px',height:size+'px',left:x+'%',
      background:c,
      boxShadow:`0 0 ${size*4}px ${c},0 0 ${size*8}px ${c}`,
      animationDuration:dur+'s',animationDelay:delay+'s',
    });
    el.appendChild(p);
  }
})();

// ===== BEAMS =====
(function(){
  const el=document.getElementById('beams');
  for(let i=0;i<12;i++){
    const b=document.createElement('div');b.className='beam';
    const x=5+Math.random()*90;
    const c=['var(--accent)','var(--accent2)','var(--accent3)','var(--cyan)'][Math.floor(Math.random()*4)];
    Object.assign(b.style,{
      left:x+'%',
      background:`linear-gradient(180deg,${c},transparent 80%)`,
      opacity:(.03+Math.random()*.08).toFixed(2),
      animation:`beamPulse ${2+Math.random()*3}s ease-in-out infinite`,
      animationDelay:Math.random()*2+'s',
    });
    el.appendChild(b);
  }
  const style=document.createElement('style');
  style.textContent=`@keyframes beamPulse{0%,100%{opacity:.02;transform:scaleY(.8)}50%{opacity:.1;transform:scaleY(1)}}`;
  document.head.appendChild(style);
})();

// ===== AUDIO ENGINE =====
let audioCtx,analyser,dataArr,vizOk=false;

function initAudio(){
  if(vizOk)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();analyser.fftSize=512;
    dataArr=new Uint8Array(analyser.frequencyBinCount);
    const src=audioCtx.createMediaElementSource(audio);
    src.connect(analyser);analyser.connect(audioCtx.destination);
    vizOk=true;
    drawRing();drawWave();reactLoop();
  }catch(e){}
}

// ===== RING VISUALIZER =====
const ringC=document.getElementById('ringCanvas');
const rx=ringC.getContext('2d');

function drawRing(){
  requestAnimationFrame(drawRing);
  if(!analyser)return;
  const s=ringC.parentElement.offsetWidth;
  const dpr=window.devicePixelRatio||1;
  ringC.width=s*dpr;ringC.height=s*dpr;
  rx.scale(dpr,dpr);
  rx.clearRect(0,0,s,s);

  analyser.getByteFrequencyData(dataArr);

  const cx=s/2,cy=s/2;
  const baseR=s*.28;
  const bars=128;
  const step=Math.floor(dataArr.length/bars);

  // Outer ring — frequency bars
  for(let i=0;i<bars;i++){
    const v=dataArr[i*step]/255;
    const angle=(i/bars)*Math.PI*2-Math.PI/2;
    const barLen=v*s*.22+2;
    const r1=baseR+v*8;
    const r2=r1+barLen;

    const x1=cx+Math.cos(angle)*r1;
    const y1=cy+Math.sin(angle)*r1;
    const x2=cx+Math.cos(angle)*r2;
    const y2=cy+Math.sin(angle)*r2;

    const hue=260+i/bars*80;
    const alpha=.3+v*.7;
    rx.strokeStyle=`hsla(${hue},80%,${50+v*30}%,${alpha})`;
    rx.lineWidth=2.5;
    rx.lineCap='round';
    rx.beginPath();rx.moveTo(x1,y1);rx.lineTo(x2,y2);rx.stroke();

    // Glow tip
    if(v>.5){
      rx.beginPath();rx.arc(x2,y2,2+v*3,0,Math.PI*2);
      rx.fillStyle=`hsla(${hue},90%,70%,${v*.4})`;
      rx.fill();
    }
  }

  // Inner circle — waveform
  rx.beginPath();
  const waveBars=64;
  for(let i=0;i<=waveBars;i++){
    const v=dataArr[i*step]/255;
    const angle=(i/waveBars)*Math.PI*2-Math.PI/2;
    const r=baseR*.6+v*baseR*.35;
    const x=cx+Math.cos(angle)*r;
    const y=cy+Math.sin(angle)*r;
    if(i===0)rx.moveTo(x,y);else rx.lineTo(x,y);
  }
  rx.closePath();
  const grd=rx.createRadialGradient(cx,cy,0,cx,cy,baseR);
  grd.addColorStop(0,'rgba(124,58,237,.08)');
  grd.addColorStop(1,'rgba(168,85,247,.02)');
  rx.fillStyle=grd;rx.fill();
  rx.strokeStyle='rgba(168,85,247,.25)';rx.lineWidth=1.5;rx.stroke();

  // Center dot
  let avg=0;for(let i=0;i<dataArr.length;i++)avg+=dataArr[i];
  avg=avg/dataArr.length/255;
  const dotR=4+avg*12;
  rx.beginPath();rx.arc(cx,cy,dotR,0,Math.PI*2);
  rx.fillStyle=`rgba(168,85,247,${.3+avg*.5})`;
  rx.fill();
  rx.beginPath();rx.arc(cx,cy,dotR+8,0,Math.PI*2);
  rx.strokeStyle=`rgba(168,85,247,${avg*.3})`;rx.lineWidth=1;rx.stroke();
}

// ===== WAVE BARS — BOTTOM =====
const waveC=document.getElementById('waveCanvas');
const wx=waveC.getContext('2d');

function drawWave(){
  requestAnimationFrame(drawWave);
  if(!analyser)return;
  const w=waveC.parentElement.offsetWidth;
  const h=waveC.parentElement.offsetHeight;
  const dpr=window.devicePixelRatio||1;
  waveC.width=w*dpr;waveC.height=h*dpr;
  wx.scale(dpr,dpr);
  wx.clearRect(0,0,w,h);

  analyser.getByteFrequencyData(dataArr);

  const bars=80;
  const step=Math.floor(dataArr.length/bars);
  const bw=w/bars;

  for(let i=0;i<bars;i++){
    const v=dataArr[i*step]/255;
    const bh=v*h*.85+2;
    const x=i*bw;
    const y=h-bh;

    const hue=260+i/bars*60;
    const grad=wx.createLinearGradient(x,y,x,h);
    grad.addColorStop(0,`hsla(${hue},80%,60%,${v*.8})`);
    grad.addColorStop(.5,`hsla(${hue},70%,50%,${v*.4})`);
    grad.addColorStop(1,`hsla(${hue},60%,40%,0)`);

    wx.fillStyle=grad;
    wx.beginPath();wx.roundRect(x+1,y,bw-2,bh,[4,4,0,0]);wx.fill();

    // Glow
    if(v>.6){
      wx.shadowColor=`hsla(${hue},90%,70%,.4)`;
      wx.shadowBlur=12;
      wx.fillStyle=`hsla(${hue},80%,60%,${v*.15})`;
      wx.fillRect(x+1,y,bw-2,bh);
      wx.shadowBlur=0;
    }
  }
}

// ===== REACTIVE LOOP =====
function reactLoop(){
  requestAnimationFrame(reactLoop);
  if(!analyser||!playing)return;
  analyser.getByteFrequencyData(dataArr);

  let sum=0;for(let i=0;i<dataArr.length;i++)sum+=dataArr[i];
  const avg=sum/dataArr.length/255;
  const bass=dataArr[8]/255;
  const mid=dataArr[60]/255;
  const high=dataArr[150]/255;

  // ORBS — massive reactive movement
  document.querySelectorAll('.orb').forEach((o,i)=>{
    const scale=1+bass*.35*((i%2)?1:-1);
    const tx=Math.sin(Date.now()/(3000+i*500))*30*avg;
    const ty=Math.cos(Date.now()/(4000+i*700))*25*avg;
    o.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
    o.style.opacity=(.3+avg*.7).toFixed(2);
    o.style.filter=`blur(${60+bass*40}px)`;
  });

  // PARTICLES — speed + size react
  document.querySelectorAll('.particle').forEach(p=>{
    if(!p._base){p._base=parseFloat(p.style.animationDuration)||20;}
    p.style.animationDuration=(p._base/(1+avg*2))+'s';
  });

  // BEAMS — opacity react
  document.querySelectorAll('.beam').forEach(b=>{
    const base=parseFloat(b.style.opacity)||0.05;
    b.style.opacity=(base+avg*.15).toFixed(2);
  });

  // Background darkens further on bass
  document.querySelector('.experience').style.background=
    `rgb(${Math.floor(2+bass*4)},${Math.floor(2+bass*3)},${Math.floor(5+bass*6)})`;
}

// ===== YT IFRAME API =====
const ytTag=document.createElement('script');
ytTag.src='https://www.youtube.com/iframe_api';
document.head.appendChild(ytTag);

let ytPlayer;
window.onYouTubeIframeAPIReady=function(){
  ytPlayer=new YT.Player('ytFrame',{
    height:'1',width:'1',
    playerVars:{autoplay:0,controls:0,disablekb:1,fs:0,modestbranding:1},
    events:{
      onStateChange:onYT,
      onError:()=>{}
    }
  });
};

function onYT(e){
  if(e.data===YT.PlayerState.PLAYING){
    playing=true;onPlay();
  }else if(e.data===YT.PlayerState.PAUSED){
    playing=false;onPause();
  }else if(e.data===YT.PlayerState.ENDED){
    handleEnd();
  }
}

let progIv;
function startProg(){
  clearInterval(progIv);
  progIv=setInterval(()=>{
    if(!ytPlayer?.getDuration)return;
    const c=ytPlayer.getCurrentTime()||0,d=ytPlayer.getDuration()||0;
    if(d>0){
      document.getElementById('progressFill').style.width=(c/d*100)+'%';
      document.getElementById('curTime').textContent=fmt(c);
      document.getElementById('totTime').textContent=fmt(d);
    }
  },200);
}

// ===== PLAY/PAUSE =====
function onPlay(){
  document.body.classList.add('active');
  document.getElementById('miniPlay').textContent='⏸';
  document.getElementById('playBtn').querySelector('.play-ring').innerHTML=
    '⏸<div class="orbit"></div><div class="orbit o2"></div>';
  document.getElementById('miniCtrl').classList.add('show');
  document.getElementById('progressBar').classList.add('show');
  document.getElementById('timeDisplay').classList.add('show');

  // Fade center content
  const center=document.getElementById('centerContent');
  center.style.transform='scale(.85)';
  center.style.opacity='.7';

  startProg();
}

function onPause(){
  document.body.classList.remove('active');
  document.getElementById('miniPlay').textContent='▶';
  document.getElementById('playBtn').querySelector('.play-ring').innerHTML=
    '▶<div class="orbit"></div><div class="orbit o2"></div>';

  const center=document.getElementById('centerContent');
  center.style.transform='scale(1)';
  center.style.opacity='1';

  clearInterval(progIv);
}

function doPlay(){
  initAudio();
  if(ytPlayer?.playVideo){
    if(audioCtx?.state==='suspended')audioCtx.resume();
    ytPlayer.playVideo();
  }
}

function doPause(){
  if(ytPlayer?.pauseVideo)ytPlayer.pauseVideo();
}

function toggle(){playing?doPause():doPlay();}

function handleEnd(){
  if(repeat>=1){
    if(ytPlayer?.seekTo){ytPlayer.seekTo(0);ytPlayer.playVideo();}
  }else{
    onPause();clearInterval(progIv);
  }
}

// ===== CONTROLS =====
document.getElementById('playBtn').addEventListener('click',toggle);
document.getElementById('miniPlay').addEventListener('click',toggle);

document.getElementById('repeatBtn').addEventListener('click',()=>{
  repeat=(repeat+1)%2;
  const b=document.getElementById('repeatBtn');
  b.classList.toggle('active',repeat>0);
  b.style.color=repeat>0?'var(--accent2)':'var(--text)';
});

// Volume
const volS=document.getElementById('volSlider');
const muteB=document.getElementById('muteBtn');
volS.addEventListener('input',e=>{
  const v=parseFloat(e.target.value);audio.volume=v;
  if(ytPlayer?.setVolume)ytPlayer.setVolume(v*100);
  muteB.textContent=v===0?'🔇':v<.5?'🔉':'🔊';
});
muteB.addEventListener('click',()=>{
  audio.muted=!audio.muted;
  if(ytPlayer){audio.muted?ytPlayer.mute():ytPlayer.unMute();}
  muteB.textContent=audio.muted?'🔇':audio.volume<.5?'🔉':'🔊';
});

// Progress seek
document.getElementById('progressBar').addEventListener('click',e=>{
  const r=e.currentTarget.getBoundingClientRect();
  const p=(e.clientX-r.left)/r.width;
  if(ytPlayer?.seekTo)ytPlayer.seekTo(p*ytPlayer.getDuration(),true);
});

// Keyboard
document.addEventListener('keydown',e=>{
  switch(e.code){
    case'Space':e.preventDefault();toggle();break;
    case'ArrowRight':if(ytPlayer?.seekTo)ytPlayer.seekTo(ytPlayer.getCurrentTime()+5);break;
    case'ArrowLeft':if(ytPlayer?.seekTo)ytPlayer.seekTo(ytPlayer.getCurrentTime()-5);break;
    case'ArrowUp':e.preventDefault();{const v=Math.min(1,audio.volume+.05);audio.volume=v;if(ytPlayer?.setVolume)ytPlayer.setVolume(v*100);volS.value=v;}break;
    case'ArrowDown':e.preventDefault();{const v=Math.max(0,audio.volume-.05);audio.volume=v;if(ytPlayer?.setVolume)ytPlayer.setVolume(v*100);volS.value=v;}break;
  }
});

// Media Session
if('mediaSession' in navigator){
  const meta=new MediaMetadata({title:'Faris Adam & Diva Aurel Body Pata Pata',artist:'FX NOBLE · Thailand Style'});
  navigator.mediaSession.metadata=meta;
  navigator.mediaSession.setActionHandler('play',doPlay);
  navigator.mediaSession.setActionHandler('pause',doPause);
  navigator.mediaSession.setActionHandler('seekbackward',()=>{if(ytPlayer?.seekTo)ytPlayer.seekTo(ytPlayer.getCurrentTime()-10)});
  navigator.mediaSession.setActionHandler('seekforward',()=>{if(ytPlayer?.seekTo)ytPlayer.seekTo(ytPlayer.getCurrentTime()+10)});
}

// Mouse idle → hide controls
let idleTimer;
document.addEventListener('mousemove',()=>{
  const mc=document.getElementById('miniCtrl');
  const pb=document.getElementById('progressBar');
  const td=document.getElementById('timeDisplay');
  if(playing){
    mc.style.opacity='1';pb.style.opacity='1';td.style.opacity='1';
    clearTimeout(idleTimer);
    idleTimer=setTimeout(()=>{
      mc.style.opacity='0';pb.style.opacity='0';td.style.opacity='0';
    },3000);
  }
});

function fmt(s){if(!s||isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}
</script>
