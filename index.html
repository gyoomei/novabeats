<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>NovaBeats — Music Player</title>
<meta name="description" content="NovaBeats — beautiful music player with visualizer, queue, and local file support.">
<meta name="theme-color" content="#0a0a0f">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#0e0e16;--surface:#13131d;--surface2:#1a1a28;--surface3:#222236;
  --accent:#1ed760;--accent2:#1db954;--accent3:#169c46;--accent-glow:rgba(30,215,96,.15);
  --text:#e8e8f0;--text2:#b3b3c8;--dim:#6b6b80;--dim2:#3a3a50;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 8px 32px rgba(0,0,0,.4);
  --transition:all .2s cubic-bezier(.4,0,.2,1);
}
html,body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--text);
  height:100%;overflow:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}

/* ===== LAYOUT ===== */
.app{display:grid;grid-template-columns:280px 1fr;grid-template-rows:1fr auto;height:100vh;height:100dvh;overflow:hidden}
@media(max-width:900px){.app{grid-template-columns:1fr}}
@media(max-width:900px){.sidebar{display:none}}

/* ===== SIDEBAR ===== */
.sidebar{
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-header{padding:20px 16px 12px;flex-shrink:0}
.sb-logo{display:flex;align-items:center;gap:10px}
.sb-logo svg{width:28px;height:28px;fill:var(--accent)}
.sb-logo-text{font-size:20px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),#4ade80);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-search{margin-top:12px;position:relative}
.sb-search input{
  width:100%;padding:10px 12px 10px 36px;
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);font-size:13px;font-family:inherit;outline:none;
  transition:var(--transition);
}
.sb-search input:focus{border-color:var(--accent);background:var(--surface3)}
.sb-search input::placeholder{color:var(--dim)}
.sb-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:var(--dim);pointer-events:none}

.sb-tabs{display:flex;gap:0;padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-tab{
  flex:1;padding:10px 0;text-align:center;font-size:11px;font-weight:600;
  color:var(--dim);cursor:pointer;border:none;background:none;
  border-bottom:2px solid transparent;transition:var(--transition);
  letter-spacing:.8px;text-transform:uppercase;
}
.sb-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.sb-tab:hover{color:var(--text2)}

.sb-content{flex:1;overflow-y:auto;padding:8px 8px 80px;scrollbar-width:thin;scrollbar-color:var(--dim2) transparent}
.sb-content::-webkit-scrollbar{width:4px}
.sb-content::-webkit-scrollbar-thumb{background:var(--dim2);border-radius:4px}

/* Queue Items */
.q-item{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  border-radius:var(--radius-sm);cursor:pointer;
  transition:var(--transition);position:relative;
}
.q-item:hover{background:rgba(255,255,255,.04)}
.q-item:active{transform:scale(.98)}
.q-item.active{background:var(--accent-glow)}
.q-item.active::before{
  content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;
  background:var(--accent);border-radius:0 3px 3px 0;
}
.q-art{width:40px;height:40px;border-radius:var(--radius-xs);overflow:hidden;flex-shrink:0;background:var(--surface2)}
.q-art canvas{width:100%;height:100%;display:block}
.q-meta{flex:1;min-width:0}
.q-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.q-item.active .q-title{color:var(--accent)}
.q-artist{font-size:11px;color:var(--dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-duration{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);flex-shrink:0}
.q-item .q-num{
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);
  width:20px;text-align:center;flex-shrink:0;
}
.playing-indicator{display:none;align-items:flex-end;gap:1.5px;height:12px}
.q-item.active .playing-indicator{display:flex}
.q-item.active .q-num span{display:none}
.playing-indicator span{width:2px;background:var(--accent);border-radius:1px;animation:ind .6s ease-in-out infinite}
.playing-indicator span:nth-child(2){animation-delay:.1s;height:60%}
.playing-indicator span:nth-child(3){animation-delay:.2s;height:40%}
@keyframes ind{0%,100%{height:25%}50%{height:100%}}

/* Upload Zone */
.sb-upload{padding:12px;border-top:1px solid var(--border);flex-shrink:0}
.upload-zone{
  border:1.5px dashed var(--dim2);border-radius:var(--radius-sm);
  padding:16px;text-align:center;cursor:pointer;transition:var(--transition);
  font-size:12px;color:var(--dim);
}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);color:var(--accent)}
.upload-zone input{display:none}

/* ===== MAIN ===== */
.main{position:relative;overflow:hidden;display:flex;flex-direction:column;background:var(--bg2)}

/* Background Effects */
.bg-fx{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0;transition:opacity 2s ease;will-change:transform,opacity}
body.playing .orb{opacity:1}
.orb.o1{width:60vmax;height:60vmax;left:-20%;top:-20%;background:radial-gradient(circle,rgba(30,215,96,.12),transparent 55%)}
.orb.o2{width:50vmax;height:50vmax;right:-15%;bottom:-15%;background:radial-gradient(circle,rgba(74,222,128,.08),transparent 55%)}
.orb.o3{width:40vmax;height:40vmax;left:40%;top:60%;background:radial-gradient(circle,rgba(22,156,70,.06),transparent 50%)}

#particlesCanvas{position:absolute;inset:0;z-index:1;pointer-events:none}

/* YouTube iframe (hidden) */
#ytPlayerWrap{position:absolute;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden}

/* Content */
.content{
  position:relative;z-index:2;flex:1;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  padding:24px 16px 140px;gap:20px;
}

/* Album Art */
.np-art-wrap{
  position:relative;width:min(300px,50vw);aspect-ratio:1;
  border-radius:16px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px var(--border);
  transition:transform .5s cubic-bezier(.16,1,.3,1),box-shadow .7s;
}
body.playing .np-art-wrap{
  transform:scale(1.02);
  box-shadow:0 28px 80px rgba(30,215,96,.1),0 0 0 1px rgba(30,215,96,.1);
}
.np-art-canvas{width:100%;height:100%;display:block}
.np-ring-wrap{position:absolute;inset:-50px;pointer-events:none;z-index:3}
.np-ring-canvas{width:100%;height:100%;display:block}

/* Track Info */
.np-info{text-align:center;z-index:2;max-width:90vw}
.np-title{font-size:clamp(20px,4vw,32px);font-weight:800;letter-spacing:-.8px;line-height:1.2;color:var(--text)}
body.playing .np-title{color:#fff}
.np-artist{font-size:clamp(13px,3vw,15px);color:var(--dim);margin-top:6px;font-weight:500}

/* Waveform */
.waveform-bar{width:min(520px,82vw);height:48px;position:relative;z-index:2;border-radius:var(--radius-sm);overflow:hidden}
.waveform-bar canvas{width:100%;height:100%;display:block}

/* Status */
.load-status{
  font-size:11px;color:var(--dim);letter-spacing:.8px;text-align:center;
  z-index:2;min-height:16px;font-family:'JetBrains Mono',monospace;
}
.load-status.error{color:#ef4444}
.load-status.ready{color:var(--accent)}

/* ===== PLAYER BAR ===== */
.player-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:20;
  background:linear-gradient(180deg,transparent,rgba(10,10,15,.7) 20%,rgba(10,10,15,.95));
  padding:0 20px max(12px,env(safe-area-inset-bottom));
}

/* Progress Bar */
.pb-progress{
  width:100%;height:4px;background:rgba(255,255,255,.08);
  cursor:pointer;position:relative;transition:height .15s;border-radius:2px;margin-bottom:10px;
}
.pb-progress:hover{height:6px}
.pb-fill{height:100%;width:0%;border-radius:2px;background:var(--accent);transition:width .1s linear}
.pb-fill::after{
  content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%);
  width:12px;height:12px;background:var(--accent);border-radius:50%;
  opacity:0;transition:opacity .15s;box-shadow:0 0 8px var(--accent-glow);
}
.pb-progress:hover .pb-fill::after{opacity:1}

/* Controls Row */
.pb-controls{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-bottom:4px}
.pb-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
.pb-center{display:flex;align-items:center;gap:8px;flex-shrink:0}
.pb-right{display:flex;align-items:center;gap:10px;flex:1;justify-content:flex-end}

/* Track Info */
.pb-track-info{display:flex;align-items:center;gap:12px;min-width:0}
.pb-mini-art{width:44px;height:44px;border-radius:var(--radius-xs);overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.pb-mini-art canvas{width:100%;height:100%;display:block}
.pb-mini-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
@media(max-width:480px){.pb-mini-title{max-width:100px}}
.pb-mini-artist{font-size:11px;color:var(--dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Buttons */
.pb-btn{
  width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
  background:transparent;color:var(--text2);display:flex;align-items:center;justify-content:center;
  transition:var(--transition);-webkit-tap-highlight-color:transparent;
}
.pb-btn:hover{background:rgba(255,255,255,.06);color:var(--text)}
.pb-btn:active{transform:scale(.9)}
.pb-btn svg{width:18px;height:18px;fill:currentColor;pointer-events:none}
.pb-btn.active{color:var(--accent)!important}

.pb-btn.play-main{
  width:48px;height:48px;background:var(--accent);color:#fff;
  box-shadow:0 4px 16px rgba(30,215,96,.3);
}
.pb-btn.play-main:hover{background:var(--accent2);transform:scale(1.04)}
.pb-btn.play-main:active{transform:scale(.95)}
.pb-btn.play-main svg{width:20px;height:20px}

/* Time */
.pb-time{
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);
  font-variant-numeric:tabular-nums;display:flex;gap:4px;
}

/* Volume */
.pb-vol{display:flex;align-items:center;gap:8px}
@media(max-width:768px){.pb-vol{display:none}}
.pb-vol-slider{
  -webkit-appearance:none;appearance:none;width:90px;height:4px;
  background:rgba(255,255,255,.08);border-radius:2px;outline:none;cursor:pointer;
}
.pb-vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:pointer}
.pb-vol-slider::-moz-range-thumb{width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:pointer;border:none}

/* Mobile Toggle */
.sb-toggle{
  display:none;position:fixed;bottom:90px;right:16px;z-index:25;
  width:48px;height:48px;border-radius:50%;border:none;
  background:var(--surface2);color:var(--text);cursor:pointer;
  box-shadow:var(--shadow);border:1px solid var(--border);
  align-items:center;justify-content:center;transition:var(--transition);
}
.sb-toggle:hover{background:var(--surface3);transform:scale(1.05)}
.sb-toggle svg{width:20px;height:20px;fill:currentColor}
@media(max-width:900px){.sb-toggle{display:flex}}

/* Tap Hint */
.tap-hint{
  position:absolute;bottom:28%;left:50%;transform:translateX(-50%);
  z-index:5;text-align:center;animation:fp 2.5s ease-in-out infinite;
}
.tap-hint-icon{
  width:72px;height:72px;border-radius:50%;margin:0 auto 14px;
  display:flex;align-items:center;justify-content:center;
  background:var(--accent-glow);border:1.5px solid rgba(30,215,96,.2);
}
.tap-hint-icon svg{width:28px;height:28px;fill:var(--accent)}
.tap-hint-text{font-size:12px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;font-weight:500}
body.playing .tap-hint{opacity:0;pointer-events:none;transition:opacity .4s}
@keyframes fp{0%,100%{opacity:.3}50%{opacity:.8}}

/* Sidebar overlay (mobile) */
@media(max-width:900px){
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;width:300px;z-index:100;
    transform:translateX(-100%);transition:transform .3s cubic-bezier(.16,1,.3,1);
    box-shadow:4px 0 20px rgba(0,0,0,.5);
  }
  .sidebar.open{transform:translateX(0)}
  .sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
  .sb-overlay.open{display:block}
}

/* Reduced Motion */
@media(prefers-reduced-motion:reduce){
  .orb,#particlesCanvas,.playing-indicator span,.tap-hint{animation:none!important}
  *{transition-duration:0s!important}
}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim2);border-radius:3px}

/* ===== RESPONSIVE ===== */
@media(max-width:480px){
  .np-art-wrap{width:min(240px,65vw)}
  .content{padding:16px 12px 130px}
  .pb-controls{gap:6px}
  .pb-btn{width:36px;height:36px}
  .pb-btn.play-main{width:44px;height:44px}
  .pb-btn svg{width:16px;height:16px}
  .pb-btn.play-main svg{width:18px;height:18px}
}
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar Overlay (mobile) -->
  <div class="sb-overlay" id="sbOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="sb-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        <span class="sb-logo-text">NovaBeats</span>
      </div>
      <div class="sb-search">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="searchInput" placeholder="Search tracks..." autocomplete="off">
      </div>
    </div>

    <div class="sb-tabs">
      <button class="sb-tab active" data-tab="queue">Queue</button>
      <button class="sb-tab" data-tab="upload">Upload</button>
    </div>

    <div class="sb-content" id="sbContent">
      <div id="sbQueue"></div>
      <div id="sbUpload" style="display:none">
        <div class="upload-zone" id="uploadZone">
          <svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:var(--dim);margin-bottom:8px"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
          <div>Drop audio files or <strong style="color:var(--accent)">browse</strong></div>
          <div style="font-size:10px;margin-top:4px;color:var(--dim2)">MP3, WAV, OGG, FLAC</div>
          <input type="file" id="fileInput" accept="audio/*" multiple>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="bg-fx">
      <div class="orb o1"></div>
      <div class="orb o2"></div>
      <div class="orb o3"></div>
    </div>
    <canvas id="particlesCanvas"></canvas>
    <div id="ytPlayerWrap"></div>

    <div class="content" id="content">
      <div class="np-art-wrap">
        <canvas class="np-art-canvas" id="npArtCanvas"></canvas>
        <div class="np-ring-wrap"><canvas class="np-ring-canvas" id="npRingCanvas"></canvas></div>
      </div>
      <div class="np-info">
        <div class="np-title" id="npTitle">NovaBeats</div>
        <div class="np-artist" id="npArtist">tap to play</div>
      </div>
      <div class="waveform-bar"><canvas id="waveCanvas"></canvas></div>
      <div class="load-status" id="loadStatus"></div>
    </div>

    <div class="tap-hint" id="tapHint">
      <div class="tap-hint-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="tap-hint-text">tap anywhere</div>
    </div>

    <div class="player-bar">
      <div class="pb-progress" id="pbProgress"><div class="pb-fill" id="pbFill"></div></div>
      <div class="pb-controls">
        <div class="pb-left">
          <div class="pb-track-info">
            <div class="pb-mini-art"><canvas id="pbMiniArt" width="88" height="88"></canvas></div>
            <div>
              <div class="pb-mini-title" id="pbMiniTitle">NovaBeats</div>
              <div class="pb-mini-artist" id="pbMiniArtist">&mdash;</div>
            </div>
          </div>
        </div>
        <div class="pb-center">
          <button class="pb-btn" id="shuffleBtn" title="Shuffle"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
          <button class="pb-btn" id="prevBtn" title="Previous"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
          <button class="pb-btn play-main" id="playBtn" title="Play"><svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg></button>
          <button class="pb-btn" id="nextBtn" title="Next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
          <button class="pb-btn" id="repeatBtn" title="Repeat"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
        </div>
        <div class="pb-right">
          <div class="pb-time"><span id="curTime">0:00</span><span style="color:var(--dim2)">/</span><span id="totTime">0:00</span></div>
          <div class="pb-vol">
            <button class="pb-btn" id="muteBtn" style="width:32px;height:32px"><svg viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
            <input type="range" class="pb-vol-slider" id="volSlider" min="0" max="1" step=".01" value=".8">
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<button class="sb-toggle" id="sbToggle"><svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg></button>

<script>
// ===== TRACKLIST =====
const TRACKS = [
  {title:'Body Pata Pata',artist:'Faris Adam & Diva Aurel',yt:'epLVftkQojw',hue:15,seed:1,type:'yt'},
  {title:'Es Lilin',artist:'Nining Meida',yt:'d0FvMDpVEfg',hue:190,seed:2,type:'yt'},
  {title:'Cintaku Padamu',artist:'Rhoma Irama',yt:'ZbZFGDM6EBc',hue:330,seed:3,type:'yt'},
  {title:'Pergi Pagi Pulang Pagi',artist:'Armada',yt:'tZp5HCT4gAQ',hue:155,seed:4,type:'yt'},
  {title:'Hati-Hati di Jalan',artist:'Tulus',yt:'LmHp1gKZtNc',hue:210,seed:5,type:'yt'},
  {title:'Rungkad',artist:'Happy Asmara',yt:'j4DGCK3i2aI',hue:350,seed:6,type:'yt'},
  {title:'Tak Segampang Itu',artist:'Anggi Marito',yt:'VZhEcKExqZo',hue:175,seed:7,type:'yt'},
  {title:'Komang',artist:'Raim Laode',yt:'cwJTbmf0bKM',hue:120,seed:8,type:'yt'},
];

// ===== STATE =====
let playing = false, shuffle = false, repeat = 0, curIdx = 0;
let ytPlayer = null, ytReady = false, ytApiReady = false;
let localAudio = new Audio(); localAudio.volume = .8;
let audioCtx, analyser, dataArr, vizOk = false;

// ===== SEEDED RANDOM =====
function seededRandom(seed){let s=seed;return function(){s=(s*16807+0)%2147483647;return(s-1)/2147483646}}

// ===== ALBUM ART =====
function generateArt(track,canvas,size){
  const ctx=canvas.getContext('2d');canvas.width=size*2;canvas.height=size*2;ctx.scale(2,2);
  const rng=seededRandom(track.seed*7919);const hue=track.hue||0;
  // Background gradient
  const grd=ctx.createLinearGradient(0,0,size,size);
  grd.addColorStop(0,`hsl(${hue},50%,8%)`);grd.addColorStop(.5,`hsl(${(hue+25)%360},40%,12%)`);grd.addColorStop(1,`hsl(${(hue+50)%360},30%,6%)`);
  ctx.fillStyle=grd;ctx.fillRect(0,0,size,size);
  // Glow orbs
  for(let i=0;i<5;i++){
    const x=rng()*size,y=rng()*size,r=20+rng()*size*.35;
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,`hsla(${(hue+rng()*60)%360},60%,50%,${.06+rng()*.1})`);
    g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  // Subtle lines
  ctx.strokeStyle=`hsla(${hue},30%,40%,.06)`;ctx.lineWidth=1;
  for(let i=0;i<6;i++){ctx.beginPath();ctx.moveTo(rng()*size,rng()*size);ctx.lineTo(rng()*size,rng()*size);ctx.stroke()}
  // Center glow
  const cg=ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size*.3);
  cg.addColorStop(0,`hsla(${hue},60%,50%,.08)`);cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg;ctx.fillRect(0,0,size,size);
  // Music note
  ctx.fillStyle=`hsla(${hue},40%,70%,.06)`;ctx.font=`${size*.22}px 'Inter',sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('\u266B',size/2,size/2);
}
function ensureArt(idx){if(artCanvases[idx])return artCanvases[idx];const c=document.createElement('canvas');generateArt(TRACKS[idx],c,300);artCanvases[idx]=c;return c}

// ===== QUEUE UI =====
function buildQueue(){
  const el=document.getElementById('sbQueue');el.innerHTML='';
  const list = filteredTracks || TRACKS;
  const indices = filteredTracks ? filteredTracks.map(t => TRACKS.indexOf(t)) : TRACKS.map((_,i) => i);
  indices.forEach((idx,i)=>{
    const t = TRACKS[idx];
    const d=document.createElement('div');d.className='q-item'+(idx===curIdx?' active':'');
    d.setAttribute('role','button');d.setAttribute('tabindex','0');
    d.innerHTML=`<span class="q-num"><span>${i+1}</span><div class="playing-indicator"><span></span><span></span><span></span></div></span><div class="q-art"><canvas width="80" height="80"></canvas></div><div class="q-meta"><div class="q-title">${t.title}</div><div class="q-artist">${t.artist}</div></div>`;
    d.addEventListener('click',()=>{loadTrack(idx);doPlay()});
    d.addEventListener('keydown',e=>{if(e.key==='Enter'){loadTrack(idx);doPlay()}});

// ===== AUDIO ENGINE =====
function initAudio() {
  if (vizOk) return;
  vizOk = true;
  if (!prefersReducedMotion) { drawRing(); drawWave(); drawParticles(); reactLoop(); }
  drawNpArt();
}
function initLocalAudio() {
  if (vizOk) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024; analyser.smoothingTimeConstant = .82;
    dataArr = new Uint8Array(analyser.frequencyBinCount);
    const src = audioCtx.createMediaElementSource(localAudio);
    src.connect(analyser); analyser.connect(audioCtx.destination);
    vizOk = true;
    if (!prefersReducedMotion) { drawRing(); drawWave(); drawParticles(); reactLoop(); }
    drawNpArt();
  } catch(e) { console.warn('Local audio init:', e); }
}

// Simulated frequency for YT (CORS blocks Web Audio)
let simData = new Uint8Array(512);
function simulateFrequency() {
  if (!playing) { simData.fill(0); return; }
  const now = Date.now() / 1000;
  for (let i = 0; i < 512; i++) {
    const bass = Math.sin(now * 2.1 + i * .01) * 60 + 60;
    const mid = Math.sin(now * 3.7 + i * .03) * 40 + 40;
    const high = Math.sin(now * 5.3 + i * .08) * 25 + 25;
    const beat = Math.pow(Math.sin(now * 1.05), 8) * 80;
    simData[i] = Math.max(0, Math.min(255, bass * .4 + mid * .3 + high * .2 + beat * (i < 40 ? 1 : .2)));
  }
}
function getData() { return analyser ? (analyser.getByteFrequencyData(dataArr), dataArr) : (simulateFrequency(), simData); }

// ===== VISUALIZERS =====
function drawNpArt() {
  requestAnimationFrame(drawNpArt);
  const c = document.getElementById('npArtCanvas');
  const ctx = c.getContext('2d');
  const wrap = c.parentElement;
  const sz = wrap.offsetWidth;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  if (c.width !== sz * dpr || c.height !== sz * dpr) { c.width = sz * dpr; c.height = sz * dpr; }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, sz, sz);
  ctx.drawImage(ensureArt(curIdx), 0, 0, sz, sz);
  if (!playing) return;
  const d = getData();
  const track = TRACKS[curIdx]; const hue = track.hue || 0;
  let bass = 0; for (let i = 0; i < 20; i++) bass += d[i]; bass = bass / 20 / 255;
  const g = ctx.createRadialGradient(sz/2, sz/2, 0, sz/2, sz/2, sz * .5);
  g.addColorStop(0, `hsla(${hue}, 65%, 50%, ${bass * .15})`);
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g; ctx.fillRect(0, 0, sz, sz);
}

const ringC = document.getElementById('npRingCanvas');
const rx = ringC.getContext('2d');
let ringW = 0;
function drawRing() {
  requestAnimationFrame(drawRing);
  if (!playing) { if (ringW) { rx.clearRect(0, 0, ringC.width, ringC.height); ringW = 0; } return; }
  const wrap = ringC.parentElement; const s = wrap.offsetWidth;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  if (ringW !== s * dpr) { ringC.width = s * dpr; ringC.height = s * dpr; ringW = s * dpr; }
  rx.setTransform(dpr, 0, 0, dpr, 0, 0); rx.clearRect(0, 0, s, s);
  const d = getData(); const cx = s / 2, cy = s / 2; const baseR = s * .32;
  const bars = 120; const step = Math.max(1, Math.floor(d.length / bars));
  const track = TRACKS[curIdx]; const hue = track.hue || 0;
  for (let i = 0; i < bars; i++) {
    const v = d[Math.min(i * step, d.length - 1)] / 255;
    const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
    const r1 = baseR + v * 4, r2 = r1 + v * s * .14 + 2;
    const x1 = cx + Math.cos(angle) * r1, y1 = cy + Math.sin(angle) * r1;
    const x2 = cx + Math.cos(angle) * r2, y2 = cy + Math.sin(angle) * r2;
    rx.strokeStyle = `hsla(${(hue + i / bars * 30) % 360}, 60%, ${45 + v * 25}%, ${.1 + v * .75})`;
    rx.lineWidth = 2; rx.lineCap = 'round'; rx.beginPath(); rx.moveTo(x1, y1); rx.lineTo(x2, y2); rx.stroke();
  }
  let avg = 0; for (let i = 0; i < d.length; i++) avg += d[i]; avg = avg / d.length / 255;
  rx.beginPath(); rx.arc(cx, cy, 3 + avg * 6, 0, Math.PI * 2);
  rx.fillStyle = `hsla(${hue}, 60%, 55%, ${.15 + avg * .4})`; rx.fill();
}

const waveC = document.getElementById('waveCanvas');
const wx = waveC.getContext('2d');
let waveW = 0;
function drawWave() {
  requestAnimationFrame(drawWave);
  if (!playing) { if (waveW) { wx.clearRect(0, 0, waveC.width, waveC.height); waveW = 0; } return; }
  const wrap = waveC.parentElement; const w = wrap.offsetWidth, h = wrap.offsetHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  if (waveW !== w * dpr) { waveC.width = w * dpr; waveC.height = h * dpr; waveW = w * dpr; }
  wx.setTransform(dpr, 0, 0, dpr, 0, 0); wx.clearRect(0, 0, w, h);
  const d = getData(); const bars = 50; const step = Math.max(1, Math.floor(d.length / bars));
  const bw = w / bars; const track = TRACKS[curIdx]; const hue = track.hue || 0;
  for (let i = 0; i < bars; i++) {
    const v = d[Math.min(i * step, d.length - 1)] / 255;
    const bh = v * h * .8 + 1, x = i * bw, y = h - bh;
    const grad = wx.createLinearGradient(x, y, x, h);
    grad.addColorStop(0, `hsla(${(hue + i / bars * 30) % 360}, 60%, 55%, ${v * .65})`);
    grad.addColorStop(.4, `hsla(${(hue + i / bars * 30) % 360}, 50%, 40%, ${v * .3})`);
    grad.addColorStop(1, `hsla(${(hue + i / bars * 30) % 360}, 40%, 25%, 0)`);
    wx.fillStyle = grad; wx.beginPath(); wx.roundRect(x + 1, y, bw - 2, bh, [2, 2, 0, 0]); wx.fill();
  }
}

// ===== PARTICLES =====
const pCanvas = document.getElementById('particlesCanvas');
const pCtx = pCanvas.getContext('2d');
let particles = []; let pW = 0, pH = 0;
function initParticles() {
  particles = [];
  for (let i = 0; i < 35; i++) particles.push({
    x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
    vx: (Math.random() - .5) * .12, vy: -.08 - Math.random() * .25,
    size: 1 + Math.random() * 2, hue: 120 + Math.random() * 30, alpha: .06 + Math.random() * .15, life: Math.random()
  });
}
function drawParticles() {
  requestAnimationFrame(drawParticles);
  const w = window.innerWidth, h = window.innerHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  if (pW !== w * dpr || pH !== h * dpr) { pCanvas.width = w * dpr; pCanvas.height = h * dpr; pW = w * dpr; pH = h * dpr; }
  pCtx.setTransform(dpr, 0, 0, dpr, 0, 0); pCtx.clearRect(0, 0, w, h);
  let avg = 0;
  if (playing) { const d = getData(); for (let i = 0; i < d.length; i++) avg += d[i]; avg = avg / d.length / 255; }
  const boost = playing ? 1 + avg * 2 : 1;
  const track = TRACKS[curIdx];
  for (const p of particles) {
    p.life += .002 * boost;
    if (p.life > 1) { p.life = 0; p.x = Math.random() * w; p.y = h + 10; }
    p.x += p.vx * boost; p.y += p.vy * boost;
    const fadeIn = Math.min(p.life * 5, 1), fadeOut = Math.max(1 - (p.life - .7) / .3, 0);
    const a = p.alpha * fadeIn * (p.life > .7 ? fadeOut : 1) * (playing ? (.3 + avg * .7) : .08);
    const hue = playing ? (track.hue + avg * 30) % 360 : p.hue;
    pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size * boost, 0, Math.PI * 2);
    pCtx.fillStyle = `hsla(${hue}, 55%, 55%, ${a})`; pCtx.fill();
  }
}

// ===== REACTIVE LOOP =====
function reactLoop() {
  requestAnimationFrame(reactLoop);
  if (!playing) return;
  const d = getData();
  let sum = 0; for (let i = 0; i < d.length; i++) sum += d[i];
  const avg = sum / d.length / 255;
  const bass = d[Math.floor(d.length * .05)] / 255;
  const now = Date.now();
  document.querySelectorAll('.orb').forEach((o, i) => {
    const s = 1 + bass * .2 * ((i % 2) ? 1 : -1);
    const tx = Math.sin(now / (2500 + i * 600)) * 25 * (avg + .1);
    const ty = Math.cos(now / (3500 + i * 800)) * 20 * (avg + .1);
    o.style.transform = `translate(${tx}px,${ty}px) scale(${s})`;
    o.style.opacity = (.06 + avg * .4).toFixed(3);
    o.style.filter = `blur(${80 + bass * 30}px)`;
  });
}

// ===== LOAD TRACK =====
function loadTrack(idx) {
  curIdx = idx;
  const t = TRACKS[idx];
  const title = t.title;
  const artist = t.artist;
  document.getElementById('npTitle').textContent = title;
  document.getElementById('npArtist').textContent = artist;
  document.getElementById('pbMiniTitle').textContent = title;
  document.getElementById('pbMiniArtist').textContent = artist;
  const mc = document.getElementById('pbMiniArt');
  mc.getContext('2d').drawImage(ensureArt(idx), 0, 0, 88, 88);
  document.querySelectorAll('.q-item').forEach((el, i) => {
    const qIdx = filteredTracks ? TRACKS.indexOf(filteredTracks[i]) : i;
    el.classList.toggle('active', qIdx === idx);
  });
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({title, artist, album: 'NovaBeats'});
  }
  if (t.type === 'yt') {
    useYt = true;
    if (ytReady) {
      ytPlayer.loadVideoById(t.yt);
      ytPlayer.pauseVideo();
      setStatus('Ready', false, true);
    } else {
      setStatus('Loading...', false, false);
    }
  } else if (t.type === 'local') {
    useYt = false;
    localAudio.src = t.url;
    localAudio.load();
    setStatus('Ready', false, true);
  }
}

// ===== PLAY/PAUSE =====
function doPlay() {
  initAudio();
  if (useYt && ytReady) {
    ytPlayer.playVideo();
  } else if (!useYt) {
    if (!analyser) initLocalAudio();
    if (audioCtx?.state === 'suspended') audioCtx.resume();
    localAudio.play().catch(e => console.warn(e));
  }
}
function doPause() {
  if (useYt && ytReady) ytPlayer.pauseVideo();
  else localAudio.pause();
}
function toggle() { playing ? doPause() : doPlay(); }

function updatePlayIcon(isPlaying) {
  document.getElementById('playIcon').innerHTML = isPlaying
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

function onPlay() {
  playing = true; document.body.classList.add('playing');
  updatePlayIcon(true);
  document.getElementById('playBtn').setAttribute('aria-label', 'Pause');
  startProg();
}
function onPause() {
  playing = false; document.body.classList.remove('playing');
  updatePlayIcon(false);
  document.getElementById('playBtn').setAttribute('aria-label', 'Play');
  clearInterval(progIv);
}

localAudio.addEventListener('play', onPlay);
localAudio.addEventListener('pause', onPause);
localAudio.addEventListener('ended', () => {
  if (repeat === 1) { localAudio.currentTime = 0; localAudio.play(); return; }
  playNext();
});

let progIv;
function startProg() {
  clearInterval(progIv);
  progIv = setInterval(() => {
    let c = 0, d = 0;
    if (useYt && ytReady) {
      c = ytPlayer.getCurrentTime() || 0;
      d = ytPlayer.getDuration() || 0;
    } else {
      c = localAudio.currentTime || 0;
      d = localAudio.duration || 0;
    }
    if (d > 0) {
      document.getElementById('pbFill').style.width = (c / d * 100) + '%';
      document.getElementById('curTime').textContent = fmt(c);
      document.getElementById('totTime').textContent = fmt(d);
    }
  }, 150);
}

// ===== NAVIGATION =====
function getNextIdx() {
  if (shuffle) { let n; do { n = Math.floor(Math.random() * TRACKS.length); } while (n === curIdx && TRACKS.length > 1); return n; }
  return (curIdx + 1) % TRACKS.length;
}
function playNext() { if (!TRACKS.length) return; if (repeat === 2) { loadTrack(curIdx); return; } loadTrack(getNextIdx()); doPlay(); }
function playPrev() {
  if (!TRACKS.length) return;
  let c = useYt && ytReady ? ytPlayer.getCurrentTime() : localAudio.currentTime;
  if (c > 3) { if (useYt && ytReady) ytPlayer.seekTo(0); else localAudio.currentTime = 0; return; }
  loadTrack((curIdx - 1 + TRACKS.length) % TRACKS.length); doPlay();
}

document.getElementById('prevBtn').addEventListener('click', playPrev);
document.getElementById('nextBtn').addEventListener('click', playNext);
document.getElementById('shuffleBtn').addEventListener('click', () => { shuffle = !shuffle; document.getElementById('shuffleBtn').classList.toggle('active', shuffle); });
document.getElementById('repeatBtn').addEventListener('click', () => {
  repeat = (repeat + 1) % 3;
  const b = document.getElementById('repeatBtn');
  b.classList.toggle('active', repeat > 0);
  if (repeat === 2) b.title = 'Repeat One';
  else if (repeat === 1) b.title = 'Repeat All';
  else b.title = 'Repeat';
});

function handleFiles(files) {
  for (const f of files) {
    if (!f.type.startsWith('audio/')) continue;
    const url = URL.createObjectURL(f);
    const name = f.name.replace(/\.[^.]+$/, '');
    TRACKS.push({ title: name, artist: 'Local File', url, hue: Math.floor(Math.random() * 360), seed: TRACKS.length + 1, type: 'local' });
    artCanvases = {};
  }
  buildQueue();
  setStatus(`${files.length} file(s) added`, false, true);
}

// Click to start
document.addEventListener('click', function firstClick() { if (!playing && TRACKS.length) doPlay(); }, {once: true});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.code) {
    case 'Space': e.preventDefault(); toggle(); break;
    case 'ArrowRight': e.preventDefault();
      if (useYt && ytReady) { const d = ytPlayer.getDuration(); if (d) ytPlayer.seekTo(Math.min(d, ytPlayer.getCurrentTime() + 5)); }
      else if (localAudio.duration) localAudio.currentTime = Math.min(localAudio.duration, localAudio.currentTime + 5);
      break;
    case 'ArrowLeft': e.preventDefault();
      if (useYt && ytReady) ytPlayer.seekTo(Math.max(0, ytPlayer.getCurrentTime() - 5));
      else localAudio.currentTime = Math.max(0, localAudio.currentTime - 5);
      break;
  }
});

// Media Session
if ('mediaSession' in navigator) {
  navigator.mediaSession.setActionHandler('play', doPlay);
  navigator.mediaSession.setActionHandler('pause', doPause);
  navigator.mediaSession.setActionHandler('previoustrack', playPrev);
  navigator.mediaSession.setActionHandler('nexttrack', playNext);
}

// ===== HELPERS =====
function setStatus(msg, isErr, isReady) {
  const el = document.getElementById('loadStatus');
  el.textContent = msg; el.className = 'load-status' + (isErr ? ' error' : isReady ? ' ready' : '');
}
function fmt(s) { if (!s || isNaN(s)) return '0:00'; const m = Math.floor(s / 60), sec = Math.floor(s % 60); return m + ':' + (sec < 10 ? '0' : '') + sec; }

// ===== INIT =====
initParticles();
buildQueue();
</script>
